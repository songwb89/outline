<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>点数管理 - 运营平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://registry.npmmirror.com/lucide/latest/files/dist/umd/lucide.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0f3ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
                            400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
                            800: '#3730a3', 900: '#312e81',
                        },
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        html, body { height: 100%; overflow: hidden; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; }
        .toast {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            color: white; padding: 12px 24px; border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); z-index: 10000;
            display: flex; align-items: center; gap: 12px;
            opacity: 0; transition: all 0.3s ease; pointer-events: none;
        }
        .toast.show { opacity: 1; pointer-events: all; transform: translateX(-50%) translateY(0); }
        .toast.hide { opacity: 0; transform: translateX(-50%) translateY(-8px); }
        .toast.toast-success { background: #10b981; }
        .toast.toast-info { background: #3b82f6; }
        .toast.toast-error { background: #ef4444; }
        thead { position: sticky; top: 0; z-index: 10; }
        .admin-nav-subitem { transition: all 0.15s ease; }
        .admin-nav-subitem:hover { background-color: #eef2ff; color: #4f46e5; }
        .admin-nav-subitem.active { background-color: #e0e7ff; color: #4f46e5; }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div class="px-6 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gradient-to-br from-primary-500 to-purple-600 rounded-xl flex items-center justify-center text-white font-bold shadow-lg">
                    <i data-lucide="sparkles" class="w-4 h-4"></i>
                </div>
                <span class="text-base font-semibold text-gray-800">运营平台</span>
            </div>
            <div class="flex items-center gap-3">
                <div class="w-7 h-7 bg-gradient-to-br from-primary-500 to-purple-600 rounded-full flex items-center justify-center text-white text-xs font-semibold">A</div>
                <span class="text-sm text-gray-700 font-medium">管理员</span>
            </div>
        </div>
    </header>

    <div class="flex h-[calc(100vh-57px)]">

        <!-- 左侧菜单 -->
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col">
            <nav class="flex-1 overflow-y-auto py-4">
                <!-- 一级菜单：学校管理 -->
                <div class="admin-nav-group px-4 mb-1">
                    <button type="button" class="admin-nav-group-btn w-full text-left flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg text-gray-700 hover:bg-gray-50">
                        <i data-lucide="users" class="w-5 h-5 text-gray-400"></i>
                        <span>学校管理</span>
                        <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400 ml-auto group-arrow"></i>
                    </button>
                    <div class="nav-children ml-4 mt-1 space-y-0.5 hidden">
                        <a href="admin-school.html" class="admin-nav-subitem w-full text-left flex items-center gap-2 pl-4 pr-3 py-2 text-sm font-medium rounded-lg">
                            <i data-lucide="building-2" class="w-4 h-4"></i>
                            <span>学校管理</span>
                        </a>
                        <a href="admin-points.html" class="admin-nav-subitem w-full text-left flex items-center gap-2 pl-4 pr-3 py-2 text-sm font-medium rounded-lg">
                            <i data-lucide="coins" class="w-4 h-4"></i>
                            <span>点数管理</span>
                        </a>
                    </div>
                </div>

                <!-- 一级菜单：采购管理 -->
                <div class="admin-nav-group px-4 mb-1">
                    <button type="button" class="admin-nav-group-btn w-full text-left flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg text-gray-700">
                        <i data-lucide="shopping-cart" class="w-5 h-5 text-gray-400"></i>
                        <span>采购管理</span>
                        <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400 ml-auto group-arrow"></i>
                    </button>
                    <div class="nav-children ml-4 mt-1 space-y-0.5">
                        <a href="admin-purchase.html" class="admin-nav-subitem w-full text-left flex items-center gap-2 pl-4 pr-3 py-2 text-sm font-medium rounded-lg">
                            <i data-lucide="package-check" class="w-4 h-4"></i>
                            <span>开套餐</span>
                        </a>
                        <a href="admin-recharge.html" class="admin-nav-subitem active w-full text-left flex items-center gap-2 pl-4 pr-3 py-2 text-sm font-medium rounded-lg">
                            <i data-lucide="credit-card" class="w-4 h-4"></i>
                            <span>点数管理</span>
                        </a>
                        <a href="admin-trial.html" class="admin-nav-subitem w-full text-left flex items-center gap-2 pl-4 pr-3 py-2 text-sm font-medium rounded-lg">
                            <i data-lucide="clock" class="w-4 h-4"></i>
                            <span>试用开通</span>
                        </a>
                    </div>
                </div>

                <!-- 一级菜单：产品管理 -->
                <div class="admin-nav-group px-4 mb-1">
                    <button type="button" class="admin-nav-group-btn w-full text-left flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg text-gray-700 hover:bg-gray-50">
                        <i data-lucide="package" class="w-5 h-5 text-gray-400"></i>
                        <span>产品管理</span>
                        <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400 ml-auto group-arrow"></i>
                    </button>
                    <div class="nav-children ml-4 mt-1 space-y-0.5 hidden">
                        <a href="admin-price-config.html" class="admin-nav-subitem w-full text-left flex items-center gap-2 pl-4 pr-3 py-2 text-sm font-medium rounded-lg">
                            <i data-lucide="calculator" class="w-4 h-4"></i>
                            <span>消耗规则</span>
                        </a>
                        <a href="admin-package.html" class="admin-nav-subitem w-full text-left flex items-center gap-2 pl-4 pr-3 py-2 text-sm font-medium rounded-lg">
                            <i data-lucide="layers" class="w-4 h-4"></i>
                            <span>套餐管理</span>
                        </a>
                    </div>
                </div>
            </nav>
        </aside>

        <main class="flex-1 overflow-hidden flex flex-col">
            <div class="h-full px-6 pt-6 overflow-y-auto">
                    <div class="mb-6 flex items-center justify-between">
                        <div>
                            <h1 class="text-2xl font-semibold text-gray-900">点数管理</h1>
                            <p class="text-sm text-gray-500 mt-1">管理学校点数充值与发放记录</p>
                        </div>
                        <div class="flex gap-3">
                            <button type="button" onclick="openDeductModal()" class="px-4 py-2 bg-orange-600 hover:bg-orange-700 text-white rounded-md text-sm font-medium transition-all flex items-center gap-2 shadow-sm">
                                <i data-lucide="minus-circle" class="w-4 h-4"></i>
                                扣减
                            </button>
                            <button type="button" onclick="openRechargeModal()" class="px-4 py-2 bg-primary-600 hover:bg-primary-700 text-white rounded-md text-sm font-medium transition-all flex items-center gap-2 shadow-sm">
                                <i data-lucide="plus-circle" class="w-4 h-4"></i>
                                充值
                            </button>
                        </div>
                    </div>

                <!-- 筛选条件 -->
                <div class="mb-6 bg-white rounded-lg border border-gray-200 p-4 shadow-sm">
                    <div class="flex flex-wrap items-end gap-x-5 gap-y-3">
                        <div class="flex items-center gap-2">
                            <label class="text-xs font-medium text-gray-600 whitespace-nowrap">学校</label>
                            <select id="filterSchool" class="px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 bg-white w-40">
                                <option value="">全部</option>
                            </select>
                        </div>
                        <div class="flex items-center gap-2">
                            <label class="text-xs font-medium text-gray-600 whitespace-nowrap">类型</label>
                            <select id="filterType" class="px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 bg-white w-28">
                                <option value="">全部</option>
                                <option value="grant">套餐发放</option>
                                <option value="recharge">充值</option>
                                <option value="deduct">扣减</option>
                            </select>
                        </div>
                        <div class="flex items-center gap-2">
                            <label class="text-xs font-medium text-gray-600 whitespace-nowrap">日期范围</label>
                            <input type="date" id="filterStartDate" class="px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 w-36">
                            <span class="text-gray-400">至</span>
                            <input type="date" id="filterEndDate" class="px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 w-36">
                        </div>
                        <button type="button" onclick="applyFilters()" class="px-4 py-2 bg-primary-600 hover:bg-primary-700 text-white rounded-md text-sm font-medium transition-all flex items-center gap-2 shadow-sm">
                            <i data-lucide="search" class="w-4 h-4"></i>查询
                        </button>
                    </div>
                </div>

                <!-- 数据表格 -->
                <div class="bg-white rounded-lg border border-gray-200 shadow-sm flex flex-col" style="height: calc(100vh - 340px); min-height: 300px;">
                    <div class="overflow-x-auto overflow-y-auto flex-1">
                        <table class="w-full min-w-[900px]">
                            <thead class="bg-gray-50 border-b border-gray-200">
                                <tr>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">序号</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">学校名称</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">关联采购</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">操作类型</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">点数</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">金额</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">时间</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">备注</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">操作</th>
                                </tr>
                            </thead>
                            <tbody id="rechargeTableBody" class="bg-white divide-y divide-gray-100"></tbody>
                        </table>
                    </div>
                    <div class="px-6 py-4 border-t border-gray-200 flex flex-wrap items-center justify-between gap-4 bg-white flex-shrink-0">
                        <div class="flex items-center gap-2 text-sm text-gray-600">
                            <span>共 <span id="totalCount">0</span> 条</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <button type="button" id="prevBtn" onclick="goToPreviousPage()" class="p-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-all">
                                <i data-lucide="chevron-left" class="w-4 h-4"></i>
                            </button>
                            <div class="flex items-center gap-1" id="pageNumbers"></div>
                            <button type="button" id="nextBtn" onclick="goToNextPage()" class="p-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-all">
                                <i data-lucide="chevron-right" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 充值弹窗 -->
    <div id="recharge-modal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/45" onclick="hideRechargeModal()"></div>
        <div class="relative bg-white rounded-2xl shadow-2xl overflow-hidden" style="transform: scale(0.95); width: 100%; max-width: 480px; margin: 80px auto 0;">
            <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between shrink-0">
                <h3 class="font-semibold text-gray-800">充值</h3>
                <button type="button" onclick="hideRechargeModal()" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="px-6 py-5 flex flex-col gap-4">
                <div class="flex flex-col gap-1.5">
                    <label class="text-sm font-medium text-gray-700">学校 <span class="text-red-500">*</span></label>
                    <select id="rc-school" class="px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 bg-white">
                        <option value="">请选择学校</option>
                    </select>
                    <p id="rc-err-school" class="text-sm text-red-500 hidden"></p>
                </div>
                <div class="flex flex-col gap-1.5" id="purchase-field">
                    <label class="text-sm font-medium text-gray-700">关联采购 <span class="text-red-500">*</span></label>
                    <select id="rc-purchase" class="px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 bg-white">
                        <option value="">请先选择学校</option>
                    </select>
                    <p id="rc-err-purchase" class="text-sm text-red-500 hidden"></p>
                </div>
                <div id="purchase-info" class="bg-blue-50 rounded-lg p-3 text-xs text-blue-700 hidden"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1.5">
                        <label class="text-sm font-medium text-gray-700">点数 <span class="text-red-500">*</span></label>
                        <input type="number" id="rc-points" placeholder="请输入" min="1" class="px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
                        <p id="rc-err-points" class="text-sm text-red-500 hidden"></p>
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label class="text-sm font-medium text-gray-700">金额 <span class="text-red-500">*</span></label>
                        <div class="flex items-center gap-2">
                            <span class="text-sm text-gray-500">¥</span>
                            <input type="number" id="rc-amount" placeholder="0.00" min="0" step="0.01" class="flex-1 px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
                        </div>
                        <p id="rc-err-amount" class="text-sm text-red-500 hidden"></p>
                    </div>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-sm font-medium text-gray-700">备注</label>
                    <textarea id="rc-remark" rows="2" placeholder="选填" class="px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 resize-none"></textarea>
                </div>
            </div>
            <div class="px-6 py-4 border-t border-gray-100 flex justify-end gap-3 shrink-0">
                <button type="button" onclick="hideRechargeModal()" class="px-5 py-2.5 border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-50 transition-colors">取消</button>
                <button type="button" onclick="saveRecharge()" class="px-5 py-2.5 bg-primary-600 hover:bg-primary-700 text-white rounded-lg text-sm font-medium transition-colors shadow-sm">确认</button>
            </div>
        </div>
    </div>

    <!-- 扣减弹窗 -->
    <div id="deduct-modal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/45" onclick="hideDeductModal()"></div>
        <div class="relative bg-white rounded-2xl shadow-2xl overflow-hidden" style="transform: scale(0.95); width: 100%; max-width: 480px; margin: 80px auto 0;">
            <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between shrink-0">
                <h3 class="font-semibold text-gray-800">扣减</h3>
                <button type="button" onclick="hideDeductModal()" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="px-6 py-5 flex flex-col gap-4">
                <div class="flex flex-col gap-1.5">
                    <label class="text-sm font-medium text-gray-700">学校 <span class="text-red-500">*</span></label>
                    <select id="dc-school" class="px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 bg-white">
                        <option value="">请选择学校</option>
                    </select>
                    <p id="dc-err-school" class="text-sm text-red-500 hidden"></p>
                </div>
                <div class="flex flex-col gap-1.5" id="dc-purchase-field">
                    <label class="text-sm font-medium text-gray-700">关联采购 <span class="text-red-500">*</span></label>
                    <select id="dc-purchase" class="px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 bg-white">
                        <option value="">请先选择学校</option>
                    </select>
                    <p id="dc-err-purchase" class="text-sm text-red-500 hidden"></p>
                </div>
                <div id="dc-purchase-info" class="bg-blue-50 rounded-lg p-3 text-xs text-blue-700 hidden"></div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-sm font-medium text-gray-700">点数 <span class="text-red-500">*</span></label>
                    <input type="number" id="dc-points" placeholder="请输入" min="1" class="px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500">
                    <p id="dc-err-points" class="text-sm text-red-500 hidden"></p>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-sm font-medium text-gray-700">扣减原因 <span class="text-red-500">*</span></label>
                    <textarea id="dc-remark" rows="2" placeholder="请输入扣减原因（必填）" class="px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 resize-none"></textarea>
                    <p id="dc-err-remark" class="text-sm text-red-500 hidden"></p>
                </div>
            </div>
            <div class="px-6 py-4 border-t border-gray-100 flex justify-end gap-3 shrink-0">
                <button type="button" onclick="hideDeductModal()" class="px-5 py-2.5 border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-50 transition-colors">取消</button>
                <button type="button" onclick="saveDeduct()" class="px-5 py-2.5 bg-orange-600 hover:bg-orange-700 text-white rounded-lg text-sm font-medium transition-colors shadow-sm">确认扣减</button>
            </div>
        </div>
    </div>

    <!-- 点数明细弹窗 -->
    <div id="detail-modal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/45" onclick="hideDetailModal()"></div>
        <div class="relative bg-white rounded-2xl shadow-2xl overflow-hidden" style="transform: scale(0.95); width: 100%; max-width: 900px; margin: 40px auto 0;">
            <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between shrink-0">
                <div>
                    <h3 class="font-semibold text-gray-800" id="detail-title">学校点数明细</h3>
                    <p class="text-xs text-gray-500 mt-0.5" id="detail-subtitle">--</p>
                </div>
                <button type="button" onclick="hideDetailModal()" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="px-6 py-4 bg-gray-50 border-b border-gray-100">
                <div class="grid grid-cols-4 gap-4">
                    <div class="text-center">
                        <div class="text-xs text-gray-500 mb-1">剩余点数</div>
                        <div class="text-xl font-bold text-emerald-600" id="detail-balance">--</div>
                    </div>
                    <div class="text-center">
                        <div class="text-xs text-gray-500 mb-1">总充值</div>
                        <div class="text-xl font-bold text-blue-600" id="detail-total-recharge">--</div>
                    </div>
                    <div class="text-center">
                        <div class="text-xs text-gray-500 mb-1">总扣减</div>
                        <div class="text-xl font-bold text-orange-600" id="detail-total-deduct">--</div>
                    </div>
                    <div class="text-center">
                        <div class="text-xs text-gray-500 mb-1">已消耗</div>
                        <div class="text-xl font-bold text-purple-600" id="detail-consumed">--</div>
                    </div>
                </div>
            </div>
            <div class="px-6 py-3 border-b border-gray-100 flex flex-wrap items-end gap-3">
                <div class="flex items-center gap-2">
                    <label class="text-xs text-gray-600 whitespace-nowrap">类型</label>
                    <select id="detail-filter-type" class="px-3 py-1.5 border border-gray-200 rounded-lg text-xs bg-white">
                        <option value="">全部</option>
                        <option value="grant">套餐发放</option>
                        <option value="recharge">充值</option>
                        <option value="deduct">扣减</option>
                        <option value="consume">消耗</option>
                    </select>
                </div>
                <div class="flex items-center gap-2">
                    <label class="text-xs text-gray-600 whitespace-nowrap">日期</label>
                    <input type="date" id="detail-filter-from" class="px-2 py-1.5 border border-gray-200 rounded-lg text-xs">
                    <span class="text-gray-400 text-xs">~</span>

            { id: 'pur3', schoolId: 'school3', schoolName: '深圳外国语学校附属碧海小学', packageId: 'pkg1', packageName: '基础版-月卡', startDate: '2025-03-01', endDate: '2026-03-01', currentPoints: 120, status: 'active' },

            { id: 'pur7', schoolId: 'school7', schoolName: '学府一小', packageId: 'pkg2', packageName: '基础版-年卡', startDate: '2024-08-01', endDate: '2025-08-01', currentPoints: 0, status: 'expired' },

        ];

            { id: 'rc2', schoolId: 'school1', schoolName: '深圳实验学校小学部', purchaseId: 'pur1', purchaseName: '基础版-年卡', type: 'recharge', points: 100, amount: 500, time: '2025-06-15 10:30', remark: '紧急充值' },

            { id: 'rc9', schoolId: 'school6', schoolName: '育才一小', purchaseId: 'pur6', purchaseName: '尊享版-年卡', type: 'recharge', points: 300, amount: 1500, time: '2025-03-25 16:45', remark: '促销活动' },
            { id: 'rc11', schoolId: 'school2', schoolName: '深圳外国语小学', purchaseId: 'pur2', purchaseName: '基础版-年卡', type: 'recharge', points: 50, amount: 250, time: '2025-02-18 11:30', remark: '' },
        ];

        // 从localStorage加载开套餐时自动创建的发放记录
        function loadGrantRecords() {
            const stored = JSON.parse(localStorage.getItem('pointRecords') || '[]');
            stored.forEach(record => {
                if (!rechargeData.find(r => r.id === record.id)) {
                    rechargeData.push(record);
                }
            });
            rechargeData.sort((a, b) => b.time.localeCompare(a.time));
        }
        loadGrantRecords();

        let filteredData = [...rechargeData];
        let currentPage = 1;
        let pageSize = 10;
        let detailSchoolId = null;
        let deleteTargetId = null;

        // 初始化筛选下拉
        function initFilters() {
            const schoolSelect = document.getElementById('filterSchool');
            schoolsData.forEach(s => {
                schoolSelect.innerHTML += `<option value="${s.id}">${s.name}</option>`;
            });
        }

        // 初始化弹窗下拉
        function initModalSelects() {
            const schoolSelect = document.getElementById('rc-school');
            schoolSelect.innerHTML = '<option value="">请选择学校</option>';
            schoolsData.forEach(s => {
                schoolSelect.innerHTML += `<option value="${s.id}">${s.name}</option>`;
            });
        }

        // 学校选择变化
        document.getElementById('rc-school')?.addEventListener('change', function() {
            const schoolId = this.value;
            const purchaseSelect = document.getElementById('rc-purchase');
            const infoEl = document.getElementById('purchase-info');

            if (!schoolId) {
                purchaseSelect.innerHTML = '<option value="">请先选择学校</option>';
                infoEl.classList.add('hidden');
                return;
            }

            // 获取该学校有效期的采购记录
            const validPurchases = purchasesData.filter(p => p.schoolId === schoolId && p.status === 'active');
            purchaseSelect.innerHTML = '<option value="">请选择关联采购</option>';
            validPurchases.forEach(p => {
                purchaseSelect.innerHTML += `<option value="${p.id}">${p.packageName}（剩余${p.currentPoints}点）</option>`;
            });
        });

        // 采购选择变化
        document.getElementById('rc-purchase')?.addEventListener('change', function() {
            const purchaseId = this.value;
            const infoEl = document.getElementById('purchase-info');

            if (!purchaseId) {
                infoEl.classList.add('hidden');
                return;
            }

            const purchase = purchasesData.find(p => p.id === purchaseId);
            if (purchase) {
                infoEl.innerHTML = `<strong>${purchase.packageName}</strong> - 有效期：${purchase.startDate} 至 ${purchase.endDate}，当前剩余：${purchase.currentPoints}点`;
                infoEl.classList.remove('hidden');
            }
        });

        // 扣减弹窗 - 学校选择变化
        document.getElementById('dc-school')?.addEventListener('change', function() {
            const schoolId = this.value;
            const purchaseSelect = document.getElementById('dc-purchase');
            const infoEl = document.getElementById('dc-purchase-info');

            if (!schoolId) {
                purchaseSelect.innerHTML = '<option value="">请先选择学校</option>';
                infoEl.classList.add('hidden');
                return;
            }

            const validPurchases = purchasesData.filter(p => p.schoolId === schoolId && p.status === 'active');
            purchaseSelect.innerHTML = '<option value="">请选择关联采购</option>';
            validPurchases.forEach(p => {
                purchaseSelect.innerHTML += `<option value="${p.id}">${p.packageName}（剩余${p.currentPoints}点）</option>`;
            });
        });

        // 扣减弹窗 - 采购选择变化
        document.getElementById('dc-purchase')?.addEventListener('change', function() {
            const purchaseId = this.value;
            const infoEl = document.getElementById('dc-purchase-info');

            if (!purchaseId) {
                infoEl.classList.add('hidden');
                return;
            }

            const purchase = purchasesData.find(p => p.id === purchaseId);
            if (purchase) {
                infoEl.innerHTML = `<strong>${purchase.packageName}</strong> - 有效期：${purchase.startDate} 至 ${purchase.endDate}，当前剩余：${purchase.currentPoints}点`;
                infoEl.classList.remove('hidden');
            }
        });

        function applyFilters() {
            const schoolId = document.getElementById('filterSchool').value;
            const type = document.getElementById('filterType').value;
            const startDate = document.getElementById('filterStartDate').value;
            const endDate = document.getElementById('filterEndDate').value;

            filteredData = rechargeData.filter(row => {
                if (schoolId && row.schoolId !== schoolId) return false;
                if (type && row.type !== type) return false;
                if (startDate && row.time < startDate) return false;
                if (endDate && row.time.split(' ')[0] > endDate) return false;
                return true;
            });
            currentPage = 1;
            renderTable();
            updatePagination();
        }

        function renderTable() {
            const tbody = document.getElementById('rechargeTableBody');
            const startIndex = (currentPage - 1) * pageSize;
            const pageData = filteredData.slice(startIndex, startIndex + pageSize);

            tbody.innerHTML = pageData.map((row, index) => {
                const no = startIndex + index + 1;
                const typeHtml = {
                    grant: '<span class="px-2 py-0.5 text-xs font-medium rounded bg-emerald-100 text-emerald-700">套餐发放</span>',
                    recharge: '<span class="px-2 py-0.5 text-xs font-medium rounded bg-green-100 text-green-700">充值</span>',
                    deduct: '<span class="px-2 py-0.5 text-xs font-medium rounded bg-orange-100 text-orange-700">扣减</span>'
                }[row.type] || row.type;
                const pointsHtml = row.type === 'deduct'
                    ? `<span class="text-orange-600 font-medium">-${row.points}</span>`
                    : `<span class="text-green-600 font-medium">+${row.points}</span>`;
                const remarkDisplay = row.remark ? row.remark : '-';

                return `<tr class="hover:bg-gray-50/80">
                    <td class="px-4 py-3 text-sm text-gray-600">${no}</td>
                    <td class="px-4 py-3 text-sm font-medium text-gray-900">
                        <button type="button" onclick="openDetailModal('${row.schoolId}')" class="hover:text-primary-600 hover:underline">${row.schoolName}</button>
                    </td>
                    <td class="px-4 py-3 text-sm text-gray-800">${row.purchaseName}</td>
                    <td class="px-4 py-3">${typeHtml}</td>
                    <td class="px-4 py-3 text-sm">${pointsHtml}</td>
                    <td class="px-4 py-3 text-sm ${row.amount > 0 ? 'text-gray-800' : 'text-gray-400'}">${row.amount > 0 ? '¥' + row.amount.toLocaleString() : '-'}</td>
                    <td class="px-4 py-3 text-sm text-gray-600">${row.time}</td>
                    <td class="px-4 py-3 text-sm text-gray-500">${remarkDisplay}</td>
                    <td class="px-4 py-3 text-sm">
                        <button onclick="deleteRecharge('${row.id}')" class="text-red-600 hover:text-red-800 font-medium">删除</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function updatePagination() {
            const totalPages = Math.max(1, Math.ceil(filteredData.length / pageSize));
            document.getElementById('totalCount').textContent = filteredData.length;
            document.getElementById('prevBtn').disabled = currentPage <= 1;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages;

            const container = document.getElementById('pageNumbers');
            container.innerHTML = '';
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = i;
                btn.onclick = () => goToPage(i);
                btn.className = i === currentPage
                    ? 'min-w-[32px] px-2 py-1 rounded-md text-sm font-medium bg-primary-600 text-white'
                    : 'min-w-[32px] px-2 py-1 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-100';
                container.appendChild(btn);
            }
        }

        function goToPage(page) {
            const totalPages = Math.max(1, Math.ceil(filteredData.length / pageSize));
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                renderTable();
                updatePagination();
            }
        }
        function goToPreviousPage() { if (currentPage > 1) goToPage(currentPage - 1); }
        function goToNextPage() { goToPage(currentPage + 1); }

        // ==================== 充值弹窗 ====================
        function openRechargeModal() {
            // 初始化学校下拉
            const schoolSelect = document.getElementById('rc-school');
            schoolSelect.innerHTML = '<option value="">请选择学校</option>';
            schoolsData.forEach(s => {
                schoolSelect.innerHTML += `<option value="${s.id}">${s.name}</option>`;
            });

            document.getElementById('rc-school').value = '';
            document.getElementById('rc-purchase').innerHTML = '<option value="">请先选择学校</option>';
            document.getElementById('purchase-info').classList.add('hidden');
            document.getElementById('rc-points').value = '';
            document.getElementById('rc-amount').value = '';
            document.getElementById('rc-remark').value = '';
            document.getElementById('recharge-modal').classList.remove('hidden');
            document.getElementById('rc-school').focus();
            lucide.createIcons();
        }

        function hideRechargeModal() {
            document.getElementById('recharge-modal').classList.add('hidden');
        }

        function validateRecharge() {
            let valid = true;
            ['school', 'purchase', 'points'].forEach(f => {
                document.getElementById(`rc-err-${f}`).classList.add('hidden');
            });

            if (!document.getElementById('rc-school').value) {
                document.getElementById('rc-err-school').textContent = '请选择学校';
                document.getElementById('rc-err-school').classList.remove('hidden');
                valid = false;
            }
            if (!document.getElementById('rc-purchase').value) {
                document.getElementById('rc-err-purchase').textContent = '请选择关联采购';
                document.getElementById('rc-err-purchase').classList.remove('hidden');
                valid = false;
            }
            if (!document.getElementById('rc-points').value || parseInt(document.getElementById('rc-points').value) < 1) {
                document.getElementById('rc-err-points').textContent = '请输入有效的点数';
                document.getElementById('rc-err-points').classList.remove('hidden');
                valid = false;
            }
            return valid;
        }

        function saveRecharge() {
            if (!validateRecharge()) return;

            const schoolId = document.getElementById('rc-school').value;
            const purchaseId = document.getElementById('rc-purchase').value;
            const school = schoolsData.find(s => s.id === schoolId);
            const purchase = purchasesData.find(p => p.id === purchaseId);

            const data = {
                id: 'rc' + Date.now(),
                schoolId: schoolId,
                schoolName: school.name,
                purchaseId: purchaseId,
                purchaseName: purchase.packageName,
                type: 'recharge',
                points: parseInt(document.getElementById('rc-points').value),
                amount: parseFloat(document.getElementById('rc-amount').value || 0),
                time: new Date().toISOString().slice(0, 16).replace('T', ' '),
                remark: document.getElementById('rc-remark').value.trim()
            };

            rechargeData.unshift(data);

            // 同步到localStorage
            let storedRecords = JSON.parse(localStorage.getItem('pointRecords') || '[]');
            storedRecords.push(data);
            localStorage.setItem('pointRecords', JSON.stringify(storedRecords));

            hideRechargeModal();
            applyFilters();
            showToast('充值成功');
        }

        // ==================== 扣减弹窗 ====================
        function openDeductModal() {
            // 初始化学校下拉
            const schoolSelect = document.getElementById('dc-school');
            schoolSelect.innerHTML = '<option value="">请选择学校</option>';
            schoolsData.forEach(s => {
                schoolSelect.innerHTML += `<option value="${s.id}">${s.name}</option>`;
            });

            document.getElementById('dc-school').value = '';
            document.getElementById('dc-purchase').innerHTML = '<option value="">请先选择学校</option>';
            document.getElementById('dc-purchase-info').classList.add('hidden');
            document.getElementById('dc-points').value = '';
            document.getElementById('dc-remark').value = '';
            document.getElementById('deduct-modal').classList.remove('hidden');
            document.getElementById('dc-school').focus();
            lucide.createIcons();
        }

        function hideDeductModal() {
            document.getElementById('deduct-modal').classList.add('hidden');
        }

        function validateDeduct() {
            let valid = true;
            ['school', 'purchase', 'points', 'remark'].forEach(f => {
                document.getElementById(`dc-err-${f}`)?.classList.add('hidden');
            });

            if (!document.getElementById('dc-school').value) {
                document.getElementById('dc-err-school').textContent = '请选择学校';
                document.getElementById('dc-err-school').classList.remove('hidden');
                valid = false;
            }
            if (!document.getElementById('dc-purchase').value) {
                document.getElementById('dc-err-purchase').textContent = '请选择关联采购';
                document.getElementById('dc-err-purchase').classList.remove('hidden');
                valid = false;
            }
            if (!document.getElementById('dc-points').value || parseInt(document.getElementById('dc-points').value) < 1) {
                document.getElementById('dc-err-points').textContent = '请输入有效的点数';
                document.getElementById('dc-err-points').classList.remove('hidden');
                valid = false;
            }
            if (!document.getElementById('dc-remark').value.trim()) {
                document.getElementById('dc-err-remark').textContent = '请输入扣减原因';
                document.getElementById('dc-err-remark').classList.remove('hidden');
                valid = false;
            }
            return valid;
        }

        function saveDeduct() {
            if (!validateDeduct()) return;

            const schoolId = document.getElementById('dc-school').value;
            const purchaseId = document.getElementById('dc-purchase').value;
            const school = schoolsData.find(s => s.id === schoolId);
            const purchase = purchasesData.find(p => p.id === purchaseId);

            const data = {
                id: 'rc' + Date.now(),
                schoolId: schoolId,
                schoolName: school.name,
                purchaseId: purchaseId,
                purchaseName: purchase.packageName,
                type: 'deduct',
                points: parseInt(document.getElementById('dc-points').value),
                amount: 0,
                time: new Date().toISOString().slice(0, 16).replace('T', ' '),
                remark: document.getElementById('dc-remark').value.trim()
            };

            rechargeData.unshift(data);

            // 同步到localStorage
            let storedRecords = JSON.parse(localStorage.getItem('pointRecords') || '[]');
            storedRecords.push(data);
            localStorage.setItem('pointRecords', JSON.stringify(storedRecords));

            hideDeductModal();
            applyFilters();
            showToast('扣减成功');
        }

        // ==================== 点数明细弹窗 ====================
        function openDetailModal(schoolId) {
            detailSchoolId = schoolId;
            const school = schoolsData.find(s => s.id === schoolId);
            if (!school) return;

            document.getElementById('detail-title').textContent = school.name + ' - 点数明细';
            document.getElementById('detail-subtitle').textContent = '学校编码：' + school.code;

            // 统计数据
            const schoolRecords = rechargeData.filter(r => r.schoolId === schoolId);
            const totalRecharge = schoolRecords.filter(r => r.type === 'recharge' || r.type === 'grant').reduce((sum, r) => sum + r.points, 0);
            const totalDeduct = schoolRecords.filter(r => r.type === 'deduct').reduce((sum, r) => sum + r.points, 0);
            const totalConsumed = Math.max(0, totalRecharge - totalDeduct - (purchasesData.find(p => p.schoolId === schoolId)?.currentPoints || 0));

            document.getElementById('detail-total-recharge').textContent = totalRecharge;
            document.getElementById('detail-total-deduct').textContent = totalDeduct;
            document.getElementById('detail-consumed').textContent = totalConsumed;

            // 获取该学校当前剩余点数
            const activePurchase = purchasesData.find(p => p.schoolId === schoolId && p.status === 'active');
            document.getElementById('detail-balance').textContent = activePurchase?.currentPoints || 0;

            // 筛选
            document.getElementById('detail-filter-type').value = '';
            document.getElementById('detail-filter-from').value = '';
            document.getElementById('detail-filter-to').value = '';
            detailApplyFilters();

            document.getElementById('detail-modal').classList.remove('hidden');
            lucide.createIcons();
        }

        function hideDetailModal() {
            document.getElementById('detail-modal').classList.add('hidden');
            detailSchoolId = null;
        }

        let detailFiltered = [];

        function detailApplyFilters() {
            if (!detailSchoolId) return;
            const type = document.getElementById('detail-filter-type').value;
            const from = document.getElementById('detail-filter-from').value;
            const to = document.getElementById('detail-filter-to').value;

            detailFiltered = rechargeData.filter(r => {
                if (r.schoolId !== detailSchoolId) return false;
                if (type && r.type !== type) return false;
                if (from && r.time < from) return false;
                if (to && r.time.split(' ')[0] > to) return false;
                return true;
            });

            detailFiltered.sort((a, b) => b.time.localeCompare(a.time));
            document.getElementById('detail-count').textContent = detailFiltered.length;
            detailRender();
        }

        function detailRender() {
            const tbody = document.getElementById('detail-table-body');
            let runningBalance = parseInt(document.getElementById('detail-balance').textContent) || 0;

            if (detailFiltered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-8 text-center text-gray-400">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = detailFiltered.map(r => {
                const typeInfo = {
                    grant: { label: '套餐发放', cls: 'bg-emerald-100 text-emerald-700' },
                    recharge: { label: '充值', cls: 'bg-green-100 text-green-700' },
                    deduct: { label: '扣减', cls: 'bg-orange-100 text-orange-700' },
                    consume: { label: '消耗', cls: 'bg-purple-100 text-purple-700' }
                };
                const info = typeInfo[r.type] || typeInfo.consume;
                runningBalance = (r.type === 'recharge' || r.type === 'grant') ? runningBalance - r.points : runningBalance + r.points;

                return `<tr class="hover:bg-gray-50/60">
                    <td class="px-4 py-2.5 text-xs text-gray-500 whitespace-nowrap">${r.time}</td>
                    <td class="px-4 py-2.5 text-center"><span class="px-2 py-0.5 text-xs font-medium rounded ${info.cls}">${info.label}</span></td>
                    <td class="px-4 py-2.5 text-right font-semibold ${(r.type === 'recharge' || r.type === 'grant') ? 'text-green-600' : 'text-orange-600'}">${(r.type === 'recharge' || r.type === 'grant') ? '+' : '-'}${r.points}</td>
                    <td class="px-4 py-2.5 text-right text-gray-600">${runningBalance}</td>
                    <td class="px-4 py-2.5 text-xs text-gray-500">${r.remark || '-'}</td>
                </tr>`;
            }).join('');
        }

        function deleteRecharge(id) {
            const row = rechargeData.find(r => r.id === id);
            if (!row) return;
            deleteTargetId = id;
            const typeLabel = { grant: '套餐发放', recharge: '充值', deduct: '扣减' }[row.type] || row.type;
            document.getElementById('delete-info').textContent = `类型：${typeLabel}，点数：${(row.type === 'recharge' || row.type === 'grant') ? '+' : '-'}${row.points}`;
            document.getElementById('confirm-modal').classList.remove('hidden');
        }

        function hideDeleteModal() {
            document.getElementById('confirm-modal').classList.add('hidden');
            deleteTargetId = null;
        }

        function confirmDelete() {
            if (!deleteTargetId) return;
            rechargeData = rechargeData.filter(r => r.id !== deleteTargetId);

            // 从localStorage同步删除
            let storedRecords = JSON.parse(localStorage.getItem('pointRecords') || '[]');
            storedRecords = storedRecords.filter(r => r.id !== deleteTargetId);
            localStorage.setItem('pointRecords', JSON.stringify(storedRecords));

            hideDeleteModal();
            applyFilters();
            showToast('记录已删除');
        }

        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast toast-success';
            toast.innerHTML = `<i data-lucide="check-circle"></i><span>${message}</span>`;
            document.body.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initFilters();
            initModalSelects();
            renderTable();
            updatePagination();
            lucide.createIcons();
        });
    </script>
</body>
</html>

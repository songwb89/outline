<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能教学 - 首页</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://registry.npmmirror.com/lucide/latest/files/dist/umd/lucide.js"></script>
  <style>
    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
  <!-- 顶部导航栏 -->
  <header class="bg-gradient-to-r from-blue-600 to-blue-700 text-white shadow-lg">
    <div class="flex items-center justify-between h-16 px-6">
      <!-- 左侧 Logo -->
      <div class="flex items-center gap-3 shrink-0">
        <img src="img/logo.png" alt="兆涵科技" class="h-9 sm:h-10 w-auto max-h-10 object-contain object-left" />
        <div class="flex flex-col leading-tight">
          <span class="text-base sm:text-lg font-bold text-white">兆涵科技</span>
          <span class="text-xs text-white leading-none">Sigma Education</span>
        </div>
      </div>

      <!-- 中间导航 -->
      <nav class="flex items-center gap-1">
        <a href="index.html" class="px-4 py-2 text-sm font-medium rounded-lg bg-white/20 transition-all hover:bg-white/30 no-underline text-white">
          首页
        </a>
        <a href="prepare.html" class="px-4 py-2 text-sm text-white/80 rounded-lg transition-all hover:bg-white/20 hover:text-white no-underline">智能备课</a>
        <a href="teach.html" class="px-4 py-2 text-sm text-white/80 rounded-lg transition-all hover:bg-white/20 hover:text-white no-underline">智能授课</a>
        <a href="evaluate.html" class="px-4 py-2 text-sm text-white/80 rounded-lg transition-all hover:bg-white/20 hover:text-white no-underline">智能测评</a>
        <a href="ai.html" class="px-4 py-2 text-sm text-white/80 rounded-lg transition-all hover:bg-white/20 hover:text-white no-underline">AI专区</a>
        <a href="academic.html" class="px-4 py-2 text-sm text-white/80 rounded-lg transition-all hover:bg-white/20 hover:text-white no-underline">教务管理</a>
      </nav>

      <!-- 右侧图标 + 用户 -->
      <div class="flex items-center gap-4">
        <!-- 任务 -->
        <div class="relative cursor-pointer hover:bg-white/20 p-2 rounded-lg transition-all">
          <i data-lucide="list-todo" class="w-5 h-5"></i>
          <span class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white text-xs rounded-full flex items-center justify-center">3</span>
        </div>
        
        <!-- 通知 -->
        <div class="relative cursor-pointer hover:bg-white/20 p-2 rounded-lg transition-all">
          <i data-lucide="bell" class="w-5 h-5"></i>
          <span class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white text-xs rounded-full flex items-center justify-center">5</span>
        </div>
        
        <!-- 用户信息 -->
        <div class="flex items-center gap-3 cursor-pointer hover:bg-white/20 p-2 rounded-lg transition-all">
          <div class="w-8 h-8 bg-white/30 rounded-full flex items-center justify-center">
            <i data-lucide="user" class="w-4 h-4"></i>
          </div>
          <div class="text-sm">
            <div class="font-medium">张老师</div>
          </div>
          <i data-lucide="chevron-down" class="w-4 h-4 text-white/70"></i>
        </div>
      </div>
    </div>
  </header>

  <!-- 内容区域 -->
  <main class="p-6 min-h-[calc(100vh-64px)]">
    <!-- 4列网格布局 -->
    <div class="grid gap-6" style="grid-template-columns: 1fr 1fr 1fr auto;">
      <!-- 学业预警 -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100">
        <div class="p-4 border-b border-gray-100 flex items-center justify-between">
          <h3 class="font-bold text-gray-800 flex items-center gap-2">
            <i data-lucide="alert-triangle" class="w-5 h-5 text-red-500"></i>
            学业预警
            <span class="ml-2 px-2 py-0.5 bg-red-100 text-red-600 text-xs rounded-full">0人</span>
            <div class="relative group">
              <i data-lucide="info" class="w-4 h-4 text-gray-400 cursor-pointer"></i>
              <div class="absolute left-0 top-full mt-1 px-3 py-2 bg-gray-800 text-white text-xs rounded-lg opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none whitespace-nowrap z-10">
                近5次作业得分率
                <div class="absolute -top-1 left-3 w-2 h-2 bg-gray-800 rotate-45"></div>
              </div>
            </div>
          </h3>
        </div>
        <div class="p-6 min-h-[280px]">
          <div class="flex flex-col items-center justify-center text-center">
            <!-- 装饰插画 -->
            <div class="relative mb-4">
              <svg class="w-28 h-28" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- 背景圆形 -->
                <circle cx="60" cy="60" r="50" fill="#f0fdf4"/>
                <circle cx="60" cy="60" r="40" fill="#dcfce7"/>
                <!-- 笑脸 -->
                <circle cx="60" cy="55" r="25" stroke="#22c55e" stroke-width="3" fill="#bbf7d0"/>
                <circle cx="50" cy="50" r="3" fill="#22c55e"/>
                <circle cx="70" cy="50" r="3" fill="#22c55e"/>
                <path d="M48 62 Q60 72 72 62" stroke="#22c55e" stroke-width="3" stroke-linecap="round" fill="none"/>
                <!-- 对勾装饰 -->
                <path d="M85 30 L95 40 L85 50" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                <circle cx="60" cy="90" r="8" fill="#86efac" opacity="0.6"/>
                <!-- 飘动的叶子 -->
                <path d="M25 35 Q30 25 40 30" stroke="#22c55e" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>
                <path d="M90 75 Q100 70 95 80" stroke="#22c55e" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>
              </svg>
            </div>
            <p class="text-sm text-gray-600 font-medium">暂无预警数据</p>
            <p class="text-xs text-gray-400 mt-1">所有学生学业表现良好</p>
          </div>
        </div>
      </div>

      <!-- 最新诊断 -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100">
        <div class="p-4 border-b border-gray-100 flex items-center justify-between">
          <h3 class="font-bold text-gray-800 flex items-center gap-2">
            <i data-lucide="activity" class="w-5 h-5 text-blue-600"></i>
            最新诊断
            <div class="relative group">
              <i data-lucide="info" class="w-4 h-4 text-gray-400 cursor-pointer"></i>
              <div class="absolute left-0 top-full mt-1 px-3 py-2 bg-gray-800 text-white text-xs rounded-lg opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none whitespace-nowrap z-10">
                得分率
                <div class="absolute -top-1 left-3 w-2 h-2 bg-gray-800 rotate-45"></div>
              </div>
            </div>
          </h3>
        </div>
        <div class="p-6 min-h-[280px]">
          <div class="flex flex-col items-center justify-center text-center">
            <!-- 装饰插画 -->
            <div class="relative mb-4">
              <svg class="w-28 h-28" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- 背景 -->
                <circle cx="60" cy="60" r="50" fill="#eff6ff"/>
                <circle cx="60" cy="60" r="40" fill="#dbeafe"/>
                <!-- 书本/文档 -->
                <rect x="35" y="40" width="50" height="40" rx="4" fill="#bfdbfe" stroke="#3b82f6" stroke-width="2"/>
                <rect x="40" y="45" width="25" height="4" rx="1" fill="#60a5fa"/>
                <rect x="40" y="53" width="35" height="3" rx="1" fill="#93c5fd"/>
                <rect x="40" y="60" width="30" height="3" rx="1" fill="#93c5fd"/>
                <rect x="40" y="67" width="20" height="3" rx="1" fill="#93c5fd"/>
                <!-- 闪电图标 -->
                <path d="M75 25 L65 45 L72 45 L62 65 L80 40 L73 40 Z" fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/>
                <!-- 装饰圆点 -->
                <circle cx="25" cy="50" r="3" fill="#60a5fa" opacity="0.5"/>
                <circle cx="95" cy="85" r="4" fill="#60a5fa" opacity="0.4"/>
                <circle cx="30" cy="80" r="2" fill="#93c5fd" opacity="0.6"/>
                <circle cx="85" cy="25" r="3" fill="#fbbf24" opacity="0.6"/>
                <circle cx="20" cy="70" r="2" fill="#93c5fd" opacity="0.5"/>
              </svg>
            </div>
            <p class="text-sm text-gray-600 font-medium">暂无数据</p>
            <p class="text-xs text-gray-400 mt-1">待学生提交作业后生成数据</p>
          </div>
        </div>
      </div>

      <!-- 模块掌握度 -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100">
        <div class="p-4 border-b border-gray-100 flex items-center justify-between">
          <h3 class="font-bold text-gray-800 flex items-center gap-2">
            <i data-lucide="radar" class="w-5 h-5 text-purple-600"></i>
            模块掌握度
          </h3>
          <select id="gradeSelect" class="text-sm border border-gray-200 rounded-lg px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-purple-500">
            <option value="1-1">一年级一班</option>
            <option value="1-2">一年级二班</option>
            <option value="2-1" selected>二年级一班</option>
            <option value="2-2">二年级二班</option>
            <option value="3-1">三年级一班</option>
            <option value="3-2">三年级二班</option>
          </select>
        </div>
        <div class="p-6 min-h-[280px]">
          <div class="flex flex-col items-center justify-center text-center">
            <!-- 装饰插画 -->
            <div class="relative mb-4">
              <svg class="w-32 h-32" viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- 背景 -->
                <circle cx="70" cy="70" r="55" fill="#faf5ff"/>
                <circle cx="70" cy="70" r="45" fill="#f3e8ff"/>
                <!-- 雷达网格 -->
                <polygon points="70,30 105,55 105,85 70,110 35,85 35,55" stroke="#d8b4fe" stroke-width="1.5" fill="none"/>
                <polygon points="70,40 95,57 95,83 70,100 45,83 45,57" stroke="#d8b4fe" stroke-width="1.5" fill="none"/>
                <polygon points="70,50 85,60 85,80 70,90 55,80 55,60" stroke="#d8b4fe" stroke-width="1.5" fill="none"/>
                <!-- 中心点 -->
                <circle cx="70" cy="70" r="4" fill="#a855f7"/>
                <!-- 雷达线 -->
                <line x1="70" y1="70" x2="70" y2="30" stroke="#d8b4fe" stroke-width="1.5"/>
                <line x1="70" y1="70" x2="105" y2="55" stroke="#d8b4fe" stroke-width="1.5"/>
                <line x1="70" y1="70" x2="105" y2="85" stroke="#d8b4fe" stroke-width="1.5"/>
                <line x1="70" y1="70" x2="70" y2="110" stroke="#d8b4fe" stroke-width="1.5"/>
                <line x1="70" y1="70" x2="35" y2="85" stroke="#d8b4fe" stroke-width="1.5"/>
                <line x1="70" y1="70" x2="35" y2="55" stroke="#d8b4fe" stroke-width="1.5"/>
                <!-- 雷达数据填充 -->
                <polygon points="70,45 92,60 88,82 70,95 50,82 48,60" stroke="#a855f7" stroke-width="2" fill="rgba(168, 85, 247, 0.15)"/>
                <!-- 装饰星星 -->
                <path d="M20 30 L22 35 L27 35 L23 38 L25 43 L20 40 L15 43 L17 38 L13 35 L18 35 Z" fill="#c084fc" opacity="0.5"/>
                <path d="M115 25 L117 30 L122 30 L118 33 L120 38 L115 35 L110 38 L112 33 L108 30 L113 30 Z" fill="#c084fc" opacity="0.4"/>
                <path d="M120 100 L121 103 L124 103 L122 105 L123 108 L120 106 L117 108 L118 105 L116 103 L119 103 Z" fill="#c084fc" opacity="0.3"/>
              </svg>
            </div>
            <p class="text-sm text-gray-600 font-medium">暂无数据</p>
            <p class="text-xs text-gray-400 mt-1">待学生提交作业后生成数据</p>
          </div>
        </div>
      </div>

      <!-- 待办事项 -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 row-span-2 w-72 shrink-0 flex flex-col">
        <div class="p-5 border-b border-gray-100">
          <h3 class="font-bold text-gray-800 flex items-center gap-2">
            <i data-lucide="list-todo" class="w-5 h-5 text-blue-600"></i>
            待办事项
          </h3>
        </div>
        <div class="p-5 flex-1 flex items-center justify-center">
          <div class="flex flex-col items-center text-center">
            <!-- 装饰插画 -->
            <div class="relative mb-4">
              <svg class="w-24 h-24" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- 背景云朵 -->
                <ellipse cx="50" cy="60" rx="35" ry="20" fill="#f1f5f9"/>
                <circle cx="30" cy="55" r="12" fill="#f1f5f9"/>
                <circle cx="70" cy="55" r="12" fill="#f1f5f9"/>
                <circle cx="50" cy="50" r="15" fill="#f1f5f9"/>
                <!-- 待办清单 -->
                <rect x="35" y="30" width="30" height="40" rx="3" fill="white" stroke="#e2e8f0" stroke-width="2"/>
                <rect x="40" y="38" width="8" height="8" rx="1" stroke="#cbd5e1" stroke-width="1.5" fill="none"/>
                <rect x="40" y="50" width="8" height="8" rx="1" stroke="#cbd5e1" stroke-width="1.5" fill="none"/>
                <rect x="52" y="40" width="10" height="2" rx="1" fill="#e2e8f0"/>
                <rect x="52" y="46" width="8" height="2" rx="1" fill="#e2e8f0"/>
                <rect x="52" y="52" width="10" height="2" rx="1" fill="#e2e8f0"/>
                <!-- 休息的人 -->
                <circle cx="50" cy="18" r="8" fill="#bfdbfe"/>
                <path d="M42 22 Q50 28 58 22" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" fill="none"/>
                <!-- 小星星 -->
                <path d="M20 35 L22 40 L27 40 L23 43 L25 48 L20 45 L15 48 L17 43 L13 40 L18 40 Z" fill="#fbbf24" opacity="0.6"/>
                <path d="M80 30 L81 33 L84 33 L82 35 L83 38 L80 36 L77 38 L78 35 L76 33 L79 33 Z" fill="#fbbf24" opacity="0.4"/>
              </svg>
            </div>
            <p class="text-sm text-gray-500 font-medium">暂无待办事项</p>
            <p class="text-xs text-gray-400 mt-1">享受轻松的时光吧</p>
          </div>
        </div>
      </div>

      <!-- 第1-2列（跨2列）：课堂评价排行榜 -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 col-span-2">
        <div class="p-4 border-b border-gray-100">
          <h3 class="font-bold text-gray-800 flex items-center gap-2">
            <i data-lucide="trophy" class="w-5 h-5 text-yellow-500"></i>
            课堂评价排行榜
          </h3>
        </div>
        <div class="p-4">
          <div class="grid grid-cols-2 gap-4">
            <!-- 点赞排行 -->
            <div>
              <div class="flex items-center gap-2 mb-3">
                <i data-lucide="thumbs-up" class="w-4 h-4 text-green-500"></i>
                <span class="text-sm font-medium text-gray-600">点赞TOP5</span>
              </div>
              <div class="flex items-center justify-center py-6">
                <div class="flex flex-col items-center text-center">
                  <!-- 装饰插画 -->
                  <div class="relative mb-3">
                    <svg class="w-28 h-28" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <!-- 背景 -->
                      <circle cx="60" cy="60" r="50" fill="#f0fdf4"/>
                      <!-- 排名领奖台 -->
                      <rect x="25" y="70" width="22" height="25" rx="3" fill="#86efac"/>
                      <rect x="49" y="55" width="22" height="40" rx="3" fill="#22c55e"/>
                      <rect x="73" y="80" width="22" height="15" rx="3" fill="#6ee7b7"/>
                      <!-- 排名数字 -->
                      <text x="36" y="87" text-anchor="middle" fill="white" font-size="14" font-weight="bold">1</text>
                      <text x="60" y="72" text-anchor="middle" fill="white" font-size="14" font-weight="bold">2</text>
                      <text x="84" y="90" text-anchor="middle" fill="white" font-size="14" font-weight="bold">3</text>
                      <!-- 奖杯装饰 -->
                      <path d="M60 20 L65 30 L75 30 L67 37 L70 47 L60 41 L50 47 L53 37 L45 30 L55 30 Z" fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/>
                      <!-- 装饰 -->
                      <circle cx="15" cy="25" r="4" fill="#86efac" opacity="0.6"/>
                      <circle cx="105" cy="35" r="3" fill="#86efac" opacity="0.5"/>
                      <circle cx="100" cy="95" r="4" fill="#86efac" opacity="0.4"/>
                      <circle cx="20" cy="90" r="3" fill="#6ee7b7" opacity="0.5"/>
                    </svg>
                  </div>
                  <p class="text-sm text-gray-500">暂无排名</p>
                  <p class="text-xs text-gray-400 mt-1">上课点评后排行榜实时更新</p>
                </div>
              </div>
            </div>

            <!-- 批评排行 -->
            <div>
              <div class="flex items-center gap-2 mb-3">
                <i data-lucide="thumbs-down" class="w-4 h-4 text-red-500"></i>
                <span class="text-sm font-medium text-gray-600">待改进TOP5</span>
              </div>
              <div class="flex items-center justify-center py-6">
                <div class="flex flex-col items-center text-center">
                  <!-- 装饰插画 -->
                  <div class="relative mb-3">
                    <svg class="w-28 h-28" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <!-- 背景 -->
                      <circle cx="60" cy="60" r="50" fill="#fef2f2"/>
                      <!-- 排名领奖台（倒序） -->
                      <rect x="25" y="45" width="22" height="30" rx="3" fill="#fca5a5"/>
                      <rect x="49" y="55" width="22" height="20" rx="3" fill="#f87171"/>
                      <rect x="73" y="70" width="22" height="5" rx="3" fill="#fecaca"/>
                      <!-- 排名数字 -->
                      <text x="36" y="62" text-anchor="middle" fill="white" font-size="12" font-weight="bold">1</text>
                      <text x="60" y="70" text-anchor="middle" fill="white" font-size="12" font-weight="bold">2</text>
                      <text x="84" y="80" text-anchor="middle" fill="#f87171" font-size="12" font-weight="bold">3</text>
                      <!-- 警示三角 -->
                      <path d="M60 18 L72 35 L48 35 Z" fill="#ef4444"/>
                      <text x="60" y="31" text-anchor="middle" fill="white" font-size="12" font-weight="bold">!</text>
                      <!-- 装饰 -->
                      <circle cx="15" cy="25" r="4" fill="#fca5a5" opacity="0.6"/>
                      <circle cx="105" cy="35" r="3" fill="#fca5a5" opacity="0.5"/>
                      <circle cx="100" cy="95" r="4" fill="#fecaca" opacity="0.4"/>
                      <circle cx="20" cy="90" r="3" fill="#fecaca" opacity="0.5"/>
                    </svg>
                  </div>
                  <p class="text-sm text-gray-500">暂无排名</p>
                  <p class="text-xs text-gray-400 mt-1">上课点评后排行榜实时更新</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 得分率趋势分析 -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100">
        <div class="p-4 border-b border-gray-100 flex items-center justify-between">
          <h3 class="font-bold text-gray-800 flex items-center gap-2">
            <i data-lucide="trending-up" class="w-5 h-5 text-blue-500"></i>
            得分率趋势分析
          </h3>
          <select id="trendGradeSelect" class="text-sm border border-gray-200 rounded-lg px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="2-1" selected>二年级一班</option>
            <option value="1-1">一年级一班</option>
            <option value="1-2">一年级二班</option>
            <option value="2-2">二年级二班</option>
            <option value="3-1">三年级一班</option>
            <option value="3-2">三年级二班</option>
          </select>
        </div>
        <div class="p-6 min-h-[280px]">
          <div class="flex flex-col items-center justify-center text-center">
            <!-- 装饰插画 -->
            <div class="relative mb-4">
              <svg class="w-32 h-28" viewBox="0 0 140 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- 背景 -->
                <rect x="10" y="10" width="120" height="100" rx="8" fill="#eff6ff"/>
                <!-- 坐标轴 -->
                <line x1="25" y1="90" x2="120" y2="90" stroke="#94a3b8" stroke-width="2"/>
                <line x1="25" y1="20" x2="25" y2="90" stroke="#94a3b8" stroke-width="2"/>
                <!-- 网格线 -->
                <line x1="25" y1="70" x2="120" y2="70" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4"/>
                <line x1="25" y1="50" x2="120" y2="50" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4"/>
                <line x1="25" y1="30" x2="120" y2="30" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4"/>
                <!-- 趋势线虚线 -->
                <line x1="35" y1="75" x2="55" y2="65" stroke="#60a5fa" stroke-width="2" stroke-dasharray="4"/>
                <line x1="55" y1="65" x2="75" y2="55" stroke="#60a5fa" stroke-width="2" stroke-dasharray="4"/>
                <line x1="75" y1="55" x2="95" y2="45" stroke="#60a5fa" stroke-width="2" stroke-dasharray="4"/>

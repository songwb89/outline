<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开套餐 - 运营平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://registry.npmmirror.com/lucide/latest/files/dist/umd/lucide.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0f3ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
                            400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
                            800: '#3730a3', 900: '#312e81',
                        },
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        html, body { height: 100%; overflow: hidden; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; }
        .toast {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            color: white; padding: 12px 24px; border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); z-index: 10000;
            display: flex; align-items: center; gap: 12px;
            opacity: 0; transition: all 0.3s ease; pointer-events: none;
        }
        .toast.show { opacity: 1; pointer-events: all; transform: translateX(-50%) translateY(0); }
        .toast.hide { opacity: 0; transform: translateX(-50%) translateY(-8px); }
        .toast.toast-success { background: #10b981; }
        .toast.toast-info { background: #3b82f6; }
        .toast.toast-error { background: #ef4444; }
        thead { position: sticky; top: 0; z-index: 10; }
        .admin-nav-subitem { transition: all 0.15s ease; }
        .admin-nav-subitem:hover { background-color: #eef2ff; color: #4f46e5; }
        .admin-nav-subitem.active { background-color: #e0e7ff; color: #4f46e5; }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div class="px-6 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gradient-to-br from-primary-500 to-purple-600 rounded-xl flex items-center justify-center text-white font-bold shadow-lg">
                    <i data-lucide="sparkles" class="w-4 h-4"></i>
                </div>
                <span class="text-base font-semibold text-gray-800">运营平台</span>
            </div>
            <div class="flex items-center gap-3">
                <div class="w-7 h-7 bg-gradient-to-br from-primary-500 to-purple-600 rounded-full flex items-center justify-center text-white text-xs font-semibold">A</div>
                <span class="text-sm text-gray-700 font-medium">管理员</span>
            </div>
        </div>
    </header>

    <div class="flex h-[calc(100vh-57px)]">

        <!-- 左侧菜单 -->
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col">
            <nav class="flex-1 overflow-y-auto py-4">
                <!-- 一级菜单：学校管理 -->
                <div class="admin-nav-group px-4 mb-1">
                    <button type="button" class="admin-nav-group-btn w-full text-left flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg text-gray-700 hover:bg-gray-50">
                        <i data-lucide="users" class="w-5 h-5 text-gray-400"></i>
                        <span>学校管理</span>
                        <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400 ml-auto group-arrow"></i>
                    </button>
                    <div class="nav-children ml-4 mt-1 space-y-0.5 hidden">
                        <a href="admin-school.html" class="admin-nav-subitem w-full text-left flex items-center gap-2 pl-4 pr-3 py-2 text-sm font-medium rounded-lg">
                            <i data-lucide="building-2" class="w-4 h-4"></i>
                            <span>学校管理</span>
                        </a>
                        <a href="admin-points.html" class="admin-nav-subitem w-full text-left flex items-center gap-2 pl-4 pr-3 py-2 text-sm font-medium rounded-lg">
                            <i data-lucide="coins" class="w-4 h-4"></i>
                            <span>点数管理</span>
                        </a>
                    </div>
                </div>

                <!-- 一级菜单：采购管理 -->
                <div class="admin-nav-group px-4 mb-1">
                    <button type="button" class="admin-nav-group-btn w-full text-left flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg text-gray-700">
                        <i data-lucide="shopping-cart" class="w-5 h-5 text-gray-400"></i>
                        <span>采购管理</span>
                        <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400 ml-auto group-arrow"></i>
                    </button>
                    <div class="nav-children ml-4 mt-1 space-y-0.5">
                        <a href="admin-purchase.html" class="admin-nav-subitem active w-full text-left flex items-center gap-2 pl-4 pr-3 py-2 text-sm font-medium rounded-lg">
                            <i data-lucide="package-check" class="w-4 h-4"></i>
                            <span>开套餐</span>
                        </a>
                        <a href="admin-recharge.html" class="admin-nav-subitem w-full text-left flex items-center gap-2 pl-4 pr-3 py-2 text-sm font-medium rounded-lg">
                            <i data-lucide="credit-card" class="w-4 h-4"></i>
                            <span>点数管理</span>
                        </a>
                        <a href="admin-trial.html" class="admin-nav-subitem w-full text-left flex items-center gap-2 pl-4 pr-3 py-2 text-sm font-medium rounded-lg">
                            <i data-lucide="clock" class="w-4 h-4"></i>
                            <span>试用开通</span>
                        </a>
                    </div>
                </div>

                <!-- 一级菜单：产品管理 -->
                <div class="admin-nav-group px-4 mb-1">
                    <button type="button" class="admin-nav-group-btn w-full text-left flex items-center gap-3 px-3 py-2.5 text-sm font-medium rounded-lg text-gray-700 hover:bg-gray-50">
                        <i data-lucide="package" class="w-5 h-5 text-gray-400"></i>
                        <span>产品管理</span>
                        <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400 ml-auto group-arrow"></i>
                    </button>
                    <div class="nav-children ml-4 mt-1 space-y-0.5 hidden">
                        <a href="admin-price-config.html" class="admin-nav-subitem w-full text-left flex items-center gap-2 pl-4 pr-3 py-2 text-sm font-medium rounded-lg">
                            <i data-lucide="calculator" class="w-4 h-4"></i>
                            <span>消耗规则</span>
                        </a>
                        <a href="admin-package.html" class="admin-nav-subitem w-full text-left flex items-center gap-2 pl-4 pr-3 py-2 text-sm font-medium rounded-lg">
                            <i data-lucide="layers" class="w-4 h-4"></i>
                            <span>套餐管理</span>

            </nav>
        </aside>

        <main class="flex-1 overflow-hidden flex flex-col">
            <div class="h-full px-6 pt-6 overflow-y-auto">
                <div class="mb-6 flex items-center justify-between">
                    <div>
                        <h1 class="text-2xl font-semibold text-gray-900">开套餐</h1>
                    </div>
                    <button type="button" onclick="openPurchaseModal()" class="px-4 py-2 bg-primary-600 hover:bg-primary-700 text-white rounded-md text-sm font-medium transition-all flex items-center gap-2 shadow-sm">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                        开套餐
                    </button>
                </div>

                <!-- 筛选条件 -->
                <div class="mb-6 bg-white rounded-lg border border-gray-200 p-4 shadow-sm">
                    <div class="flex flex-wrap items-end gap-x-5 gap-y-3">
                        <div class="flex items-center gap-2">
                            <label class="text-xs font-medium text-gray-600 whitespace-nowrap">学校</label>
                            <select id="filterSchool" class="px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 bg-white w-40">
                                <option value="">全部</option>
                            </select>
                        </div>
                        <div class="flex items-center gap-2">
                            <label class="text-xs font-medium text-gray-600 whitespace-nowrap">套餐</label>
                            <select id="filterPackage" class="px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 bg-white w-40">
                                <option value="">全部</option>
                            </select>
                        </div>
                        <div class="flex items-center gap-2">
                            <label class="text-xs font-medium text-gray-600 whitespace-nowrap">状态</label>
                            <select id="filterStatus" class="px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 bg-white w-28">
                                <option value="">全部</option>
                                <option value="active">有效</option>
                                <option value="expired">到期</option>
                                <option value="refunded">已退</option>
                            </select>
                        </div>
                        <button type="button" onclick="applyFilters()" class="px-4 py-2 bg-primary-600 hover:bg-primary-700 text-white rounded-md text-sm font-medium transition-all flex items-center gap-2 shadow-sm">
                            <i data-lucide="search" class="w-4 h-4"></i>查询
                        </button>
                    </div>
                </div>

                <!-- 数据表格 -->
                <div class="bg-white rounded-lg border border-gray-200 shadow-sm flex flex-col" style="height: calc(100vh - 340px); min-height: 300px;">
                    <div class="overflow-x-auto overflow-y-auto flex-1">
                        <table class="w-full min-w-[900px]">
                            <thead class="bg-gray-50 border-b border-gray-200">
                                <tr>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">序号</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">学校名称</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">套餐</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">金额</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">有效期</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">剩余点数</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">状态</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">操作</th>
                                </tr>
                            </thead>
                            <tbody id="purchaseTableBody" class="bg-white divide-y divide-gray-100"></tbody>
                        </table>
                    </div>
                    <div class="px-6 py-4 border-t border-gray-200 flex flex-wrap items-center justify-between gap-4 bg-white flex-shrink-0">
                        <div class="flex items-center gap-2 text-sm text-gray-600">
                            <span>共 <span id="totalCount">0</span> 条</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <button type="button" id="prevBtn" onclick="goToPreviousPage()" class="p-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-all">
                                <i data-lucide="chevron-left" class="w-4 h-4"></i>
                            </button>
                            <div class="flex items-center gap-1" id="pageNumbers"></div>
                            <button type="button" id="nextBtn" onclick="goToNextPage()" class="p-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-all">
                                <i data-lucide="chevron-right" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 新增/编辑采购弹窗 -->
    <div id="purchase-modal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/45" onclick="hidePurchaseModal()"></div>
        <div class="relative bg-white rounded-2xl shadow-2xl overflow-hidden" style="transform: scale(0.95); width: 100%; max-width: 480px; margin: 80px auto 0;">
            <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between shrink-0">
                <h3 class="font-semibold text-gray-800" id="modal-title">开套餐</h3>
                <button type="button" onclick="hidePurchaseModal()" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="px-6 py-5 flex flex-col gap-4">
                <div class="flex flex-col gap-1.5">
                    <label class="text-sm font-medium text-gray-700">学校 <span class="text-red-500">*</span></label>
                    <select id="pm-school" class="px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 bg-white">
                        <option value="">请选择学校</option>
                    </select>
                    <p id="pm-err-school" class="text-sm text-red-500 hidden"></p>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-sm font-medium text-gray-700">套餐 <span class="text-red-500">*</span></label>
                    <select id="pm-package" class="px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 bg-white">
                        <option value="">请选择套餐</option>
                    </select>
                    <p id="pm-err-package" class="text-sm text-red-500 hidden"></p>
                </div>
                <div id="package-info" class="bg-blue-50 rounded-lg p-3 text-xs text-blue-700 hidden"></div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-sm font-medium text-gray-700">成交金额 <span class="text-red-500">*</span></label>
                    <div class="flex items-center gap-2">
                        <span class="text-sm text-gray-500">¥</span>
                        <input type="number" id="pm-amount" placeholder="0.00" min="0" step="0.01" class="flex-1 px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
                    </div>
                    <p id="pm-err-amount" class="text-sm text-red-500 hidden"></p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1.5">
                        <label class="text-sm font-medium text-gray-700">生效日期 <span class="text-red-500">*</span></label>
                        <input type="date" id="pm-start-date" class="px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
                        <p id="pm-err-start-date" class="text-sm text-red-500 hidden"></p>
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label class="text-sm font-medium text-gray-700">到期日期 <span class="text-red-500">*</span></label>
                        <input type="date" id="pm-end-date" class="px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
                        <p id="pm-err-end-date" class="text-sm text-red-500 hidden"></p>
                    </div>
                </div>
            </div>
            <div class="px-6 py-4 border-t border-gray-100 flex justify-end gap-3 shrink-0">
                <button type="button" onclick="hidePurchaseModal()" class="px-5 py-2.5 border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-50 transition-colors">取消</button>
                <button type="button" onclick="savePurchase()" class="px-5 py-2.5 bg-primary-600 hover:bg-primary-700 text-white rounded-lg text-sm font-medium transition-colors shadow-sm">确认</button>
            </div>
        </div>
    </div>

    <!-- 退订确认弹窗 -->
    <div id="refund-modal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm mx-4 overflow-hidden">
            <div class="px-6 py-5 border-b border-gray-100">
                <h3 class="text-lg font-semibold text-gray-900">确认退订</h3>
            </div>
            <div class="px-6 py-5">
                <div class="flex items-start gap-4">
                    <div class="flex-shrink-0 w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center">
                        <i data-lucide="alert-triangle" class="w-5 h-5 text-orange-600"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-700">确定要退订该套餐吗？</p>
                        <p class="text-sm text-gray-500 mt-1">退订后该采购记录将标记为已退状态。</p>
                    </div>
                </div>
            </div>
            <div class="px-6 py-4 border-t border-gray-100 flex justify-end gap-3 bg-gray-50">
                <button type="button" onclick="hideRefundModal()" class="px-5 py-2.5 border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-100 transition-colors">取消</button>
                <button type="button" onclick="confirmRefund()" class="px-5 py-2.5 bg-orange-600 hover:bg-orange-700 text-white rounded-lg text-sm font-medium transition-colors shadow-sm">确认退订</button>
            </div>
        </div>
    </div>

    <script>
        // 菜单展开/收起
        document.querySelectorAll('.admin-nav-group-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const children = this.nextElementSibling;
                if (children) children.classList.toggle('hidden');
                lucide.createIcons();
            });
        });

        // 模拟数据 - 不使用浏览器缓存
        const schoolsData = [
            { id: 'school1', name: '深圳实验学校小学部', code: 'SYXX' },
            { id: 'school2', name: '深圳外国语小学', code: 'SWXX' },
            { id: 'school3', name: '深圳外国语学校附属碧海小学', code: 'BLXX' },
            { id: 'school4', name: '海滨小学', code: 'HLXX' },
            { id: 'school5', name: '南海小学', code: 'NHXX' },
            { id: 'school6', name: '育才一小', code: 'YXXX' },
            { id: 'school7', name: '学府一小', code: 'XSXX' },
            { id: 'school8', name: '百丽小学', code: 'BLYXX' },
        ];

        const packagesData = [
            { id: 'pkg1', name: '基础版', type: 'billing', initialPoints: 100, durationDays: 30, price: 500 },
            { id: 'pkg2', name: '基础版', type: 'billing', initialPoints: 1500, durationDays: 365, price: 5000 },
            { id: 'pkg3', name: '高级版', type: 'billing', initialPoints: 700, durationDays: 365, price: 8000 },
            { id: 'pkg4', name: '尊享版', type: 'billing', initialPoints: 1500, durationDays: 365, price: 15000 },
        ];

        let purchaseData = [
            { id: 'pur1', schoolId: 'school1', schoolName: '深圳实验学校小学部', packageId: 'pkg2', packageName: '基础版', amount: 5000, startDate: '2025-01-01', endDate: '2025-12-31', initialPoints: 1500, currentPoints: 89, status: 'active' },
            { id: 'pur2', schoolId: 'school2', schoolName: '深圳外国语小学', packageId: 'pkg2', packageName: '基础版', amount: 5000, startDate: '2025-01-01', endDate: '2025-12-31', initialPoints: 1500, currentPoints: 1500, status: 'active' },
            { id: 'pur3', schoolId: 'school3', schoolName: '深圳外国语学校附属碧海小学', packageId: 'pkg1', packageName: '基础版', amount: 3000, startDate: '2025-03-01', endDate: '2026-03-01', initialPoints: 100, currentPoints: 120, status: 'active' },
            { id: 'pur4', schoolId: 'school4', schoolName: '海滨小学', packageId: 'pkg3', packageName: '高级版', amount: 8000, startDate: '2024-06-01', endDate: '2025-06-01', initialPoints: 700, currentPoints: 12, status: 'expired' },
            { id: 'pur5', schoolId: 'school5', schoolName: '南海小学', packageId: 'pkg3', packageName: '高级版', amount: 7000, startDate: '2025-02-01', endDate: '2026-02-01', initialPoints: 700, currentPoints: 450, status: 'active' },
            { id: 'pur6', schoolId: 'school6', schoolName: '育才一小', packageId: 'pkg4', packageName: '尊享版', amount: 14000, startDate: '2025-01-15', endDate: '2026-01-15', initialPoints: 1500, currentPoints: 1200, status: 'active' },
            { id: 'pur7', schoolId: 'school7', schoolName: '学府一小', packageId: 'pkg2', packageName: '基础版', amount: 4800, startDate: '2024-08-01', endDate: '2025-08-01', initialPoints: 1500, currentPoints: 0, status: 'expired' },
            { id: 'pur8', schoolId: 'school8', schoolName: '百丽小学', packageId: 'pkg1', packageName: '基础版', amount: 500, startDate: '2025-04-01', endDate: '2025-04-30', initialPoints: 100, currentPoints: 100, status: 'active' },
        ];

        let filteredData = [...purchaseData];
        let currentPage = 1;
        let pageSize = 10;
        let modalMode = 'create';
        let modalId = null;
        let refundModalId = null;

        // 初始化筛选下拉
        function initFilters() {
            const schoolSelect = document.getElementById('filterSchool');
            schoolsData.forEach(s => {
                schoolSelect.innerHTML += `<option value="${s.id}">${s.name}</option>`;
            });

            const packageSelect = document.getElementById('filterPackage');
            packagesData.forEach(p => {
                packageSelect.innerHTML += `<option value="${p.id}">${p.name}</option>`;
            });
        }

        // 初始化弹窗下拉
        function initModalSelects() {
            const schoolSelect = document.getElementById('pm-school');
            schoolSelect.innerHTML = '<option value="">请选择学校</option>';
            schoolsData.forEach(s => {
                schoolSelect.innerHTML += `<option value="${s.id}">${s.name}</option>`;
            });

            const packageSelect = document.getElementById('pm-package');
            packageSelect.innerHTML = '<option value="">请选择套餐</option>';
            packagesData.forEach(p => {
                packageSelect.innerHTML += `<option value="${p.id}">${p.name}（${p.initialPoints}点）</option>`;
            });
        }

        // 套餐选择变化
        document.getElementById('pm-package')?.addEventListener('change', function() {
            const pkg = packagesData.find(p => p.id === this.value);
            const infoEl = document.getElementById('package-info');
            if (pkg) {
                infoEl.innerHTML = `<strong>${pkg.name}</strong> - 初始点数：${pkg.initialPoints}点，有效期：${pkg.durationDays}天`;
                infoEl.classList.remove('hidden');
                document.getElementById('pm-amount').value = pkg.price;
            } else {
                infoEl.classList.add('hidden');
                document.getElementById('pm-amount').value = '';
            }
        });

        function applyFilters() {
            const schoolId = document.getElementById('filterSchool').value;
            const packageId = document.getElementById('filterPackage').value;
            const status = document.getElementById('filterStatus').value;

            filteredData = purchaseData.filter(row => {
                if (schoolId && row.schoolId !== schoolId) return false;
                if (packageId && row.packageId !== packageId) return false;
                if (status && row.status !== status) return false;
                return true;
            });
            currentPage = 1;
            renderTable();
            updatePagination();
        }

        function renderTable() {
            const tbody = document.getElementById('purchaseTableBody');
            const startIndex = (currentPage - 1) * pageSize;
            const pageData = filteredData.slice(startIndex, startIndex + pageSize);

            tbody.innerHTML = pageData.map((row, index) => {
                const no = startIndex + index + 1;
                const validPeriod = `${row.startDate} 至 ${row.endDate}`;
                const pointsDisplay = `${row.currentPoints}/${row.initialPoints}`;
                const pointsPercent = Math.round(row.currentPoints / row.initialPoints * 100);

                let statusHtml = '';
                let statusClass = '';
                switch (row.status) {
                    case 'active': statusHtml = '有效'; statusClass = 'bg-green-100 text-green-700'; break;
                    case 'expired': statusHtml = '到期'; statusClass = 'bg-gray-100 text-gray-500'; break;
                    case 'refunded': statusHtml = '已退'; statusClass = 'bg-orange-100 text-orange-700'; break;
                }

                const actionHtml = row.status === 'refunded' 
                    ? `<button onclick="viewPurchase('${row.id}')" class="text-gray-600 hover:text-gray-800 font-medium">查看</button>`
                    : `<button onclick="editPurchase('${row.id}')" class="text-primary-600 hover:text-primary-800 font-medium mr-3">编辑</button>
                       <button onclick="refundPurchase('${row.id}')" class="text-orange-600 hover:text-orange-800 font-medium">退订</button>`;

                return `<tr class="hover:bg-gray-50/80">
                    <td class="px-4 py-3 text-sm text-gray-600">${no}</td>
                    <td class="px-4 py-3 text-sm font-medium text-gray-900">${row.schoolName}</td>
                    <td class="px-4 py-3 text-sm text-gray-800">${row.packageName}</td>
                    <td class="px-4 py-3 text-sm text-gray-800">¥${row.amount.toLocaleString()}</td>
                    <td class="px-4 py-3 text-sm text-gray-600">${validPeriod}</td>
                    <td class="px-4 py-3">
                        <div class="flex items-center gap-2">
                            <span class="text-sm text-gray-800">${pointsDisplay}</span>
                            <div class="w-16 h-1.5 bg-gray-200 rounded-full overflow-hidden">
                                <div class="h-full ${pointsPercent > 20 ? 'bg-green-500' : 'bg-amber-500'} rounded-full" style="width: ${pointsPercent}%"></div>
                            </div>
                        </div>
                    </td>
                    <td class="px-4 py-3"><span class="px-2 py-0.5 text-xs font-medium rounded ${statusClass}">${statusHtml}</span></td>
                    <td class="px-4 py-3 text-sm">
                        ${actionHtml}
                    </td>
                </tr>`;
            }).join('');
        }

        function updatePagination() {
            const totalPages = Math.max(1, Math.ceil(filteredData.length / pageSize));
            document.getElementById('totalCount').textContent = filteredData.length;
            document.getElementById('prevBtn').disabled = currentPage <= 1;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages;

            const container = document.getElementById('pageNumbers');
            container.innerHTML = '';
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = i;
                btn.onclick = () => goToPage(i);
                btn.className = i === currentPage
                    ? 'min-w-[32px] px-2 py-1 rounded-md text-sm font-medium bg-primary-600 text-white'
                    : 'min-w-[32px] px-2 py-1 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-100';
                container.appendChild(btn);
            }
        }

        function goToPage(page) {
            const totalPages = Math.max(1, Math.ceil(filteredData.length / pageSize));
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                renderTable();
                updatePagination();
            }
        }
        function goToPreviousPage() { if (currentPage > 1) goToPage(currentPage - 1); }
        function goToNextPage() { goToPage(currentPage + 1); }

        function openPurchaseModal() {
            modalMode = 'create';
            modalId = null;
            document.getElementById('modal-title').textContent = '开套餐';
            document.getElementById('pm-school').value = '';
            document.getElementById('pm-package').value = '';
            document.getElementById('package-info').classList.add('hidden');
            document.getElementById('pm-amount').value = '';
            document.getElementById('pm-start-date').value = '';
            document.getElementById('pm-end-date').value = '';
            document.getElementById('purchase-modal').classList.remove('hidden');
            document.getElementById('pm-school').focus();
            lucide.createIcons();
        }

        function editPurchase(id) {
            const row = purchaseData.find(p => p.id === id);
            if (!row) return;
            modalMode = 'edit';
            modalId = id;
            document.getElementById('modal-title').textContent = '编辑采购';
            document.getElementById('pm-school').value = row.schoolId;
            document.getElementById('pm-package').value = row.packageId;
            document.getElementById('pm-amount').value = row.amount;
            document.getElementById('pm-start-date').value = row.startDate;
            document.getElementById('pm-end-date').value = row.endDate;
            document.getElementById('purchase-modal').classList.remove('hidden');
            lucide.createIcons();
        }

        function hidePurchaseModal() {
            document.getElementById('purchase-modal').classList.add('hidden');
        }

        function validatePurchase() {
            let valid = true;
            const fields = ['school', 'package', 'amount', 'start-date', 'end-date'];
            fields.forEach(f => {
                document.getElementById(`pm-err-${f}`).classList.add('hidden');
            });

            if (!document.getElementById('pm-school').value) {
                document.getElementById('pm-err-school').textContent = '请选择学校';
                document.getElementById('pm-err-school').classList.remove('hidden');
                valid = false;
            }
            if (!document.getElementById('pm-package').value) {
                document.getElementById('pm-err-package').textContent = '请选择套餐';
                document.getElementById('pm-err-package').classList.remove('hidden');
                valid = false;
            }
            if (!document.getElementById('pm-amount').value || parseFloat(document.getElementById('pm-amount').value) < 0) {
                document.getElementById('pm-err-amount').textContent = '请输入有效的金额';
                document.getElementById('pm-err-amount').classList.remove('hidden');
                valid = false;
            }
            if (!document.getElementById('pm-start-date').value) {
                document.getElementById('pm-err-start-date').textContent = '请选择生效日期';
                document.getElementById('pm-err-start-date').classList.remove('hidden');
                valid = false;
            }
            if (!document.getElementById('pm-end-date').value) {
                document.getElementById('pm-err-end-date').textContent = '请选择到期日期';
                document.getElementById('pm-err-end-date').classList.remove('hidden');
                valid = false;
            }
            return valid;
        }

        function savePurchase() {
            if (!validatePurchase()) return;

            const schoolId = document.getElementById('pm-school').value;
            const packageId = document.getElementById('pm-package').value;
            const school = schoolsData.find(s => s.id === schoolId);
            const pkg = packagesData.find(p => p.id === packageId);

            const data = {
                schoolId: schoolId,
                schoolName: school.name,
                packageId: packageId,
                packageName: pkg.name,
                amount: parseFloat(document.getElementById('pm-amount').value),
                startDate: document.getElementById('pm-start-date').value,
                endDate: document.getElementById('pm-end-date').value,
                initialPoints: pkg.initialPoints,
                currentPoints: modalMode === 'edit' ? (purchaseData.find(p => p.id === modalId)?.currentPoints || pkg.initialPoints) : pkg.initialPoints,
                status: 'active'
            };

            if (modalMode === 'create') {
                data.id = 'pur' + Date.now();
                purchaseData.push(data);

                // 自动创建套餐发放记录
                const grantRecord = {
                    id: 'rc' + Date.now(),
                    schoolId: schoolId,
                    schoolName: school.name,
                    purchaseId: data.id,
                    purchaseName: pkg.name,
                    type: 'grant',
                    points: pkg.initialPoints,
                    amount: 0,
                    time: data.startDate + ' 09:00',
                    remark: '开通' + pkg.name + '套餐发放'
                };

                // 获取并更新点数记录
                let rechargeRecords = JSON.parse(localStorage.getItem('pointRecords') || '[]');
                rechargeRecords.push(grantRecord);
                localStorage.setItem('pointRecords', JSON.stringify(rechargeRecords));

                showToast('采购记录已创建');
            } else {
                const idx = purchaseData.findIndex(p => p.id === modalId);
                if (idx !== -1) {
                    purchaseData[idx] = { ...purchaseData[idx], ...data };
                }
                showToast('采购记录已更新');
            }

            hidePurchaseModal();
            applyFilters();
        }

        function refundPurchase(id) {
            refundModalId = id;
            document.getElementById('refund-modal').classList.remove('hidden');
            lucide.createIcons();
        }

        function hideRefundModal() {
            document.getElementById('refund-modal').classList.add('hidden');
            refundModalId = null;
        }

        function confirmRefund() {
            if (!refundModalId) return;
            const idx = purchaseData.findIndex(p => p.id === refundModalId);
            if (idx !== -1) {
                purchaseData[idx].status = 'refunded';
                purchaseData[idx].refundedAt = new Date().toISOString().split('T')[0];
            }
            hideRefundModal();
            applyFilters();
            showToast('套餐已退订');
        }

        function viewPurchase(id) {
            const row = purchaseData.find(p => p.id === id);
            if (!row) return;
            alert(`采购记录详情\n\n学校：${row.schoolName}\n套餐：${row.packageName}\n金额：¥${row.amount.toLocaleString()}\n有效期：${row.startDate} 至 ${row.endDate}\n剩余点数：${row.currentPoints}/${row.initialPoints}\n状态：已退\n退订时间：${row.refundedAt || '-'}`);
        }

        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast toast-success';
            toast.innerHTML = `<i data-lucide="check-circle"></i><span>${message}</span>`;
            document.body.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initFilters();
            initModalSelects();
            renderTable();
            updatePagination();
            lucide.createIcons();
        });
    </script>
</body>
</html>

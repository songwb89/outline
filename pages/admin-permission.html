<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>权限配置 - 运营平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://registry.npmmirror.com/lucide/latest/files/dist/umd/lucide.js"></script>
    <script src="sidebar.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0f3ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
                            400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
                            800: '#3730a3', 900: '#312e81',
                        },
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        html, body { height: 100%; overflow: hidden; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; }
        .toast {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            color: white; padding: 12px 24px; border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); z-index: 10000;
            display: flex; align-items: center; gap: 12px;
            opacity: 0; transition: all 0.3s ease; pointer-events: none;
        }
        .toast.show { opacity: 1; pointer-events: all; transform: translateX(-50%) translateY(0); }
        .toast.hide { opacity: 0; transform: translateX(-50%) translateY(-8px); }
        .toast.toast-success { background: #10b981; }
        .toast.toast-info { background: #3b82f6; }
        .toast.toast-error { background: #ef4444; }
        thead { position: sticky; top: 0; z-index: 10; }
        .admin-nav-subitem { transition: all 0.15s ease; }
        .admin-nav-subitem:hover { background-color: #eef2ff; color: #4f46e5; }
        .admin-nav-subitem.active { background-color: #e0e7ff; color: #4f46e5; }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div class="px-6 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gradient-to-br from-primary-500 to-purple-600 rounded-xl flex items-center justify-center text-white font-bold shadow-lg">
                    <i data-lucide="sparkles" class="w-4 h-4"></i>
                </div>
                <span class="text-base font-semibold text-gray-800">运营平台</span>
            </div>
            <div class="flex items-center gap-3">
                <div class="w-7 h-7 bg-gradient-to-br from-primary-500 to-purple-600 rounded-full flex items-center justify-center text-white text-xs font-semibold">A</div>
                <span class="text-sm text-gray-700 font-medium">管理员</span>
            </div>
        </div>
    </header>

    <div class="flex h-[calc(100vh-57px)]">

        <!-- 左侧菜单 -->
        <div id="sidebar-container"></div>

        <main class="flex-1 overflow-hidden flex flex-col">

            <!-- ==================== 面板: 权限配置 ==================== -->
            <div class="h-full px-6 pt-6 overflow-y-auto">
                <div class="mb-6 flex items-center justify-between">
                    <div>
                        <h1 class="text-2xl font-semibold text-gray-900">菜单管理</h1>
                    </div>
                    <button onclick="openPageModal()" class="inline-flex items-center gap-2 px-4 py-2.5 bg-primary-500 hover:bg-primary-600 text-white text-sm font-medium rounded-lg transition-colors shadow-sm">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                        新增页面
                    </button>
                </div>

                <!-- 页面列表表格 -->
                <div class="bg-white rounded-lg border border-gray-200 shadow-sm">
                    <div class="px-4 py-3 border-b border-gray-200 flex gap-4">
                        <input type="text" id="pageSearch" placeholder="搜索页面名称或编码" class="flex-1 max-w-xs px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-gray-50">
                                <tr class="text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    <th class="px-4 py-3">页面名称</th>
                                    <th class="px-4 py-3">页面编码</th>
                                    <th class="px-4 py-3">状态</th>
                                    <th class="px-4 py-3">功能数量</th>
                                    <th class="px-4 py-3 w-32">操作</th>
                                </tr>
                            </thead>
                            <tbody id="pageTableBody" class="divide-y divide-gray-100">
                                <!-- 动态渲染 -->
                            </tbody>
                        </table>
                    </div>

                    <!-- 分页 -->
                    <div class="px-4 py-3 border-t border-gray-200 flex items-center justify-between">
                        <div class="text-sm text-gray-500">
                            共 <span id="totalCount">0</span> 条记录
                        </div>
                        <div id="pagination" class="flex items-center gap-1">
                            <!-- 动态渲染 -->
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="toast"></div>

    <!-- 新增/编辑页面弹窗 -->
    <div id="pageModal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-xl shadow-2xl w-[480px]">
            <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
                <h3 id="pageModalTitle" class="text-lg font-semibold text-gray-900">新增页面</h3>
                <button onclick="closePageModal()" class="text-gray-400 hover:text-gray-600">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="px-6 py-4">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">页面名称 <span class="text-red-500">*</span></label>
                    <input type="text" id="pageNameInput" placeholder="如：智能备课" class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">页面编码 <span class="text-red-500">*</span></label>
                    <input type="text" id="pageCodeInput" placeholder="如：prepare" class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
                </div>
            </div>
            <div class="px-6 py-4 border-t border-gray-200 flex justify-end gap-3">
                <button onclick="closePageModal()" class="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">取消</button>
                <button onclick="savePage()" class="px-4 py-2 bg-primary-500 hover:bg-primary-600 text-white rounded-md text-sm font-medium transition-colors">保存</button>
            </div>
        </div>
    </div>

    <!-- 功能配置大弹窗 -->
    <div id="featureModal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-xl shadow-2xl w-[900px] max-h-[85vh] flex flex-col">
            <!-- 弹窗头部 -->
            <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between flex-shrink-0">
                <div>
                    <h3 class="text-lg font-semibold text-gray-900">功能配置</h3>
                    <p id="featureModalSubtitle" class="text-sm text-gray-500 mt-0.5"></p>
                </div>
                <button onclick="closeFeatureModal()" class="text-gray-400 hover:text-gray-600">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <!-- 功能工具栏 -->
            <div class="px-6 py-3 border-b border-gray-100 flex items-center justify-between flex-shrink-0">
                <input type="text" id="featureSearch" placeholder="搜索功能名称或编码" class="w-64 px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
                <button onclick="openAddFeatureModal()" class="inline-flex items-center gap-2 px-3 py-1.5 bg-primary-500 hover:bg-primary-600 text-white text-sm font-medium rounded-md transition-colors">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                    新增功能
                </button>
            </div>

            <div class="flex-1 overflow-y-auto p-6">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr class="text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                            <th class="px-4 py-3">排序</th>
                            <th class="px-4 py-3">功能名称</th>
                            <th class="px-4 py-3">权限编码</th>
                            <th class="px-4 py-3">状态</th>
                            <th class="px-4 py-3 w-36">操作</th>
                        </tr>
                    </thead>
                    <tbody id="featureTableBody" class="divide-y divide-gray-100">
                        <!-- 动态渲染 -->
                    </tbody>
                </table>

                <!-- 空状态 -->
                <div id="featureEmptyState" class="hidden text-center py-16">
                    <i data-lucide="inbox" class="w-16 h-16 mx-auto mb-4 text-gray-300"></i>
                    <p class="text-gray-500 mb-1">暂无功能配置</p>
                    <p class="text-sm text-gray-400">点击上方"新增功能"添加该页面的功能点</p>
                </div>
            </div>

            <!-- 弹窗底部 -->
            <div class="px-6 py-4 border-t border-gray-200 flex justify-end flex-shrink-0">
                <button onclick="closeFeatureModal()" class="px-5 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-md text-sm font-medium transition-colors">关闭</button>
            </div>
        </div>
    </div>

    <!-- 新增/编辑功能弹窗 -->
    <div id="addFeatureModal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-[60] hidden">
        <div class="bg-white rounded-xl shadow-2xl w-[480px]">
            <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
                <h3 id="addFeatureModalTitle" class="text-lg font-semibold text-gray-900">新增功能</h3>
                <button onclick="closeAddFeatureModal()" class="text-gray-400 hover:text-gray-600">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="px-6 py-4">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">功能名称 <span class="text-red-500">*</span></label>
                    <input type="text" id="featureNameInput" placeholder="如：添加教案" class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">权限编码 <span class="text-red-500">*</span></label>
                    <input type="text" id="featureCodeInput" placeholder="如：prepare_add" class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
                    <p class="text-xs text-gray-400 mt-1">建议格式：页面编码_功能英文名</p>
                </div>
            </div>
            <div class="px-6 py-4 border-t border-gray-200 flex justify-end gap-3">
                <button onclick="closeAddFeatureModal()" class="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">取消</button>
                <button onclick="saveFeature()" class="px-4 py-2 bg-primary-500 hover:bg-primary-600 text-white rounded-md text-sm font-medium transition-colors">保存</button>
            </div>
        </div>
    </div>

    <script>
        // 初始化侧边栏
        renderSidebar('admin-permission.html');

        // 页面数据（来自笔记.txt）
        let pages = [
            { id: 1, name: '智能备课', code: 'prepare', status: 1 },
            { id: 2, name: '作业&批改', code: 'homework', status: 1 },
            { id: 3, name: 'AI讲题', code: 'explain', status: 1 },
            { id: 4, name: 'AI讲课', code: 'lecture', status: 1 },
            { id: 5, name: 'AI绘本', code: 'picturebook', status: 1 },
            { id: 6, name: '拍题答疑', code: 'qa', status: 1 },
            { id: 7, name: '智能批改', code: 'grading', status: 1 }
        ];

        // 功能数据（来自笔记.txt）
        let features = [
            // 智能备课
            { id: 1, pageId: 1, name: '添加教案', code: 'prepare_add', sort: 1, status: 1 },
            { id: 2, pageId: 1, name: 'AI生成教案', code: 'prepare_ai', sort: 2, status: 1 },
            { id: 3, pageId: 1, name: '上传教案', code: 'prepare_upload', sort: 3, status: 1 },
            { id: 4, pageId: 1, name: '添加课件', code: 'prepare_add_courseware', sort: 4, status: 1 },
            { id: 5, pageId: 1, name: 'AI生成课件', code: 'prepare_ai_courseware', sort: 5, status: 1 },
            { id: 6, pageId: 1, name: '上传课件', code: 'prepare_upload_courseware', sort: 6, status: 1 },
            { id: 7, pageId: 1, name: '添加学案', code: 'prepare_add_study', sort: 7, status: 1 },
            { id: 8, pageId: 1, name: 'AI生成学案', code: 'prepare_ai_study', sort: 8, status: 1 },
            // 作业&批改
            { id: 9, pageId: 2, name: '自主组卷', code: 'homework_self', sort: 1, status: 1 },
            { id: 10, pageId: 2, name: '精细化组卷', code: 'homework_precise', sort: 2, status: 1 },
            { id: 11, pageId: 2, name: '快速组卷', code: 'homework_quick', sort: 3, status: 1 },
            { id: 12, pageId: 2, name: 'AI试卷库', code: 'homework_ai_bank', sort: 4, status: 1 },
            { id: 13, pageId: 2, name: '智能AI组卷', code: 'homework_ai', sort: 5, status: 1 },
            { id: 14, pageId: 2, name: '个人题库', code: 'homework_personal', sort: 6, status: 1 },
            { id: 15, pageId: 2, name: '公共题库', code: 'homework_public', sort: 7, status: 1 },
            // AI讲题
            { id: 16, pageId: 3, name: '生成讲解', code: 'explain_generate', sort: 1, status: 1 },
            // AI讲课
            { id: 17, pageId: 4, name: '上传本地文件', code: 'lecture_upload', sort: 1, status: 1 },
            { id: 18, pageId: 4, name: '选择在线课件', code: 'lecture_select', sort: 2, status: 1 },
            { id: 19, pageId: 4, name: '生成视频概览', code: 'lecture_overview', sort: 3, status: 1 },
            // AI绘本
            { id: 20, pageId: 5, name: '生成大纲', code: 'picturebook_outline', sort: 1, status: 1 },
            { id: 21, pageId: 5, name: '生成绘本', code: 'picturebook_generate', sort: 2, status: 1 },
            // 拍题答疑
            { id: 22, pageId: 6, name: '本地上传', code: 'qa_local', sort: 1, status: 1 },
            { id: 23, pageId: 6, name: '手机上传', code: 'qa_mobile', sort: 2, status: 1 },
            // 智能批改
            { id: 24, pageId: 7, name: '创建智能批改', code: 'grading_create', sort: 1, status: 1 }
        ];

        let currentPageId = null;
        let editingPageId = null;
        let editingFeatureId = null;
        let currentPage = 1;
        const pageSize = 10;

        // ============ 页面相关 ============

        function renderPageTable() {
            const tbody = document.getElementById('pageTableBody');
            const searchValue = document.getElementById('pageSearch').value.toLowerCase();

            let filtered = pages.filter(p =>
                p.name.toLowerCase().includes(searchValue) ||
                p.code.toLowerCase().includes(searchValue)
            );

            document.getElementById('totalCount').textContent = filtered.length;

            const totalPages = Math.ceil(filtered.length / pageSize) || 1;
            if (currentPage > totalPages) currentPage = totalPages;

            const start = (currentPage - 1) * pageSize;
            const pageData = filtered.slice(start, start + pageSize);

            if (pageData.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4" class="px-4 py-16 text-center text-gray-400">
                            <i data-lucide="layout" class="w-12 h-12 mx-auto mb-3 opacity-30"></i>
                            <p class="text-sm">暂无页面数据</p>
                        </td>
                    </tr>
                `;
                lucide.createIcons();
            } else {
                tbody.innerHTML = pageData.map(p => {
                    const featureCount = features.filter(f => f.pageId === p.id).length;
                    return `
                        <tr class="hover:bg-gray-50">
                            <td class="px-4 py-3 text-sm font-medium text-gray-900">${p.name}</td>
                            <td class="px-4 py-3 text-sm text-gray-500 font-mono">${p.code}</td>
                            <td class="px-4 py-3">
                                <button onclick="togglePageStatus(${p.id})" class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors ${p.status === 1 ? 'bg-primary-500' : 'bg-gray-200'}">
                                    <span class="inline-block h-4 w-4 transform rounded-full bg-white shadow-sm transition-transform ${p.status === 1 ? 'translate-x-6' : 'translate-x-1'}"></span>
                                </button>
                            </td>
                            <td class="px-4 py-3 text-sm text-gray-500">${featureCount} 个</td>
                            <td class="px-4 py-3">
                                <div class="flex items-center gap-1">
                                    <button onclick="openFeatureModal(${p.id})" class="p-1.5 text-gray-400 hover:text-primary-500 hover:bg-primary-50 rounded transition-colors" title="配置功能">
                                        <i data-lucide="settings-2" class="w-4 h-4"></i>
                                    </button>
                                    <button onclick="editPage(${p.id})" class="p-1.5 text-gray-400 hover:text-primary-500 hover:bg-primary-50 rounded transition-colors" title="编辑">
                                        <i data-lucide="pencil" class="w-4 h-4"></i>
                                    </button>
                                    <button onclick="deletePage(${p.id})" class="p-1.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded transition-colors" title="删除">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');
            }

            renderPagination(totalPages);
            lucide.createIcons();
        }

        function renderPagination(totalPages) {
            const container = document.getElementById('pagination');
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = '';

            html += `<button onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} class="px-2 py-1 text-sm border border-gray-300 rounded hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                <i data-lucide="chevron-left" class="w-4 h-4"></i>
            </button>`;

            for (let i = 1; i <= totalPages; i++) {
                html += `<button onclick="goPage(${i})" class="px-3 py-1 text-sm border rounded ${i === currentPage ? 'bg-primary-500 text-white border-primary-500' : 'border-gray-300 hover:bg-gray-50'}">${i}</button>`;
            }

            html += `<button onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} class="px-2 py-1 text-sm border border-gray-300 rounded hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                <i data-lucide="chevron-right" class="w-4 h-4"></i>
            </button>`;

            container.innerHTML = html;
            lucide.createIcons();
        }

        function goPage(page) {
            const totalPages = Math.ceil(pages.length / pageSize) || 1;
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderPageTable();
        }

        function togglePageStatus(pageId) {
            const page = pages.find(p => p.id === pageId);
            if (page) {
                page.status = page.status === 1 ? 0 : 1;
                renderPageTable();
                showToast('状态已更新', 'success');
            }
        }

        function toggleFeatureStatus(featureId) {
            const feature = features.find(f => f.id === featureId);
            if (feature) {
                feature.status = feature.status === 1 ? 0 : 1;
                renderFeatureTable();
                showToast('状态已更新', 'success');
            }
        }

        // 页面弹窗
        function openPageModal(page = null) {
            editingPageId = page ? page.id : null;
            document.getElementById('pageModalTitle').textContent = page ? '编辑页面' : '新增页面';

            if (page) {
                document.getElementById('pageNameInput').value = page.name;
                document.getElementById('pageCodeInput').value = page.code;
            } else {
                document.getElementById('pageNameInput').value = '';
                document.getElementById('pageCodeInput').value = '';
            }

            document.getElementById('pageModal').classList.remove('hidden');
        }

        function closePageModal() {
            document.getElementById('pageModal').classList.add('hidden');
            editingPageId = null;
        }

        function editPage(pageId) {
            const page = pages.find(p => p.id === pageId);
            if (page) openPageModal(page);
        }

        function savePage() {
            const name = document.getElementById('pageNameInput').value.trim();
            const code = document.getElementById('pageCodeInput').value.trim();

            if (!name) { showToast('请输入页面名称', 'error'); return; }
            if (!code) { showToast('请输入页面编码', 'error'); return; }

            if (editingPageId) {
                const page = pages.find(p => p.id === editingPageId);
                if (page) {
                    page.name = name;
                    page.code = code;
                }
                showToast('页面已更新', 'success');
            } else {
                const newId = Math.max(...pages.map(p => p.id)) + 1;
                pages.push({ id: newId, name, code });
                showToast('页面已添加', 'success');
            }

            closePageModal();
            renderPageTable();
        }

        function deletePage(pageId) {
            const featureCount = features.filter(f => f.pageId === pageId).length;
            const msg = featureCount > 0
                ? `该页面下有 ${featureCount} 个功能，删除后功能也会被删除。确定要删除吗？`
                : '确定要删除该页面吗？';

            if (!confirm(msg)) return;

            pages = pages.filter(p => p.id !== pageId);
            features = features.filter(f => f.pageId !== pageId);
            renderPageTable();
            showToast('页面已删除', 'success');
        }

        // ============ 功能相关 ============

        function openFeatureModal(pageId) {
            currentPageId = pageId;
            const page = pages.find(p => p.id === pageId);

            document.getElementById('featureModalSubtitle').textContent = `${page.name}（${page.code}）`;
            document.getElementById('featureSearch').value = '';

            renderFeatureTable();
            document.getElementById('featureModal').classList.remove('hidden');
        }

        function closeFeatureModal() {
            document.getElementById('featureModal').classList.add('hidden');
            currentPageId = null;
        }

        function renderFeatureTable() {
            const tbody = document.getElementById('featureTableBody');
            const searchValue = document.getElementById('featureSearch').value.toLowerCase();
            const emptyState = document.getElementById('featureEmptyState');

            const pageFeatures = features
                .filter(f =>
                    f.pageId === currentPageId &&
                    (f.name.toLowerCase().includes(searchValue) || f.code.toLowerCase().includes(searchValue))
                )
                .sort((a, b) => a.sort - b.sort);

            if (pageFeatures.length === 0) {
                tbody.innerHTML = '';
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                tbody.innerHTML = pageFeatures.map((f, index) => {
                    const isFirst = index === 0;
                    const isLast = index === pageFeatures.length - 1;
                    return `
                        <tr class="hover:bg-gray-50">
                            <td class="px-4 py-3 text-sm text-gray-400">${f.sort}</td>
                            <td class="px-4 py-3 text-sm text-gray-900 font-medium">${f.name}</td>
                            <td class="px-4 py-3 text-sm text-gray-500 font-mono">${f.code}</td>
                            <td class="px-4 py-3">
                                <button onclick="toggleFeatureStatus(${f.id})" class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors ${f.status === 1 ? 'bg-primary-500' : 'bg-gray-200'}">
                                    <span class="inline-block h-4 w-4 transform rounded-full bg-white shadow-sm transition-transform ${f.status === 1 ? 'translate-x-6' : 'translate-x-1'}"></span>
                                </button>
                            </td>
                            <td class="px-4 py-3">
                                <div class="flex items-center gap-1">
                                    <button onclick="moveFeature(${f.id}, -1)" ${isFirst ? 'disabled' : ''} class="p-1.5 text-gray-400 hover:text-primary-500 hover:bg-primary-50 rounded transition-colors disabled:opacity-30 disabled:cursor-not-allowed" title="上移">
                                        <i data-lucide="arrow-up" class="w-4 h-4"></i>
                                    </button>
                                    <button onclick="moveFeature(${f.id}, 1)" ${isLast ? 'disabled' : ''} class="p-1.5 text-gray-400 hover:text-primary-500 hover:bg-primary-50 rounded transition-colors disabled:opacity-30 disabled:cursor-not-allowed" title="下移">
                                        <i data-lucide="arrow-down" class="w-4 h-4"></i>
                                    </button>
                                    <button onclick="editFeature(${f.id})" class="p-1.5 text-gray-400 hover:text-primary-500 hover:bg-primary-50 rounded transition-colors" title="编辑">
                                        <i data-lucide="pencil" class="w-4 h-4"></i>
                                    </button>
                                    <button onclick="deleteFeature(${f.id})" class="p-1.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded transition-colors" title="删除">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');
            }

            lucide.createIcons();
        }

        function openAddFeatureModal(feature = null) {
            editingFeatureId = feature ? feature.id : null;
            document.getElementById('addFeatureModalTitle').textContent = feature ? '编辑功能' : '新增功能';

            const page = pages.find(p => p.id === currentPageId);

            if (feature) {
                document.getElementById('featureNameInput').value = feature.name;
                document.getElementById('featureCodeInput').value = feature.code;
            } else {
                document.getElementById('featureNameInput').value = '';
                document.getElementById('featureCodeInput').value = page ? `${page.code}_` : '';
            }

            document.getElementById('addFeatureModal').classList.remove('hidden');
        }

        function closeAddFeatureModal() {
            document.getElementById('addFeatureModal').classList.add('hidden');
            editingFeatureId = null;
        }

        function editFeature(featureId) {
            const feature = features.find(f => f.id === featureId);
            if (feature) openAddFeatureModal(feature);
        }

        function saveFeature() {
            const name = document.getElementById('featureNameInput').value.trim();
            const code = document.getElementById('featureCodeInput').value.trim();

            if (!name) { showToast('请输入功能名称', 'error'); return; }
            if (!code) { showToast('请输入权限编码', 'error'); return; }

            if (editingFeatureId) {
                const feature = features.find(f => f.id === editingFeatureId);
                if (feature) {
                    feature.name = name;
                    feature.code = code;
                }
                showToast('功能已更新', 'success');
            } else {
                const newId = Math.max(...features.map(f => f.id)) + 1;
                const pageFeatures = features.filter(f => f.pageId === currentPageId);
                const maxSort = pageFeatures.length > 0 ? Math.max(...pageFeatures.map(f => f.sort)) : 0;
                features.push({ id: newId, pageId: currentPageId, name, code, sort: maxSort + 1 });
                showToast('功能已添加', 'success');
            }

            closeAddFeatureModal();
            renderFeatureTable();
        }

        function deleteFeature(featureId) {
            if (!confirm('确定要删除该功能吗？')) return;
            features = features.filter(f => f.id !== featureId);
            renderFeatureTable();
            showToast('功能已删除', 'success');
        }

        // 上移/下移功能
        function moveFeature(featureId, direction) {
            const pageFeatures = features
                .filter(f => f.pageId === currentPageId)
                .sort((a, b) => a.sort - b.sort);

            const index = pageFeatures.findIndex(f => f.id === featureId);
            if (index === -1) return;

            const targetIndex = index + direction;
            if (targetIndex < 0 || targetIndex >= pageFeatures.length) return;

            const currentFeature = pageFeatures[index];
            const targetFeature = pageFeatures[targetIndex];

            // 交换 sort 值
            const tempSort = currentFeature.sort;
            currentFeature.sort = targetFeature.sort;
            targetFeature.sort = tempSort;

            renderFeatureTable();
            showToast('排序已调整', 'success');
        }

        // Toast 提示
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<i data-lucide="${type === 'success' ? 'check-circle' : type === 'error' ? 'x-circle' : 'info'}" class="w-5 h-5"></i><span>${message}</span>`;
            toast.classList.add('show');
            lucide.createIcons();

            setTimeout(() => {
                toast.classList.remove('show');
                toast.classList.add('hide');
            }, 2000);
        }

        // 初始化
        document.getElementById('pageSearch').addEventListener('input', () => {
            currentPage = 1;
            renderPageTable();
        });

        document.getElementById('featureSearch').addEventListener('input', renderFeatureTable);

        renderPageTable();
        setTimeout(() => lucide.createIcons(), 100);
    </script>
    <script src="../components/prd-drawer.js" data-doc="../docs/your-doc.md"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课堂分析中心</title>

  <!-- Tailwind CSS（与 prototype.html 保持一致的基础样式体系） -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#f0f3ff',
              100: '#e0e7ff',
              200: '#c7d2fe',
              300: '#a5b4fc',
              400: '#818cf8',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
              800: '#3730a3',
              900: '#312e81',
            },
          }
        }
      }
    }
  </script>

  <!-- Lucide Icons -->
  <script src="https://registry.npmmirror.com/lucide/latest/files/dist/umd/lucide.js"></script>
  <!-- ECharts -->
  <script src="https://registry.npmmirror.com/echarts/5.4.3/files/dist/echarts.min.js"></script>

  <!-- 右侧课堂洞察报告区域样式（基于 ktfx_view.html，去掉 body 通用样式） -->
  <style>
    :root {
      --ktfx-bg: #f5f7fb;
      --ktfx-card-bg: #ffffff;
      --ktfx-primary: #4c6fff;
      --ktfx-primary-soft: #e3e8ff;
      --ktfx-text-main: #111827;
      --ktfx-text-sub: #6b7280;
      --ktfx-border-soft: #e5e7eb;
      --ktfx-accent-green: #16a34a;
      --ktfx-accent-yellow: #f59e0b;
      --ktfx-accent-red: #ef4444;
      --ktfx-shadow-soft: 0 16px 40px rgba(15, 23, 42, 0.12);
      --ktfx-radius-lg: 18px;
      --ktfx-radius-md: 14px;
      --ktfx-radius-pill: 999px;
    }

    /* 右侧报告区域容器 */
    .ktfx-page {
      max-width: 1160px;
      margin: 0 auto;
      width: 100%;
      flex: 1;
      max-width: 100%;
      padding: 4px 6px 12px 6px;
      color: var(--ktfx-text-main);
    }

    /* 报告区域背景：统一浅灰蓝色，避免过于花哨的渐变 */
    .ktfx-report-bg {
      background-color: var(--ktfx-bg);
      flex: 1;
      display: flex;
      min-height: 0;
    }

    .ktfx-title-block h1 {
      font-size: 20px;
      letter-spacing: 0.08em;
      font-weight: 700;
      text-transform: uppercase;
    }

    .ktfx-title-block p {
      margin-top: 4px;
      color: var(--ktfx-text-sub);
      font-size: 13px;
    }

    .ktfx-meta-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    /* 原课视频按钮与前一个标签保持固定间距，而不是跑到最右侧 */
    .ktfx-meta-video-btn {
      margin-left: 16px;
    }

    .ktfx-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: var(--ktfx-radius-pill);
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(148, 163, 184, 0.4);
      backdrop-filter: blur(8px);
      font-size: 12px;
      color: var(--ktfx-text-sub);
    }

    .ktfx-tag-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--ktfx-primary);
    }

    .ktfx-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 12px;
      /* 顶部卡片与标题间隔略缩小 */
      margin-top: 8px;
    }

    .ktfx-layout-top-row {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 12px;
      align-items: stretch;
    }

    .ktfx-layout-two-col-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      align-items: stretch;
    }

    .ktfx-card {
      background: var(--ktfx-card-bg);
      border-radius: var(--ktfx-radius-lg);
      box-shadow: 0 14px 32px rgba(15, 23, 42, 0.06);
      border: 1px solid rgba(148, 163, 184, 0.25);
      padding: 14px 16px 12px;
      position: relative;
      overflow: hidden;
      transition:
        box-shadow 0.18s ease,
        transform 0.18s ease,
        border-color 0.18s ease,
        background-color 0.18s ease;
    }

    /* 顶行“课堂概览”卡片：让虚线摘要框撑满卡片剩余高度，填补底部留白 */
    .ktfx-card--fill {
      display: flex;
      flex-direction: column;
    }

    .ktfx-card--fill .ktfx-card-header {
      flex-shrink: 0;
    }

    .ktfx-card--fill .ktfx-summary-text {
      flex: 1;
      overflow: auto;
      /* 与右侧“课堂节奏”一致：减少标题与内容块之间的外边距（由 header 的 margin-bottom 控制间距） */
      margin-top: 0;
    }

    .ktfx-card:hover {
      box-shadow: 0 20px 46px rgba(15, 23, 42, 0.12);
      transform: translateY(-2px);
      border-color: rgba(59, 130, 246, 0.35);
      background-color: #ffffff;
    }

    .ktfx-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }

    .ktfx-card-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 600;
    }

    .ktfx-card-title-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--ktfx-primary);
      box-shadow: 0 0 0 5px rgba(76, 111, 255, 0.22);
    }

    .ktfx-summary-text {
      font-size: 13px;
      line-height: 1.7;
      color: #111827;
      margin-top: 8px;
      padding: 7px 10px;
      border-radius: 14px;
      background: rgba(249, 250, 251, 0.9);
      border: 1px dashed rgba(148, 163, 184, 0.4);
      position: relative;
      z-index: 1;
    }

    /* 课堂节奏、互动、氛围等其余样式保持与 ktfx_view.html 一致，类名前加 ktfx- 前缀以避免冲突 */
    .ktfx-inline-score {
      display: inline-flex;
      align-items: flex-end;
      gap: 8px;
      font-size: 12px;
      font-weight: 500;
      color: var(--ktfx-text-sub);
    }

    .ktfx-stars {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      font-size: 13px;
      line-height: 1;
    }

    .ktfx-star {
      color: #e5e7eb;
    }

    .ktfx-star-full {
      color: #facc15;
      text-shadow: 0 0 4px rgba(250, 204, 21, 0.6);
    }

    .ktfx-star-num {
      margin-left: 4px;
      font-size: 12px;
      color: var(--ktfx-text-sub);
    }

    .ktfx-text-block {
      font-size: 13px;
      line-height: 1.7;
      color: #111827;
      margin-top: 8px;
      padding: 9px 10px;
      border-radius: 12px;
      background: rgba(248, 250, 252, 0.95);
      border: 1px dashed rgba(148, 163, 184, 0.4);
    }

    .ktfx-climate-scores-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .ktfx-climate-score-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 7px 10px;
      min-height: 40px;
      border-radius: 12px;
      background: rgba(248, 250, 252, 0.95);
      border: 1px dashed rgba(148, 163, 184, 0.4);
    }

    .ktfx-climate-score-item .label {
      font-size: 12px;
      color: var(--ktfx-text-sub);
      white-space: nowrap;
    }

    .ktfx-pill-score {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: var(--ktfx-radius-pill);
      background: rgba(76, 111, 255, 0.08);
      color: var(--ktfx-primary);
      font-size: 12px;
      border: 1px solid rgba(76, 111, 255, 0.35);
      line-height: 1;
      white-space: nowrap;
    }

    .ktfx-pill-green {
      background: rgba(34, 197, 94, 0.08);
      color: var(--ktfx-accent-green);
      border-color: rgba(34, 197, 94, 0.4);
    }

    .ktfx-pill-yellow {
      background: rgba(245, 158, 11, 0.1);
      color: var(--ktfx-accent-yellow);
      border-color: rgba(245, 158, 11, 0.45);
    }

    .ktfx-pill-red {
      background: rgba(239, 68, 68, 0.08);
      color: var(--ktfx-accent-red);
      border-color: rgba(239, 68, 68, 0.42);
    }

    .ktfx-card-feedback {
      margin-top: 12px;
    }

    .ktfx-feedback-stack {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 10px;
      margin-top: 8px;
    }

    .ktfx-feedback-subcard {
      --fb-accent-line: rgba(37, 99, 235, 0.55);
      --fb-accent-tint: rgba(37, 99, 235, 0.08);
      --fb-accent-title: #1e40af;
      border-radius: var(--ktfx-radius-md);
      padding: 10px 10px 8px;
      background: linear-gradient(135deg, var(--fb-accent-tint), rgba(248, 250, 252, 0.96) 65%);
      border: 1px dashed rgba(148, 163, 184, 0.45);
      position: relative;
      overflow: hidden;
    }

    .ktfx-feedback-subcard::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: var(--fb-accent-line);
    }

    .ktfx-feedback-subcard--strengths {
      --fb-accent-line: rgba(22, 163, 74, 0.55);
      --fb-accent-tint: rgba(22, 163, 74, 0.08);
      --fb-accent-title: #166534;
    }

    .ktfx-feedback-subcard--improve {
      --fb-accent-line: rgba(245, 158, 11, 0.65);
      --fb-accent-tint: rgba(245, 158, 11, 0.1);
      --fb-accent-title: #92400e;
    }

    .ktfx-feedback-subcard--focus {
      --fb-accent-line: rgba(37, 99, 235, 0.55);
      --fb-accent-tint: rgba(37, 99, 235, 0.08);
      --fb-accent-title: #1e40af;
    }

    .ktfx-feedback-subcard-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--ktfx-text-sub);
      letter-spacing: 0.02em;
    }

    .ktfx-feedback-subcard-title strong {
      font-size: 13px;
      color: var(--fb-accent-title);
      font-weight: 650;
    }

    .ktfx-feedback-ol {
      margin-top: 4px;
      padding-left: 18px;
      font-size: 13px;
      line-height: 1.75;
      color: #111827;
    }

    .ktfx-feedback-ol li {
      margin-bottom: 6px;
    }

    .ktfx-feedback-ol li::marker {
      color: var(--fb-accent-title);
      font-weight: 650;
    }

    .ktfx-feedback-quote {
      margin-top: 12px;
      padding: 11px 12px;
      border-radius: 14px;
      background: rgba(148, 163, 184, 0.1);
      border: 1px solid rgba(100, 116, 139, 0.45);
      color: #334155;
      font-size: 13px;
      line-height: 1.75;
      position: relative;
    }

    .ktfx-feedback-quote::before {
      content: "结语";
      position: absolute;
      left: 12px;
      top: -10px;
      font-size: 11px;
      color: rgba(51, 65, 85, 0.9);
      background: rgba(241, 245, 249, 0.95);
      padding: 0 6px;
      border-radius: 999px;
      border: 1px solid rgba(100, 116, 139, 0.35);
    }

    .ktfx-chart-row-echarts {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 10px 0 4px;
    }

    .ktfx-chart-row-echarts-mixed {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin: 10px 0 4px;
    }

    .ktfx-chart-col-right {
      display: flex;
      flex-direction: column;
      gap: 12px;
      height: 100%;
    }

    .ktfx-chart-col-right .ktfx-chart-card-echarts {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .ktfx-chart-col-right .ktfx-metric-item {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ktfx-chart-col-right .ktfx-metric-value {
      font-size: 28px;
    }

    .ktfx-chart-card-echarts {
      flex: 1 1 220px;
      padding: 8px 10px 10px;
      border-radius: 12px;
      border: 1px dashed rgba(148, 163, 184, 0.5);
      background: rgba(255, 255, 255, 0.9);
    }

    .ktfx-chart-title {
      font-size: 12px;
      color: var(--ktfx-text-sub);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .ktfx-chart-col-right .ktfx-chart-title {
      justify-content: center;
    }

    .ktfx-echart-box-structure-slim {
      width: 100%;
      height: 54px;
    }

    .ktfx-echart-box-small {
      width: 100%;
      height: 160px;
    }

    .ktfx-metric-item {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    .ktfx-metric-value {
      font-size: 36px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 4px;
    }

    .ktfx-metric-unit {
      font-size: 11px;
      color: #9ca3af;
      font-weight: 400;
    }

    @media (max-width: 880px) {
      .ktfx-layout-top-row {
        grid-template-columns: minmax(0, 1fr);
      }

      .ktfx-layout-two-col-row {
        grid-template-columns: minmax(0, 1fr);
      }

      .ktfx-climate-scores-row {
        grid-template-columns: minmax(0, 1fr);
      }

      .ktfx-chart-row-echarts-mixed {
        grid-template-columns: minmax(0, 1fr);
      }
    }

    /* 左侧课堂列表卡片选中态 - 提升优先级，避免被 Tailwind 的 bg/border 类覆盖 */
    .session-card {
      position: relative;
    }

    .session-delete-btn {
      position: absolute;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      width: 30px;
      height: 30px;
      border-radius: 9999px;
      border: 1px solid rgba(239, 68, 68, 0.22);
      background: rgba(239, 68, 68, 0.08);
      color: rgb(239, 68, 68);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: all 0.18s ease;
      z-index: 2;
    }

    .session-card:hover .session-delete-btn {
      opacity: 1;
    }

    .session-delete-btn:hover {
      background: rgb(239, 68, 68);
      color: #fff;
      transform: translateY(-50%) scale(1.06);
      box-shadow: 0 6px 18px rgba(239, 68, 68, 0.25);
    }

    .session-delete-btn i {
      width: 16px;
      height: 16px;
    }

    .session-card.session-card--active {
      border-color: #3b82f6 !important; /* 蓝色边框 */
      background: #dbeafe !important;   /* 淡蓝背景 */
      box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.65) !important;
      transition:
        background 0.18s ease,
        border-color 0.18s ease,
        box-shadow 0.18s ease;
    }

    .session-card.session-card--active .session-title {
      color: #1e3a8a;
      font-weight: 600;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
  <div class="h-screen flex flex-col">
    <!-- 顶部导航栏（与 ai.html 保持一致） -->
    <header class="bg-gradient-to-r from-blue-600 to-blue-700 text-white shadow-lg">
      <div class="flex items-center justify-between h-16 px-6">
        <!-- 左侧 Logo -->
        <div class="flex items-center gap-3 shrink-0">
          <img src="img/logo.png" alt="兆涵科技" class="h-9 sm:h-10 w-auto max-h-10 object-contain object-left" />
          <div class="flex flex-col leading-tight">
            <span class="text-base sm:text-lg font-bold text-white">兆涵科技</span>
            <span class="text-xs text-white leading-none">Sigma Education</span>
          </div>
        </div>

        <!-- 中间导航 -->
        <nav class="flex items-center gap-1">
          <a href="home.html" class="px-4 py-2 text-sm text-white/80 rounded-lg transition-all hover:bg-white/20 hover:text-white no-underline">
            首页
          </a>
          <a href="prepare.html" class="px-4 py-2 text-sm text-white/80 rounded-lg transition-all hover:bg-white/20 hover:text-white no-underline">智能备课</a>
          <a href="teach.html" class="px-4 py-2 text-sm text-white/80 rounded-lg transition-all hover:bg-white/20 hover:text-white no-underline">智能授课</a>
          <a href="evaluate.html" class="px-4 py-2 text-sm text-white/80 rounded-lg transition-all hover:bg-white/20 hover:text-white no-underline">智能测评</a>
          <a href="ai.html" class="px-4 py-2 text-sm font-medium rounded-lg bg-white/20 transition-all hover:bg-white/30 no-underline text-white">
            AI专区
          </a>
          <a href="academic.html" class="px-4 py-2 text-sm text-white/80 rounded-lg transition-all hover:bg-white/20 hover:text-white no-underline">教务管理</a>
        </nav>

        <!-- 右侧图标 + 用户 -->
        <div class="flex items-center gap-4">
          <!-- 点数显示 -->
          <div class="flex items-center gap-2 bg-white/15 px-3 py-1.5 rounded-lg">
            <i data-lucide="coins" class="w-4 h-4"></i>
            <span class="text-sm font-medium">可用额度：</span>
            <span id="header-points" class="text-sm font-bold">--</span>
          </div>

          <div class="relative cursor-pointer hover:bg-white/20 p-2 rounded-lg transition-all">
            <i data-lucide="list-todo" class="w-5 h-5"></i>
            <span class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white text-xs rounded-full flex items-center justify-center">3</span>
          </div>
          <div class="relative cursor-pointer hover:bg-white/20 p-2 rounded-lg transition-all">
            <i data-lucide="bell" class="w-5 h-5"></i>
            <span class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white text-xs rounded-full flex items-center justify-center">5</span>
          </div>
          <div class="flex items-center gap-3 cursor-pointer hover:bg-white/20 p-2 rounded-lg transition-all">
            <div class="w-8 h-8 bg-white/30 rounded-full flex items-center justify-center">
              <i data-lucide="user" class="w-4 h-4"></i>
            </div>
            <div class="text-sm">
              <div class="font-medium">张老师</div>
            </div>
            <i data-lucide="chevron-down" class="w-4 h-4 text-white/70"></i>
          </div>
        </div>
      </div>
    </header>

    <!-- 主布局区域：左侧列表 + 右侧分析结构 -->
    <div class="flex-1 flex flex-col px-4 lg:px-6 py-4 overflow-hidden">
      <!-- 面包屑导航 -->
      <nav class="flex items-center gap-2 text-sm text-gray-500 mb-3 shrink-0" aria-label="面包屑">
        <a href="ai.html" class="hover:text-blue-600 no-underline text-sm text-gray-500">AI专区</a>
        <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400 shrink-0"></i>
        <span class="text-gray-700 font-medium">课堂分析</span>
      </nav>
      <div class="flex gap-6 flex-1 min-h-0">
        <!-- 左侧功能列表 -->
        <aside class="w-72 flex-shrink-0 flex flex-col">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col flex-1">
            <!-- 顶部上传按钮，参考 prototype 左侧样式：图标 + 文字的大按钮 -->
            <div class="p-3 border-b border-gray-100 space-y-2">
              <button
                id="openUploadVideoModalBtn"
                class="w-full flex items-center justify-center gap-2 bg-primary-500 text-white px-4 py-2.5 rounded-lg hover:bg-primary-600 transition-colors font-medium text-sm">
                <i data-lucide="video" class="w-4 h-4"></i>
                上传视频并分析
              </button>
            </div>

            <!-- 搜索框 -->
            <div class="px-4 pt-3">
              <div class="relative">
                <i data-lucide="search"
                  class="w-4 h-4 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none"></i>
                <input type="text" id="sessionSearchInput" placeholder="搜索标题或单元"
                  class="w-full pl-9 pr-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-primary-400 focus:ring-1 focus:ring-primary-200 bg-gray-50" />
              </div>
            </div>

            <!-- 数量统计 -->
            <div class="px-4 pt-3 text-xs text-gray-500">
              课堂总数：<span id="sessionCount">0</span>
            </div>

            <!-- 列表 -->
            <div id="sessionList" class="overflow-y-auto custom-scrollbar p-3 space-y-2 flex-1">
              <!-- 动态填充课堂项 -->
            </div>
          </div>
        </aside>

        <!-- 右侧报告内容 -->
        <main class="flex-1 flex flex-col overflow-hidden">
          <!-- 让整个报告卡片（含标题栏）成为一个滚动容器，阅读时标题随内容一起滚动 -->
          <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col flex-1 overflow-auto">
            <!-- 右侧顶部标题栏：移动“课堂洞察报告”与标签到这里 -->

  <script>
    // 初始化 Lucide 图标
    if (window.lucide) {
      lucide.createIcons();
    }

    // ====== 课堂列表简单数据（示例） ======
    let currentSessionId = null;
    let currentSessionKeyword = '';
    const ktfxSessionReportTimers = new Map(); // sessionId -> timeoutId

    const ktfxSessions = [
      {
        id: 's1',
        // 标题：独立字段，不再与年级/学科/单元强绑定
        title: '《我多想去看看》朗读与识字',
        grade: '一年级 / 一年级上册',
        subject: '语文',
        unit: '第二单元 / 心愿',
        date: '2024-10-01',
        status: 'done', // done | processing
        createdAt: Date.parse('2024-10-01')
      },
      {
        id: 's2',
        title: '勾股定理：最短路径问题',
        grade: '八年级',
        subject: '数学',
        unit: '勾股定理应用',
        date: '2024-09-28',
        status: 'done',
        createdAt: Date.parse('2024-09-28')
      },
      {
        id: 's3',
        title: '定语从句导入：that/which',
        grade: '九年级',
        subject: '英语',
        unit: '定语从句',
        date: '2024-09-26',
        status: 'done',
        createdAt: Date.parse('2024-09-26')
      }
    ];

    // ====== 上传视频表单选项配置（示例静态数据） ======
    // 示例：从 prototype.html 沿用的筛选维度，做成简单下拉版本
    const subjectOptions = ['语文', '数学', '英语'];

    // 年级（含上下册信息，作为一个字符串选项，简化为单级联动）
    const gradeOptions = [
      '一年级 / 一年级上册',
      '一年级 / 一年级下册',
      '二年级 / 二年级上册',
      '二年级 / 二年级下册',
      '三年级 / 三年级上册',
      '三年级 / 三年级下册'
    ];

    // 教材版本
    const versionOptions = ['统编版（2016）', '人教版', '苏教版'];

    // 单元（示例：真实项目里可以根据学科/年级/版本再做级联）
    const unitOptions = [
      '第一单元 / 相遇',
      '第二单元 / 心愿',
      '第三单元 / 春天的图画'
    ];

    function initUploadVideoFormOptions() {
      const subjectSelect = document.getElementById('subjectSelect');
      const gradeSelect = document.getElementById('gradeSelect');
      const versionSelect = document.getElementById('versionSelect');
      const unitSelect = document.getElementById('unitSelect');
      if (!subjectSelect || !gradeSelect || !versionSelect || !unitSelect) return;

      // 科目
      subjectSelect.innerHTML = '<option value="">请选择科目</option>' +
        subjectOptions.map(s => `<option value="${s}">${s}</option>`).join('');

      // 年级（级联选项，这里做成单级文本，后续可按需要拆成年级 + 册次）
      gradeSelect.innerHTML = '<option value="">请选择年级</option>' +
        gradeOptions.map(g => `<option value="${g}">${g}</option>`).join('');

      // 教材版本
      versionSelect.innerHTML = '<option value="">请选择教材版本</option>' +
        versionOptions.map(v => `<option value="${v}">${v}</option>`).join('');

      // 单元（目前不再做复杂级联，只给出示例选项）
      unitSelect.innerHTML = '<option value="">请选择单元</option>' +
        unitOptions.map(u => `<option value="${u}">${u}</option>`).join('');
    }

    function openUploadVideoModal() {
      const modal = document.getElementById('uploadVideoModal');
      if (!modal) return;
      modal.classList.remove('hidden');
    }

    function closeUploadVideoModal() {
      const modal = document.getElementById('uploadVideoModal');
      if (!modal) return;
      modal.classList.add('hidden');
    }

    function bindUploadVideoEvents() {
      const openBtn = document.getElementById('openUploadVideoModalBtn');
      const closeBtn = document.getElementById('closeUploadVideoModalBtn');
      const cancelBtn = document.getElementById('cancelUploadVideoBtn');
      const modal = document.getElementById('uploadVideoModal');
      const form = document.getElementById('uploadVideoForm');
      const fileInput = document.getElementById('videoFileInput');
      const fileNameLabel = document.getElementById('videoFileName');
      const clearVideoFileBtn = document.getElementById('clearVideoFileBtn');
      const cancelUploadingVideoBtn = document.getElementById('cancelUploadingVideoBtn');
      const chooseVideoFileLabel = document.getElementById('chooseVideoFileLabel');
      const progressContainer = document.getElementById('uploadProgressContainer');
      const progressInner = document.getElementById('uploadProgressInner');
      const progressText = document.getElementById('uploadProgressText');
      const generateBtn = document.getElementById('generateReportBtn');
      const videoPreviewEl = document.getElementById('videoPreviewEl');
      const videoPreviewIconWrap = document.getElementById('videoPreviewIconWrap');
      let uploadTimer = null;
      let isUploadDone = false;
      let lastUploadedFileName = '';
      let previewObjectUrl = '';

      const setGenerateEnabled = (enabled) => {
        if (!generateBtn) return;
        generateBtn.disabled = !enabled;
      };

      const setChooseEnabled = (enabled) => {
        if (!chooseVideoFileLabel) return;
        if (enabled) {
          chooseVideoFileLabel.classList.remove('opacity-50', 'pointer-events-none');
          chooseVideoFileLabel.setAttribute('aria-disabled', 'false');
        } else {
          chooseVideoFileLabel.classList.add('opacity-50', 'pointer-events-none');
          chooseVideoFileLabel.setAttribute('aria-disabled', 'true');
        }
      };

      const setChooseVisible = (visible) => {
        if (!chooseVideoFileLabel) return;
        if (visible) chooseVideoFileLabel.classList.remove('hidden');
        else chooseVideoFileLabel.classList.add('hidden');
      };

      const setClearVisible = (visible) => {
        if (!clearVideoFileBtn) return;
        if (visible) clearVideoFileBtn.classList.remove('hidden');
        else clearVideoFileBtn.classList.add('hidden');
      };

      const setCancelUploadingVisible = (visible) => {
        if (!cancelUploadingVideoBtn) return;
        if (visible) cancelUploadingVideoBtn.classList.remove('hidden');
        else cancelUploadingVideoBtn.classList.add('hidden');
      };

      // idle: 只显示“选择文件”
      // uploading: 不显示“选择文件”，只显示“取消上传”（文字按钮）
      // done: 只显示“清除”
      const setUploadControlsState = (state) => {
        if (state === 'uploading') {
          setChooseVisible(false);
          setChooseEnabled(false);
          setClearVisible(false);
          setCancelUploadingVisible(true);
          return;
        }
        if (state === 'done') {
          setChooseVisible(false);
          setChooseEnabled(false);
          setCancelUploadingVisible(false);
          setClearVisible(true);
          return;
        }
        // idle (default)
        setCancelUploadingVisible(false);
        setClearVisible(false);
        setChooseVisible(true);
        setChooseEnabled(true);
      };

      const setVideoPreview = (file) => {
        if (!videoPreviewEl) return;
        // revoke old preview URL
        if (previewObjectUrl) {
          try { URL.revokeObjectURL(previewObjectUrl); } catch (_) {}
          previewObjectUrl = '';
        }
        if (!file) {
          videoPreviewEl.classList.add('hidden');
          if (videoPreviewIconWrap) videoPreviewIconWrap.classList.remove('hidden');
          videoPreviewEl.removeAttribute('src');
          try { videoPreviewEl.load(); } catch (_) {}
          return;
        }
        previewObjectUrl = URL.createObjectURL(file);
        videoPreviewEl.src = previewObjectUrl;
        videoPreviewEl.classList.remove('hidden');
        if (videoPreviewIconWrap) videoPreviewIconWrap.classList.add('hidden');

        // 尝试显示第一帧（不同浏览器策略不同，失败也不影响）
        const onLoadedData = () => {
          try {
            videoPreviewEl.pause();
            // 某些浏览器需要跳到一点点时间点才会渲染画面
            if (videoPreviewEl.currentTime === 0) videoPreviewEl.currentTime = 0.1;
          } catch (_) {}
          videoPreviewEl.removeEventListener('loadeddata', onLoadedData);
        };
        videoPreviewEl.addEventListener('loadeddata', onLoadedData);
      };

      const resetUploadUI = () => {
        isUploadDone = false;
        lastUploadedFileName = '';
        setVideoPreview(null);
        setGenerateEnabled(false);
        setUploadControlsState('idle');
        if (progressContainer) progressContainer.classList.add('hidden');
        if (progressInner) progressInner.style.width = '0%';
        if (progressText) progressText.textContent = '0%';
        if (fileNameLabel) fileNameLabel.textContent = '选择本地视频文件';
        if (fileInput) fileInput.value = '';
        if (uploadTimer) {
          clearInterval(uploadTimer);
          uploadTimer = null;
        }
      };

      // 启动一个几秒钟的模拟上传进度（选择文件后立即触发）
      const startFakeUpload = (file, onDone) => {
        if (!file) return;
        isUploadDone = false;
        lastUploadedFileName = '';
        setGenerateEnabled(false);
        setUploadControlsState('uploading');

        if (!progressContainer || !progressInner || !progressText) {
          isUploadDone = true;
          lastUploadedFileName = file.name;
          if (fileNameLabel) fileNameLabel.textContent = `已上传：${file.name}`;
          setGenerateEnabled(true);
          setUploadControlsState('done');
          onDone && onDone();
          return;
        }

        progressContainer.classList.remove('hidden');
        let progress = 0;
        progressInner.style.width = '0%';
        progressText.textContent = '0%';
        if (fileNameLabel) fileNameLabel.textContent = `正在上传：${file.name}`;
        // 确保预览已展示（防止外部忘记调用）
        setVideoPreview(file);

        const duration = 2600; // 总时长约 2.6 秒
        const stepMs = 130;
        const step = 100 / (duration / stepMs);

        if (uploadTimer) {
          clearInterval(uploadTimer);
        }

        uploadTimer = setInterval(() => {
          progress = Math.min(100, progress + step);
          progressInner.style.width = progress + '%';
          progressText.textContent = Math.round(progress) + '%';

          if (progress >= 100) {
            clearInterval(uploadTimer);
            uploadTimer = null;
            isUploadDone = true;
            lastUploadedFileName = file.name;
            if (fileNameLabel) fileNameLabel.textContent = `已上传：${file.name}`;
            setGenerateEnabled(true);
            setUploadControlsState('done');
            setTimeout(() => {
              progressContainer.classList.add('hidden');
              onDone && onDone();
            }, 200);
          }
        }, stepMs);
      };

      if (openBtn) {
        openBtn.addEventListener('click', () => {
          openUploadVideoModal();
          // 每次打开都重置状态，避免上次上传残留
          resetUploadUI();
          if (form) form.reset();
        });
      }

      if (closeBtn) {
        closeBtn.addEventListener('click', () => {
          resetUploadUI();
          closeUploadVideoModal();
        });
      }

      if (cancelBtn) {
        cancelBtn.addEventListener('click', () => {
          resetUploadUI();
          closeUploadVideoModal();
        });
      }

      if (modal) {
        modal.addEventListener('click', (e) => {
          if (e.target === modal) {
            resetUploadUI();
            closeUploadVideoModal();
          }
        });
      }

      if (fileInput && fileNameLabel) {
        // 允许用户“重新选择同一个文件”也能触发 change
        fileInput.addEventListener('click', () => {
          try { fileInput.value = ''; } catch (_) {}
        });
        fileInput.addEventListener('change', () => {
          const file = fileInput.files && fileInput.files[0];
          if (!file) {
            resetUploadUI();
            return;
          }
          // 若上一次还有上传计时器（理论上选择按钮会被禁用，但这里做兜底）
          if (uploadTimer) {
            clearInterval(uploadTimer);
            uploadTimer = null;
          }
          fileNameLabel.textContent = file.name;
          setVideoPreview(file);
          // 选择即上传（示例：用进度条模拟）
          startFakeUpload(file);
        });
      }

      // 清除：上传成功后清除并恢复初始态
      if (clearVideoFileBtn) {
        clearVideoFileBtn.addEventListener('click', () => {
          // resetUploadUI 内部会清理计时器/进度/预览/按钮状态
          resetUploadUI();
        });
      }

      // 取消上传：仅上传中可见，点击后恢复初始态
      if (cancelUploadingVideoBtn) {
        cancelUploadingVideoBtn.addEventListener('click', () => {
          resetUploadUI();
        });
      }

      if (form) {
        form.addEventListener('submit', (e) => {
          e.preventDefault();
          const titleInput = document.getElementById('videoTitleInput');
          const gradeSelect = document.getElementById('gradeSelect');
          const subjectSelect = document.getElementById('subjectSelect');
          const versionSelect = document.getElementById('versionSelect');
          const unitSelect = document.getElementById('unitSelect');

          if (!titleInput || !gradeSelect || !subjectSelect || !versionSelect || !unitSelect) return;

          if (!titleInput.value.trim()) {
            alert('请填写视频标题。');
            return;
          }
          if (!subjectSelect.value || !gradeSelect.value || !versionSelect.value || !unitSelect.value) {
            alert('请完整选择科目、年级、教材版本和单元。');
            return;
          }
          if (!fileInput || !fileInput.files || fileInput.files.length === 0) {
            alert('请选择要上传的视频文件。');
            return;
          }
          if (!isUploadDone) {
            alert('视频正在上传中，请稍候上传完成后再生成报告。');
            return;
          }

          // 生成一条新的课堂记录（仅前端示例，不实际上传文件）
          const newId = 's' + (ktfxSessions.length + 1);
          const metaGrade = gradeSelect.value || '';
          const metaSubject = subjectSelect.value || '';
          const metaUnit = unitSelect.value || '';
          const today = new Date();
          const dateStr = today.toISOString().slice(0, 10);
          const createdAt = Date.now();

          ktfxSessions.unshift({
            id: newId,
            title: titleInput.value.trim(),
            grade: metaGrade,
            subject: metaSubject,
            unit: metaUnit,
            date: dateStr,
            status: 'processing',
            createdAt,
            reportData: null
          });

          currentSessionId = newId;
          renderSessionList(currentSessionKeyword);

          // 重置
          if (form) form.reset();
          resetUploadUI();
          closeUploadVideoModal();

          // 右侧切到“生成中”并在 10s 后展示报告内容
          renderRightPanelForCurrentSession();
          startFakeReportGeneration(newId, {

            subject: metaSubject,
            unit: metaUnit

    function renderSessionList(filterKeyword = currentSessionKeyword) {
      const container = document.getElementById('sessionList');
      const countEl = document.getElementById('sessionCount');
      if (!container) return;

      const keyword = filterKeyword.trim().toLowerCase();
      currentSessionKeyword = keyword;

      const filtered = ktfxSessions
        .filter(s => {
        if (!keyword) return true;
        return getSessionSearchText(s).includes(keyword);
        })
        .slice()
        .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

      if (filtered.length === 0) {
        container.innerHTML = '<div class="text-xs text-gray-400 text-center py-8">暂无匹配的课堂记录</div>';
        if (countEl) countEl.textContent = '0';
        return;
      }

      if (countEl) countEl.textContent = String(filtered.length);

      container.innerHTML = filtered.map(s => {
        const isActive = currentSessionId && currentSessionId === s.id;
        const isProcessing = s.status === 'processing';
        return `
          <div
            role="button"
            tabindex="0"
            class="session-card w-full text-left pl-3 pr-12 py-2.5 rounded-xl border border-gray-200 bg-white hover:border-primary-300 hover:bg-primary-50/60 group transition flex flex-col gap-0.5 shadow-sm cursor-pointer select-none ${isActive ? 'session-card--active' : ''}"

    function getDefaultSessionId() {
      const sorted = ktfxSessions

    function openSessionDeleteModal(sessionId) {
      const modal = document.getElementById('sessionDeleteModal');
      const titleEl = document.getElementById('sessionDeleteTitle');
      const session = ktfxSessions.find(s => s.id === sessionId);
      if (!modal || !titleEl || !session) return;

      pendingDeleteSessionId = sessionId;
      titleEl.textContent = session.title || '（未命名）';
      modal.classList.remove('hidden');

      if (window.lucide) lucide.createIcons();
    }

    function closeSessionDeleteModal() {
      const modal = document.getElementById('sessionDeleteModal');
      if (!modal) return;
      pendingDeleteSessionId = null;
      modal.classList.add('hidden');
    }

    function deleteSessionById(sessionId) {
      const idx = ktfxSessions.findIndex(s => s.id === sessionId);
      if (idx < 0) return;

      const timerId = ktfxSessionReportTimers.get(sessionId);
      if (timerId) {
        clearTimeout(timerId);
        ktfxSessionReportTimers.delete(sessionId);
      }

      ktfxSessions.splice(idx, 1);

      if (currentSessionId === sessionId) {
        currentSessionId = getDefaultSessionId();
      }

      renderSessionList(currentSessionKeyword);
      renderRightPanelForCurrentSession();
    }

    function bindSessionDeleteModalEvents() {
      const modal = document.getElementById('sessionDeleteModal');
      const closeBtn = document.getElementById('closeSessionDeleteModalBtn');
      const cancelBtn = document.getElementById('cancelSessionDeleteBtn');
      const confirmBtn = document.getElementById('confirmSessionDeleteBtn');
      if (!modal || !closeBtn || !cancelBtn || !confirmBtn) return;

      const onClose = () => closeSessionDeleteModal();
      closeBtn.addEventListener('click', onClose);
      cancelBtn.addEventListener('click', onClose);

      modal.addEventListener('click', (e) => {
        if (e.target === modal) onClose();
      });

      confirmBtn.addEventListener('click', () => {
        if (!pendingDeleteSessionId) return;
        const id = pendingDeleteSessionId;
        closeSessionDeleteModal();
        deleteSessionById(id);
      });

      document.addEventListener('keydown', (e) => {
        if (e.key !== 'Escape') return;
        if (modal.classList.contains('hidden')) return;
        onClose();
      });
    }

    function bindSessionEvents() {
      const container = document.getElementById('sessionList');
      if (!container) return;
      container.addEventListener('click', (e) => {
        const deleteBtn = e.target.closest('button[data-action="delete-session"][data-session-id]');
        if (deleteBtn) {
          e.preventDefault();
          e.stopPropagation();
          const id = deleteBtn.getAttribute('data-session-id');
          if (id) openSessionDeleteModal(id);
          return;
        }

        const card = e.target.closest('.session-card[data-session-id]');
        if (!card) return;
        const id = card.getAttribute('data-session-id');
        const session = ktfxSessions.find(s => s.id === id);
        if (!session) return;

        currentSessionId = id;
        renderSessionList();

        renderRightPanelForCurrentSession();
      });
    }

    function ktfxRenderStars(score, showNumber = false) {
      const max = 5;
      const full = Math.round(score || 0);
      let html = '<span class="ktfx-stars">';
      for (let i = 1; i <= max; i++) {
        html += `<span class="ktfx-star ${i <= full ? "ktfx-star-full" : ""}">★</span>`;
      }
      if (showNumber) {
        const num = typeof score === "number" ? score.toFixed(1) : score;
        html += `<span class="ktfx-star-num">${num}</span>`;
      }
      html += "</span>";
      return html;
    }

    function ktfxRenderObjectiveAchievementLevel(level) {
      const lv = (level ?? "").toString().trim();
      let cls = "";
      if (lv === "基本达到") cls = "ktfx-pill-green";
      else if (lv === "部分达到") cls = "ktfx-pill-yellow";
      else if (lv === "仍需加强") cls = "ktfx-pill-red";
      return `<span class="ktfx-pill-score ${cls}">${lv || "—"}</span>`;
    }

              radius: ["52%", "76%"],
              avoidLabelOverlap: false,
              label: {
                formatter: "{b}\n{d}%",
                fontSize: 11
              },
              labelLine: { length: 8, length2: 4 },
              itemStyle: {
                borderRadius: 6,
                borderColor: "#fff",
                borderWidth: 2
              },
              data: [
                { value: d.interaction.teacher_talk_ratio, name: "教师话语", itemStyle: { color: "#4c6fff" } },
                { value: d.interaction.student_talk_ratio, name: "学生话语", itemStyle: { color: "#22c55e" } }
              ]
            }
          ]
        });
      }

      // 3. 提问数量
      const qDom = document.getElementById("ktfx-chart-questions");
      if (qDom) {
        const qChart = echarts.init(qDom);
        qChart.setOption({
          tooltip: {
            trigger: "axis",
            axisPointer: { type: "shadow" }
          },
          grid: { left: "6%", right: "4%", top: 24, bottom: 22, containLabel: true },
          xAxis: {
            type: "category",
            data: ["教师提问", "学生提问"]
          },
          yAxis: {
            type: "value"
          },
          series: [
            {
              type: "bar",
              data: [
                {
                  value: d.interaction.question_count_teacher,
                  itemStyle: { color: "#4c6fff" }
                },
                {
                  value: d.interaction.question_count_students,
                  itemStyle: { color: "#22c55e" }
                }
              ],
              label: {
                show: true,
                position: "top",
                formatter: (p) => p.value,
                fontSize: 11
              }
            }
          ]
        });
      }

      window.addEventListener("resize", () => {
        try {
          structureDom && echarts.getInstanceByDom(structureDom)?.resize();
          talkDom && echarts.getInstanceByDom(talkDom)?.resize();
          qDom && echarts.getInstanceByDom(qDom)?.resize();
        } catch (e) { }
      });
    }

    function normalizeMetaText(v) {
      return (v ?? '').toString().trim();
    }

    function pickBeforeSlash(v) {
      const t = normalizeMetaText(v);
      if (!t) return '';
      return t.split('/')[0].trim();
    }

    function normalizeUnit(v) {
      const t = normalizeMetaText(v);
      if (!t) return '';
      return t.replace(/\s*\/\s*/g, '/');
    }

    function updateRightHeaderMeta({ grade, subject, unit } = {}) {
      const gradeEl = document.getElementById('metaGradeTag');
      const subjectEl = document.getElementById('metaSubjectTag');
      const unitEl = document.getElementById('metaUnitTag');
      if (gradeEl) gradeEl.textContent = grade || gradeEl.textContent;
      if (subjectEl) subjectEl.textContent = subject || subjectEl.textContent;
      if (unitEl) unitEl.textContent = unit || unitEl.textContent;
    }

    function updateRightHeaderTitle(title) {
      const titleEl = document.getElementById('rightHeaderTitle');
      if (!titleEl) return;
      const t = (title ?? '').toString().trim();
      const SUFFIX = '｜课堂洞察报告';
      if (!t) {
        // 没有传入标题时，保持默认文案
        titleEl.textContent = '课堂洞察报告';
        return;
      }
      // 去掉原字符串中已经存在的“| 课堂洞察报告 / ｜课堂洞察报告”后缀，避免重复
      const base = t.replace(/\s*[|｜]\s*课堂洞察报告$/, '');
      titleEl.textContent = base + SUFFIX;
    }

    function extractLessonTitle(rawTitle = '') {
      const t = (rawTitle ?? '').toString().trim();
      if (!t) return '';

      // 优先取书名号内容
      const m = t.match(/《([^》]{1,60})》/);
      if (m && m[1]) return m[1].trim();

      // 常见分隔符：'·' / '：' / ':' / '-' / '—'
      const seps = ['·', '：', ':', '—', '-'];
      for (const sep of seps) {
        const idx = t.indexOf(sep);
        if (idx > -1 && idx < t.length - 1) {
          const right = t.slice(idx + 1).trim();
          if (right) return right.replace(/^[\s·:：—-]+/, '').trim();
        }
      }
      return t;
    }

    function buildOverallSummaryText({ grade, subject, lessonTitle } = {}) {
      const g = (grade ?? '').toString().trim();
      const s = (subject ?? '').toString().trim();
      const lt = (lessonTitle ?? '').toString().trim();
      const lesson = lt ? (lt.includes('《') ? lt : `《${lt}》`) : '本节课';

      if (s.includes('数学')) {
        return `这是一节结构清晰、推理严谨的数学课。教师围绕${lesson}组织了“概念引入—例题示范—练习巩固—总结提升”的完整链条，学生在关键步骤上能跟随推理并进行口头表达。建议在练习环节增加1-2个分层任务，帮助不同基础的学生都能获得成功体验。`;
      }
      if (s.includes('英语')) {
        return `这是一节节奏明快、输入输出均衡的英语课。教师以${lesson}为主线，通过情境化示例与引导提问促进学生开口表达，课堂参与度较高。建议在新知呈现后加入更明确的“操练-迁移”过渡，并强化纠错反馈的可视化记录，帮助学生形成稳定的语言规则。`;
      }
      // 默认按语文/综合
      const gradeHint = g ? `${g}学生` : '学生';
      return `这是一节充满启发与温度的${s || ''}课。教师围绕${lesson}设计了丰富的导入与活动，引导${gradeHint}在理解文本/任务的同时进行表达与思考。课堂氛围积极，互动自然。建议在关键问题处适当“留白”，给学生更多独立思考与同伴交流时间，以提升深度学习效果。`.replace(/\s+/g, ' ').trim();
    }

    function parseSessionMetaText(metaText = '') {
      const metaParts = (metaText || '').split('·').map(p => p.trim()).filter(Boolean);
      const grade = pickBeforeSlash(metaParts[0] || '');
      const subject = normalizeMetaText(metaParts[1] || '');
      const unit = normalizeUnit(metaParts[2] || '');
      return { grade, subject, unit };
    }

    function getSessionMetaFields(session = {}) {
      const grade = session.grade || '';
      const subject = session.subject || '';
      const unit = session.unit || '';
      if (grade || subject || unit) {
        return {
          grade: pickBeforeSlash(grade),
          subject: normalizeMetaText(subject),
          unit: normalizeUnit(unit)
        };
      }
      // 兼容：老数据仍可能只有 meta 字符串
      return parseSessionMetaText(session.meta || '');
    }

    function formatSessionMeta(session = {}) {
      const { grade, subject, unit } = getSessionMetaFields(session);
      const parts = [grade, subject, unit].map(x => (x ?? '').toString().trim()).filter(Boolean);
      return parts.length ? parts.join(' · ') : '—';
    }

    function getSessionSearchText(session = {}) {
      const t = (session.title || '').toString();
      const m = formatSessionMeta(session);
      const d = (session.date || '').toString();
      return `${t} ${m} ${d}`.toLowerCase();
    }

    function ktfxBuildGeneratingView({ title } = {}) {
      const container = document.getElementById('ktfxApp');
      if (!container) return;
      const t = (title ?? '').toString().trim();
      container.innerHTML = `
        <div class="h-full w-full flex items-center justify-center">
          <div class="w-full max-w-3xl px-6 py-10">
            <div class="flex flex-col items-center text-center gap-3">
              <div class="w-11 h-11 rounded-2xl bg-primary-50 flex items-center justify-center">
                <i data-lucide="loader-2" class="w-5.5 h-5.5 text-primary-600 animate-spin"></i>
              </div>
              <div class="min-w-0">
                <div class="text-base font-semibold text-gray-900">报告生成中…</div>
                ${t ? `<div class="mt-1 text-xs text-gray-500">${t}</div>` : ''}
                <div class="mt-1 text-sm text-gray-500">预计约 5 分钟完成分析，请稍候。</div>
              </div>
            </div>
          </div>
        </div>
      `;
      if (window.lucide) lucide.createIcons();
    }

    function buildReportDataFromMeta({ title, grade, subject, unit } = {}) {
      // 简易深拷贝：用于模拟每个 session 的“报告内容”
      const cloned = JSON.parse(JSON.stringify(ktfxData));
      const g = pickBeforeSlash(grade) || cloned.meta.grade;
      const s = normalizeMetaText(subject) || cloned.meta.subject;
      const u = normalizeUnit(unit) || cloned.meta.unit;
      cloned.meta.grade = g || cloned.meta.grade;
      cloned.meta.subject = s || cloned.meta.subject;
      cloned.meta.unit = u || cloned.meta.unit;

       // 让“课堂概览”文案随标题与学科变化（更像每条 session 的独立模拟报告）
      const lessonTitle = extractLessonTitle(title);
      cloned.overview.overall_summary = buildOverallSummaryText({
        grade: cloned.meta.grade,
        subject: cloned.meta.subject,
        lessonTitle
      });
      return cloned;
    }

    function renderRightPanelForCurrentSession() {
      const session = ktfxSessions.find(s => s.id === currentSessionId);
      if (!session) {
        updateRightHeaderTitle('课堂洞察报告');
        ktfxBuildGeneratingView({ title: '' });
        return;
      }

      updateRightHeaderTitle(session.title);

      // Header 标签：来自独立字段（grade/subject/unit），meta 仅兼容兜底
      const { grade, subject, unit } = getSessionMetaFields(session);
      updateRightHeaderMeta({ grade: grade || '—', subject: subject || '—', unit: unit || '—' });

      if (session.status === 'processing') {
        ktfxBuildGeneratingView({ title: session.title });
        return;
      }

      // done
      const data = session.reportData || ktfxData;
      ktfxBuildApp(data);
      if (window.lucide) lucide.createIcons();
    }

    function startFakeReportGeneration(sessionId, meta = {}) {
      const session = ktfxSessions.find(s => s.id === sessionId);
      if (!session) return;
      session.status = 'processing';

      const oldTimer = ktfxSessionReportTimers.get(sessionId);
      if (oldTimer) {
        clearTimeout(oldTimer);
        ktfxSessionReportTimers.delete(sessionId);
      }

      const timerId = setTimeout(() => {
        const s = ktfxSessions.find(x => x.id === sessionId);
        if (!s) return;
        s.status = 'done';
        s.reportData = buildReportDataFromMeta({ title: s.title, ...meta });
        renderSessionList(currentSessionKeyword);
        if (currentSessionId === sessionId) {
          renderRightPanelForCurrentSession();
        }
        ktfxSessionReportTimers.delete(sessionId);
      }, 10000);

      ktfxSessionReportTimers.set(sessionId, timerId);
    }

    document.addEventListener('DOMContentLoaded', () => {
      // 为初始化的示例 session 生成各自的 mock 报告内容（让标题/学科切换时更真实）
      ktfxSessions.forEach(s => {
        if (s && s.status === 'done' && !s.reportData) {
          const { grade, subject, unit } = getSessionMetaFields(s);
          s.reportData = buildReportDataFromMeta({ title: s.title, grade, subject, unit });
        }
      });

      // 初始渲染列表
      renderSessionList();
      bindSessionEvents();
      bindSessionDeleteModalEvents();
      initUploadVideoFormOptions();
      bindUploadVideoEvents();

      // 搜索
      const searchInput = document.getElementById('sessionSearchInput');
      if (searchInput) {
        searchInput.addEventListener('input', (e) => {
          renderSessionList(e.target.value || '');
        });
      }

      // 渲染右侧课堂报告（跟随左侧选中项）
      renderRightPanelForCurrentSession();

      if (window.lucide) {
        lucide.createIcons();
      }

      // 初始化可用额度显示
      (function initPoints() {
        var schoolId = window.currentSchoolId || 'school_001';
        var purchases = JSON.parse(localStorage.getItem('purchases_' + schoolId) || '[]');
        var total = 0;
        purchases.forEach(function(p) { total += (p.points || 0) - (p.consumed || 0); });
        var el = document.getElementById('header-points');
        if (el) el.textContent = total > 0 ? total.toLocaleString() : '0';
      })();

      // 原课视频按钮占位逻辑：后续可接入真实播放器/弹窗
      const playBtn = document.getElementById('playOriginVideoBtn');
      if (playBtn) {
        playBtn.addEventListener('click', () => {
          // TODO: 在这里接入实际的视频播放逻辑（弹窗、侧边播放器等）
          alert('这里将打开原课视频播放器（示例占位）。');
        });
      }
    });
  </script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学校管理 - 运营平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://registry.npmmirror.com/lucide/latest/files/dist/umd/lucide.js"></script>
    <script src="sidebar.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0f3ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
                            400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
                            800: '#3730a3', 900: '#312e81',
                        },
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        html, body { height: 100%; overflow: hidden; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; }
        .toast {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            color: white; padding: 12px 24px; border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); z-index: 10000;
            display: flex; align-items: center; gap: 12px;
            opacity: 0; transition: all 0.3s ease; pointer-events: none;
        }
        .toast.show { opacity: 1; pointer-events: all; transform: translateX(-50%) translateY(0); }
        .toast.hide { opacity: 0; transform: translateX(-50%) translateY(-8px); }
        .toast.toast-success { background: #10b981; }
        .toast.toast-info { background: #3b82f6; }
        .toast.toast-error { background: #ef4444; }
        thead { position: sticky; top: 0; z-index: 10; }
        .admin-nav-subitem { transition: all 0.15s ease; }
        .admin-nav-subitem:hover { background-color: #eef2ff; color: #4f46e5; }
        .admin-nav-subitem.active { background-color: #e0e7ff; color: #4f46e5; }
        .pm-modal-overlay { background: rgba(0,0,0,0.45); }
        .pm-modal-content { transition: transform 0.2s ease, opacity 0.2s ease; transform: scale(1); }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div class="px-6 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gradient-to-br from-primary-500 to-purple-600 rounded-xl flex items-center justify-center text-white font-bold shadow-lg">
                    <i data-lucide="sparkles" class="w-4 h-4"></i>
                </div>
                <span class="text-base font-semibold text-gray-800">运营平台</span>
            </div>
            <div class="flex items-center gap-3">
                <div class="w-7 h-7 bg-gradient-to-br from-primary-500 to-purple-600 rounded-full flex items-center justify-center text-white text-xs font-semibold">A</div>
                <span class="text-sm text-gray-700 font-medium">管理员</span>
            </div>
        </div>
    </header>

    <div class="flex h-[calc(100vh-57px)]">

        <!-- 左侧菜单 -->
        <div id="sidebar-container"></div>

        <main class="flex-1 overflow-hidden flex flex-col">

            <!-- ==================== 面板: 学校管理 ==================== -->
            <div class="h-full px-6 pt-6 overflow-y-auto">
                <div class="mb-6 flex items-center justify-between">
                    <h1 class="text-2xl font-semibold text-gray-900">学校管理</h1>
                    <div class="flex items-center gap-3">
                        <button type="button" onclick="openPurchaseModal()" class="px-4 py-2 bg-primary-600 hover:bg-primary-700 text-white rounded-md text-sm font-medium transition-all flex items-center gap-2 shadow-sm">
                            <i data-lucide="package-plus" class="w-4 h-4"></i>
                            开通套餐
                        </button>
                        <button type="button" onclick="openTrialModal()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-md text-sm font-medium transition-all flex items-center gap-2 shadow-sm">
                            <i data-lucide="calendar-plus" class="w-4 h-4"></i>
                            开通试用
                        </button>
                        <button type="button" onclick="createMainAdmin()" class="px-4 py-2 bg-orange-500 hover:bg-orange-600 text-white rounded-md text-sm font-medium transition-all flex items-center gap-2 shadow-sm">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                            新建学校
                        </button>
                    </div>
                </div>

                <div class="mb-6 bg-white rounded-lg border border-gray-200 p-4 shadow-sm">
                    <div class="flex flex-wrap items-end gap-x-5 gap-y-3">
                        <div class="flex items-center gap-2">
                            <label class="text-xs font-medium text-gray-600 whitespace-nowrap">学校名称</label>
                            <input type="text" id="filterUsername" placeholder="请输入学校名称" class="px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 w-40">
                        </div>
                        <div class="flex items-center gap-2">
                            <label class="text-xs font-medium text-gray-600 whitespace-nowrap">账号</label>
                            <input type="text" id="filterAccount" placeholder="请输入账号" class="px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 w-36">
                        </div>
                        <div class="flex items-center gap-2">
                            <label class="text-xs font-medium text-gray-600 whitespace-nowrap">联系人</label>
                            <input type="text" id="filterContact" placeholder="请输入联系人" class="px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 w-36">
                        </div>
                        <div class="flex items-center gap-2">
                            <label class="text-xs font-medium text-gray-600 whitespace-nowrap">账号状态</label>
                            <select id="filterDisabled" class="px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 bg-white w-28">
                                <option value="">全部</option>
                                <option value="false" selected>可用</option>
                                <option value="true">禁用</option>
                            </select>
                        </div>
                        <div class="flex items-center gap-2">
                            <label class="text-xs font-medium text-gray-600 whitespace-nowrap">套餐状态</label>
                            <select id="filterPackageStatus" class="px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 bg-white w-28">
                                <option value="">全部</option>
                                <option value="active">有效</option>
                                <option value="expired">过期</option>
                            </select>
                        </div>
                        <button type="button" onclick="applyFilters()" class="px-4 py-2 bg-primary-600 hover:bg-primary-700 text-white rounded-md text-sm font-medium transition-all flex items-center gap-2 shadow-sm shrink-0">
                            <i data-lucide="search" class="w-4 h-4"></i>查询
                        </button>
                    </div>
                </div>

                <div class="bg-white rounded-lg border border-gray-200 shadow-sm flex flex-col" style="height: calc(100vh - 320px); min-height: 320px;">
                    <div class="overflow-x-auto overflow-y-auto flex-1">
                        <table class="w-full min-w-[1200px]">
                            <thead class="bg-gray-50 border-b border-gray-200">
                                <tr>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">序号</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">学校名称</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">学校编码</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">账号</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">联系人</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">套餐</th>
                                    <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">充值点数</th>
                                    <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">已消耗</th>
                                    <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">剩余点数</th>
                                    <th class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">账号状态</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">操作</th>
                                </tr>
                            </thead>
                            <tbody id="instTableBody" class="bg-white divide-y divide-gray-100"></tbody>
                        </table>
                    </div>
                    <div class="px-6 py-4 border-t border-gray-200 flex flex-wrap items-center justify-between gap-4 bg-white flex-shrink-0">
                        <div class="flex items-center gap-2 text-sm text-gray-600">
                            <select id="pageSizeSelect" onchange="onPageSizeChange()" class="px-2 py-1.5 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-primary-500 bg-white">
                                <option value="10" selected>10条/页</option>
                                <option value="20">20条/页</option>
                                <option value="50">50条/页</option>
                            </select>
                        </div>
                        <div class="flex items-center gap-2">
                            <button type="button" id="prevBtn" onclick="goToPreviousPage()" class="p-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-all" aria-label="上一页">
                                <i data-lucide="chevron-left" class="w-4 h-4"></i>
                            </button>
                            <div class="flex items-center gap-1" id="pageNumbers"></div>
                            <button type="button" id="nextBtn" onclick="goToNextPage()" class="p-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-all" aria-label="下一页">
                                <i data-lucide="chevron-right" class="w-4 h-4"></i>
                            </button>
                            <span class="text-sm text-gray-600 ml-2">共 <span id="totalCount">0</span> 条</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- ==================== 弹窗: 新建/编辑学校 ==================== -->
    <div id="school-modal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/45" onclick="hideSchoolModal()"></div>
        <div class="relative bg-white rounded-2xl shadow-2xl overflow-hidden" style="transform: scale(0.95); width: 100%; max-width: 520px; margin: 80px auto 0;">
            <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between shrink-0">
                <h3 class="font-semibold text-gray-800" id="sm-title">新建学校</h3>
                <button type="button" onclick="hideSchoolModal()" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="px-6 py-5 flex flex-col gap-4">
                <div class="flex flex-col gap-1.5">
                    <label class="text-sm font-medium text-gray-700">学校名称 <span class="text-red-500">*</span></label>
                    <input type="text" id="sm-schoolname" placeholder="请输入学校名称" class="px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
                    <p id="sm-err-schoolname" class="text-sm text-red-500 hidden"></p>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-sm font-medium text-gray-700">学校编码 <span class="text-red-500">*</span></label>
                    <input type="text" id="sm-schoolcode" placeholder="4~8位字母或数字" maxlength="6" oninput="onSchoolCodeInput(this.value)"
                        class="px-3 py-2.5 border border-gray-300 rounded-lg text-sm font-mono tracking-wider focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 uppercase">
                    <p id="sm-err-schoolcode" class="text-sm text-red-500 hidden"></p>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-sm font-medium text-gray-700">账号 <span class="text-red-500">*</span></label>
                    <input type="text" id="sm-accountnum" placeholder="6~16位字母或数字" maxlength="16"
                        class="px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
                    <p id="sm-err-accountnum" class="text-sm text-red-500 hidden"></p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1.5">
                        <label class="text-sm font-medium text-gray-700">密码 <span id="sm-password-required" class="text-red-500">*</span></label>
                        <input type="password" id="sm-password" placeholder="请输入登录密码"
                            class="px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
                        <p id="sm-err-password" class="text-sm text-red-500 hidden"></p>
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label class="text-sm font-medium text-gray-700">联系人</label>
                        <input type="text" id="sm-contact" placeholder="姓名或职位" class="px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1.5">
                        <label class="text-sm font-medium text-gray-700">手机号</label>
                        <input type="text" id="sm-phone" placeholder="选填" maxlength="11" class="px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label class="text-sm font-medium text-gray-700">状态</label>
                        <select id="sm-disabled" class="px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 bg-white">
                            <option value="false">可用</option>
                            <option value="true">禁用</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="px-6 py-4 border-t border-gray-100 flex justify-end gap-3 shrink-0">
                <button type="button" onclick="hideSchoolModal()" class="px-5 py-2.5 border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-50 transition-colors">取消</button>
                <button type="button" onclick="saveSchool()" class="px-5 py-2.5 bg-primary-600 hover:bg-primary-700 text-white rounded-lg text-sm font-medium transition-colors shadow-sm">确认</button>
            </div>
        </div>
    </div>

    <!-- ==================== 弹窗: 院校点数明细 ==================== -->
    <div id="modal-school-detail" class="pm-modal hidden fixed inset-0 z-[9998] flex items-center justify-center p-4">
        <div class="pm-modal-overlay absolute inset-0" onclick="pmHideModal('modal-school-detail')"></div>
        <div class="pm-modal-content relative bg-white rounded-2xl shadow-2xl z-10 overflow-hidden" style="transform: scale(1); width: 100%; max-width: 1000px; max-height: 90vh; display: flex; flex-direction: column;">
            <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between shrink-0">
                <div>
                    <h3 class="font-semibold text-gray-800" id="sdm-title">院校点数明细</h3>
                    <p class="text-xs text-gray-500 mt-0.5" id="sdm-subtitle">--</p>
                </div>
                <div class="flex items-center gap-2">
                    <button type="button" onclick="openDeductModal()" class="px-3 py-1.5 bg-orange-600 hover:bg-orange-700 text-white text-xs font-medium rounded-lg transition-colors flex items-center gap-1">
                        <i data-lucide="minus-circle" class="w-3.5 h-3.5"></i>扣减
                    </button>
                    <button type="button" onclick="openRechargeModal()" class="px-3 py-1.5 bg-primary-600 hover:bg-primary-700 text-white text-xs font-medium rounded-lg transition-colors flex items-center gap-1">
                        <i data-lucide="plus-circle" class="w-3.5 h-3.5"></i>充值
                    </button>
                    <button type="button" onclick="pmHideModal('modal-school-detail')" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
            <div class="px-6 py-4 bg-gray-50 border-b border-gray-100 shrink-0">
                <div class="grid grid-cols-3 gap-4">
                    <div class="text-center">
                        <div class="text-xs text-gray-500 mb-1">充值点数</div>
                        <div class="text-lg font-bold text-blue-600" id="sdm-purchase">--</div>
                    </div>
                    <div class="text-center">
                        <div class="text-xs text-gray-500 mb-1">已消耗</div>
                        <div class="text-lg font-bold text-orange-600" id="sdm-consumed">--</div>
                    </div>
                    <div class="text-center">
                        <div class="text-xs text-gray-500 mb-1">剩余点数</div>
                        <div class="text-lg font-bold text-emerald-600" id="sdm-balance">--</div>
                    </div>
                </div>
            </div>
            <div class="px-6 py-3 border-b border-gray-100 flex flex-wrap items-end gap-3 shrink-0">
                <div class="flex items-center gap-2">
                    <label class="text-xs text-gray-600 whitespace-nowrap">类型</label>
                    <select id="sdm-filter-type" class="px-3 py-1.5 border border-gray-200 rounded-lg text-xs text-gray-700 bg-white focus:ring-1 focus:ring-primary-500 outline-none min-w-[90px]">
                        <option value="">全部</option>
                        <option value="recharge">充值</option>
                        <option value="consume">消费</option>
                        <option value="deduct">扣减</option>
                    </select>
                </div>
                <div class="flex items-center gap-2">
                    <label class="text-xs text-gray-600 whitespace-nowrap">日期</label>
                    <input type="date" id="sdm-filter-from" class="px-2 py-1.5 border border-gray-200 rounded-lg text-xs text-gray-700 focus:ring-1 focus:ring-primary-500 outline-none" />
                    <span class="text-gray-400 text-xs">~</span>
                    <input type="date" id="sdm-filter-to" class="px-2 py-1.5 border border-gray-200 rounded-lg text-xs text-gray-700 focus:ring-1 focus:ring-primary-500 outline-none" />
                </div>
                <button type="button" onclick="sdmApplyFilters()" class="px-3 py-1.5 bg-primary-600 hover:bg-primary-700 text-white text-xs font-medium rounded-lg transition-colors">查询</button>
            </div>
            <div class="flex-1 overflow-y-auto">
                <table class="w-full min-w-[900px]">
                    <thead class="bg-gray-50 sticky top-0 z-10">
                        <tr>
                            <th class="px-4 py-2.5 text-left text-xs font-medium text-gray-500 border-b border-gray-200 whitespace-nowrap">序号</th>
                            <th class="px-4 py-2.5 text-center text-xs font-medium text-gray-500 border-b border-gray-200 whitespace-nowrap">类型</th>
                            <th class="px-4 py-2.5 text-right text-xs font-medium text-gray-500 border-b border-gray-200 whitespace-nowrap">点数</th>
                            <th class="px-4 py-2.5 text-left text-xs font-medium text-gray-500 border-b border-gray-200 whitespace-nowrap">时间</th>
                            <th class="px-4 py-2.5 text-left text-xs font-medium text-gray-500 border-b border-gray-200 whitespace-nowrap">操作人</th>
                            <th class="px-4 py-2.5 text-left text-xs font-medium text-gray-500 border-b border-gray-200 whitespace-nowrap">备注</th>
                        </tr>
                    </thead>
                    <tbody id="sdm-table-body" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
            <div class="px-6 py-3 border-t border-gray-100 flex flex-wrap items-center justify-between gap-3 shrink-0">
                <div class="text-xs text-gray-600">共 <span id="sdm-count" class="font-medium">0</span> 条</div>
                <div class="flex items-center gap-1">
                    <button type="button" id="sdm-prev" onclick="sdmGoPage(sdmCurPage - 1)" class="w-7 h-7 flex items-center justify-center rounded border border-gray-200 text-gray-500 hover:border-primary-500 hover:text-primary-600 bg-white text-xs disabled:opacity-40 disabled:cursor-not-allowed" disabled><i data-lucide="chevron-left" class="w-3 h-3"></i></button>
                    <div id="sdm-pages" class="flex items-center gap-0.5"></div>
                    <button type="button" id="sdm-next" onclick="sdmGoPage(sdmCurPage + 1)" class="w-7 h-7 flex items-center justify-center rounded border border-gray-200 text-gray-500 hover:border-primary-500 hover:text-primary-600 bg-white text-xs disabled:opacity-40 disabled:cursor-not-allowed" disabled><i data-lucide="chevron-right" class="w-3 h-3"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== 弹窗: 充值 ==================== -->
    <div id="modal-recharge" class="pm-modal hidden fixed inset-0 z-[9999] flex items-center justify-center p-4">
        <div class="pm-modal-overlay absolute inset-0" onclick="pmHideModal('modal-recharge')"></div>
        <div class="pm-modal-content relative bg-white rounded-2xl shadow-2xl overflow-hidden" style="transform: scale(0.95); width: 100%; max-width: 480px; margin: 80px auto 0;">
            <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between shrink-0">
                <h3 class="font-semibold text-gray-800">充值</h3>
                <button type="button" onclick="pmHideModal('modal-recharge')" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="px-6 py-5 flex flex-col gap-4">
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1.5">
                        <label class="text-sm font-medium text-gray-700">点数 <span class="text-red-500">*</span></label>
                        <input type="number" id="rcm-points" placeholder="请输入" min="1" class="px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
                        <p id="rcm-err-points" class="text-sm text-red-500 hidden"></p>
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label class="text-sm font-medium text-gray-700">金额 <span class="text-red-500">*</span></label>
                        <div class="flex items-center gap-2">
                            <span class="text-sm text-gray-500">¥</span>

                    }]));

                        { id: 'c1', schoolId: inst.id, type: 'consume', points: 200, amount: 0, time: '2026-03-26 10:30:00', remark: '生成课件：Unit 1 课件', operator: '张三(3000003)', createdAt: '2026-03-26 10:30:00' },
                        { id: 'c2', schoolId: inst.id, type: 'consume', points: 150, amount: 0, time: '2026-03-27 14:20:00', remark: '生成绘本：狼来了', operator: '李四(3000004)', createdAt: '2026-03-27 14:20:00' },
                        { id: 'c3', schoolId: inst.id, type: 'consume', points: 150, amount: 0, time: '2026-03-28 11:15:00', remark: '生成数字人：语文老师', operator: '王五(3000005)', createdAt: '2026-03-28 11:15:00' }

        let filteredInstitutions = [...institutions];
        let currentPage = 1;
        let pageSize = 10;

        function applyFilters() {
            const account = (document.getElementById('filterAccount').value || '').trim().toLowerCase();
            const username = (document.getElementById('filterUsername').value || '').trim().toLowerCase();
            const contact = (document.getElementById('filterContact').value || '').trim().toLowerCase();
            const disabledVal = document.getElementById('filterDisabled').value;
            const packageStatus = document.getElementById('filterPackageStatus').value;
            filteredInstitutions = institutions.filter((row) => {
                if (account && !row.account.toLowerCase().includes(account)) return false;
                if (username && !row.username.toLowerCase().includes(username)) return false;
                if (contact && !(row.contact || '').toLowerCase().includes(contact)) return false;
                if (disabledVal === 'true' && !row.disabled) return false;
                if (disabledVal === 'false' && row.disabled) return false;
                // 套餐状态筛选
                const purchases = JSON.parse(localStorage.getItem('purchases_' + row.id) || '[]');
                const trials = JSON.parse(localStorage.getItem('trials_' + row.id) || '[]');
                const hasNoPackage = purchases.length === 0 && trials.length === 0;
                if (hasNoPackage) {
                    if (packageStatus) return false;
                } else {
                    const activePurchase = purchases.find(p => p.status === 'active');
                    const activeTrial = trials.find(t => t.status === 'active');
                    if (packageStatus === 'active' && !activePurchase && !activeTrial) return false;
                    if (packageStatus === 'expired' && (activePurchase || activeTrial)) return false;
                }
                return true;
            });
            currentPage = 1;
            renderTable();
            updatePagination();
        }

        function onPageSizeChange() {
            pageSize = parseInt(document.getElementById('pageSizeSelect').value, 10) || 10;
            currentPage = 1;
            renderTable();
            updatePagination();
        }

        function getTotalPages() { return Math.max(1, Math.ceil(filteredInstitutions.length / pageSize)); }
        function getCurrentPageData() { return filteredInstitutions.slice((currentPage - 1) * pageSize, (currentPage - 1) * pageSize + pageSize); }

        function renderTable() {
            const tbody = document.getElementById('instTableBody');
            const pageData = getCurrentPageData();
            const startIndex = (currentPage - 1) * pageSize;
            tbody.innerHTML = pageData.map((row, index) => {
                const no = startIndex + index + 1;
                const statusHtml = row.disabled
                    ? '<span class="px-2 py-0.5 text-xs font-medium rounded bg-red-100 text-red-700">禁用</span>'
                    : '<span class="px-2 py-0.5 text-xs font-medium rounded bg-green-100 text-green-700">正常</span>';
                const contactDisplay = row.contact && row.contact !== '-' ? row.contact : '-';
                const accountDisplay = row.account || '-';

                // 获取点数数据
                const schoolData = getSchoolPointsBySchoolId(row.id);
                const purchasePoints = schoolData ? schoolData.purchasePoints : 0;
                const consumed = schoolData ? schoolData.consumed : 0;
                const balance = schoolData ? schoolData.balance : 0;

                // 套餐
                const purchases = JSON.parse(localStorage.getItem('purchases_' + row.id) || '[]');
                const trials = JSON.parse(localStorage.getItem('trials_' + row.id) || '[]');
                const hasNoPackage = purchases.length === 0 && trials.length === 0;
                const hasRenewablePackage = purchases.some(p => p.packageName && !p.packageName.includes('试用'));

                let packageHtml = '-';
                if (!hasNoPackage) {
                    const activePurchase = purchases.find(p => p.status === 'active');
                    const activeTrial = trials.find(t => t.status === 'active');
                    if (activePurchase) {
                        packageHtml = '<div><span class="text-sm font-medium text-gray-800">' + activePurchase.packageName + '</span></div><div class="text-xs text-gray-400">' + activePurchase.startDate + ' ~ ' + activePurchase.endDate + '</div>';
                    } else if (activeTrial) {
                        packageHtml = '<div><span class="text-sm font-medium text-blue-600">' + activeTrial.packageName + '</span></div><div class="text-xs text-gray-400">' + activeTrial.startDate + ' ~ ' + activeTrial.endDate + '</div>';
                    } else if (purchases.length > 0) {
                        const lastPkg = purchases[purchases.length - 1];
                        const statusTag = lastPkg.status === 'expired' ? '<span class="ml-1 px-1.5 py-0.5 text-xs font-medium rounded bg-gray-200 text-gray-500">过期</span>' : '';
                        packageHtml = '<div><span class="text-sm text-gray-500">' + lastPkg.packageName + '</span>' + statusTag + '</div><div class="text-xs text-gray-400">' + lastPkg.startDate + ' ~ ' + lastPkg.endDate + '</div>';
                    } else if (trials.length > 0) {
                        const lastTrial = trials[trials.length - 1];
                        const statusTag = lastTrial.status === 'expired' || lastTrial.status === 'terminated' || lastTrial.status === 'converted'
                            ? '<span class="ml-1 px-1.5 py-0.5 text-xs font-medium rounded bg-gray-200 text-gray-500">' + (lastTrial.status === 'terminated' ? '已终止' : lastTrial.status === 'converted' ? '已转正' : '过期') + '</span>' : '';
                        packageHtml = '<div><span class="text-sm text-gray-500">' + lastTrial.packageName + '</span>' + statusTag + '</div>';
                    }
                }

                return '<tr class="hover:bg-gray-50/80 even:bg-gray-50/40" data-id="' + row.id + '">' +
                    '<td class="px-4 py-3 whitespace-nowrap text-sm text-gray-600">' + no + '</td>' +

                    '<td class="px-4 py-3 whitespace-nowrap text-sm text-gray-600">' + contactDisplay + '</td>' +
                    '<td class="px-4 py-3">' + packageHtml + '</td>' +
                    '<td class="px-4 py-3 text-right text-sm text-gray-400">' + (hasNoPackage ? '-' : purchasePoints.toLocaleString()) + '</td>' +
                    '<td class="px-4 py-3 text-right text-sm text-gray-400">' + (hasNoPackage ? '-' : consumed.toLocaleString()) + '</td>' +
                    '<td class="px-4 py-3 text-right text-sm text-gray-400">' + (hasNoPackage ? '-' : balance.toLocaleString()) + '</td>' +
                    '<td class="px-4 py-3 text-center whitespace-nowrap">' + statusHtml + '</td>' +

        function updatePagination() {
            const totalPages = getTotalPages();
            const totalCount = filteredInstitutions.length;
            document.getElementById('totalCount').textContent = totalCount;
            document.getElementById('prevBtn').disabled = currentPage <= 1;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages;
            const container = document.getElementById('pageNumbers');
            container.innerHTML = '';
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = String(i);
                btn.onclick = () => goToPage(i);
                btn.className = i === currentPage
                    ? 'min-w-[32px] px-2 py-1 rounded-md text-sm font-medium bg-primary-600 text-white transition-all'
                    : 'min-w-[32px] px-2 py-1 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-100 transition-all';
                container.appendChild(btn);
            }
        }

        function goToPage(page) {
            const totalPages = getTotalPages();
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                renderTable();
                updatePagination();
            }
        }
        function goToPreviousPage() { if (currentPage > 1) goToPage(currentPage - 1); }
        function goToNextPage() { const totalPages = getTotalPages(); if (currentPage < totalPages) goToPage(currentPage + 1); }

        function showToast(message, type) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast ' + (type === 'info' ? 'toast-info' : type === 'error' ? 'toast-error' : 'toast-success');
            toast.innerHTML = '<i data-lucide="' + (type === 'info' ? 'info' : 'check-circle') + '"></i><span>' + message + '</span>';
            document.body.appendChild(toast);
            if (typeof lucide !== 'undefined') lucide.createIcons();
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        function schoolValidate() {
            const fieldErrors = {};
            const name = document.getElementById('sm-schoolname').value.trim();
            const code = document.getElementById('sm-schoolcode').value.trim().toUpperCase();
            const account = document.getElementById('sm-accountnum').value.trim();
            const password = document.getElementById('sm-password').value;
            if (!name) fieldErrors.schoolname = '学校名称不能为空';
            if (!code) fieldErrors.schoolcode = '学校编码不能为空';
            else if (!/^[A-Z]+$/.test(code)) fieldErrors.schoolcode = '学校编码仅支持字母';
            if (!account) fieldErrors.accountnum = '账号不能为空';
            else if (!/^[a-zA-Z0-9]{8,16}$/.test(account)) fieldErrors.accountnum = '账号需为8~16位字母或数字';
            if (schoolModalMode === 'create' && !password) {
                fieldErrors.password = '密码不能为空';
            }
            if (account) {
                const duplicate = institutions.find(i => i.account.toLowerCase() === account.toLowerCase() && i.id !== schoolModalId);
                if (duplicate) fieldErrors.accountnum = '该账号已存在，请使用其他账号';
            }
            return fieldErrors;
        }

        function saveSchool() {
            const fieldErrors = schoolValidate();
            ['schoolname','schoolcode','accountnum'].forEach(k => {
                const el = document.getElementById('sm-err-' + k);
                if (el) el.textContent = '';
            });
            const pwdEl = document.getElementById('sm-err-password');
            if (pwdEl) pwdEl.textContent = '';
            const keys = Object.keys(fieldErrors);
            if (keys.length > 0) {
                keys.forEach(k => {
                    const el = document.getElementById('sm-err-' + k);
                    if (el) { el.textContent = fieldErrors[k]; el.classList.remove('hidden'); }
                });
                return;
            }
            const password = document.getElementById('sm-password').value;
            const data = {
                schoolCode: document.getElementById('sm-schoolcode').value.trim().toUpperCase(),
                username: document.getElementById('sm-schoolname').value.trim(),
                account: document.getElementById('sm-accountnum').value.trim(),
                contact: document.getElementById('sm-contact').value.trim() || '-',
                phone: document.getElementById('sm-phone').value.trim() || '-',
                disabled: document.getElementById('sm-disabled').value === 'true',
            };
            if (schoolModalMode === 'create') {
                data.id = Date.now().toString(16) + Math.random().toString(16).slice(2);
                if (password) data.password = password;
                institutions.push(data);
                const schools = JSON.parse(localStorage.getItem('schools')) || getSchools();
                schools.push({
                    schoolId: data.id,
                    schoolCode: data.schoolCode,
                    schoolName: data.username,
                    purchasePoints: 0,
                    giftPoints: 0,
                    consumed: 0,
                    balance: 0
                });
                localStorage.setItem('schools', JSON.stringify(schools));
                localStorage.setItem('purchases_' + data.id, JSON.stringify([]));
                localStorage.setItem('trials_' + data.id, JSON.stringify([]));
            } else {
                const idx = institutions.findIndex(i => i.id === schoolModalId);
                if (idx !== -1) {
                    const updateData = { ...institutions[idx], ...data };
                    if (password) updateData.password = password;
                    institutions[idx] = updateData;
                }
                const schools = JSON.parse(localStorage.getItem('schools')) || [];
                const si = schools.findIndex(s => s.schoolId === schoolModalId);
                if (si !== -1) {
                    schools[si] = { ...schools[si], schoolName: data.username };
                    localStorage.setItem('schools', JSON.stringify(schools));
                }
            }
            localStorage.setItem('institutions', JSON.stringify(institutions));
            filteredInstitutions = [...institutions];
            currentPage = 1;
            renderTable();
            updatePagination();
            hideSchoolModal();
            showToast(schoolModalMode === 'create' ? '学校新建成功' : '学校信息已更新');
        }

        function pmSavePurchase() {
            if (!pmValidatePurchase()) return;

            const schoolId = document.getElementById('pm-purchase-school').value;
            const packageId = document.getElementById('pm-purchase-package').value;
            const school = institutions.find(s => s.id === schoolId);
            const pkg = pmPackagesData.find(p => p.id === packageId);

            // 自动计算日期：生效日期为今天，到期日期为今天 + durationDays - 1 天
            const today = new Date();
            const endDate = new Date(today);
            endDate.setDate(endDate.getDate() + pkg.durationDays - 1);
            const startDate = formatDate(today);
            const endDateStr = formatDate(endDate);

            // 保存套餐记录
            const purchases = JSON.parse(localStorage.getItem('purchases_' + schoolId) || '[]');
            purchases.push({
                id: 'pur' + Date.now(),
                packageName: pkg.name,
                startDate: startDate,
                endDate: endDateStr,
                status: 'active',
                points: pkg.initialPoints
            });
            localStorage.setItem('purchases_' + schoolId, JSON.stringify(purchases));

            // 更新学校点数
            const schools = getSchools();
            const si = schools.findIndex(s => s.schoolId === schoolId);
            if (si !== -1) {
                schools[si].purchasePoints = (schools[si].purchasePoints || 0) + pkg.initialPoints;
                schools[si].balance = (schools[si].balance || 0) + pkg.initialPoints;
            } else {
                schools.push({
                    schoolId: schoolId,
                    schoolCode: school.schoolCode,
                    schoolName: school.username,
                    purchasePoints: pkg.initialPoints,
                    giftPoints: 0,
                    consumed: 0,
                    balance: pkg.initialPoints
                });
            }
            localStorage.setItem('schools', JSON.stringify(schools));

            // 记录点数明细
            let storedRecords = JSON.parse(localStorage.getItem('schoolPointsRecords_' + schoolId) || '[]');
            storedRecords.push({
                id: 'rc' + Date.now(),
                schoolId: schoolId,
                type: 'grant',
                purchaseId: 'pur' + Date.now(),
                purchaseName: pkg.name,
                points: pkg.initialPoints,

            showToast('套餐开通成功');
            renderTable();
        }

                              || trials.find(t => t.status === 'active')

        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return y + '-' + m + '-' + d;
        }

        function pmSaveRenew() {
            if (!pmValidateRenew()) return;

            const schoolId = renewCurrentSchoolId;
            const amount = parseFloat(document.getElementById('pm-renew-amount').value);

            // 自动计算日期：从套餐到期日的下一天开始，到一年后的同一天减1天
            const purchases = JSON.parse(localStorage.getItem('purchases_' + schoolId) || '[]');
            const currentPkg = purchases.find(p => p.packageName && !p.packageName.includes('试用'))
                              || purchases.find(p => p.status === 'active')
                              || purchases[0];
            const baseEndDate = currentPkg && currentPkg.endDate ? new Date(currentPkg.endDate) : new Date();
            const renewStartDate = new Date(baseEndDate);
            renewStartDate.setDate(renewStartDate.getDate() + 1); // 到期日的下一天
            const renewEndDate = new Date(renewStartDate);
            renewEndDate.setFullYear(renewEndDate.getFullYear() + 1);
            renewEndDate.setDate(renewEndDate.getDate() - 1); // 一年后的同一天减1天

            const startDateStr = formatDate(renewStartDate);
            const endDateStr = formatDate(renewEndDate);

            // 保存新的续费套餐记录
            purchases.push({
                id: 'renew' + Date.now(),
                packageName: renewCurrentPackageName,
                startDate: startDateStr,
                endDate: endDateStr,
                status: 'active',
                points: renewCurrentPoints,

            const si = schools.findIndex(s => s.schoolId === schoolId);

            localStorage.setItem('schoolPointsRecords_' + schoolId, JSON.stringify(storedRecords));

            showToast('续费成功');

                document.getElementById('pm-trial-err-school').classList.remove('hidden');
                valid = false;
            }
            if (!document.getElementById('pm-trial-package').value) {
                document.getElementById('pm-trial-err-package').textContent = '请选择试用套餐';
                document.getElementById('pm-trial-err-package').classList.remove('hidden');
                valid = false;
            }
            if (!document.getElementById('pm-trial-amount').value || parseFloat(document.getElementById('pm-trial-amount').value) < 0) {
                document.getElementById('pm-trial-err-amount').textContent = '请输入有效的金额';
                document.getElementById('pm-trial-err-amount').classList.remove('hidden');
                valid = false;
            }
            return valid;
        }

        function pmSaveTrial() {
            if (!pmValidateTrial()) return;

            const schoolId = document.getElementById('pm-trial-school').value;
            const packageId = document.getElementById('pm-trial-package').value;
            const school = institutions.find(s => s.id === schoolId);
            const pkg = pmTrialPackagesData.find(p => p.id === packageId);
            const amount = parseFloat(document.getElementById('pm-trial-amount').value);

            // 自动计算日期：生效日期为今天，到期日期为30天后（试用默认30天）
            const today = new Date();
            const endDate = new Date(today);
            endDate.setDate(endDate.getDate() + 30 - 1); // 30天试用
            const startDateStr = formatDate(today);
            const endDateStr = formatDate(endDate);

            // 保存试用记录
            const trials = JSON.parse(localStorage.getItem('trials_' + schoolId) || '[]');
            trials.push({
                id: 'trial' + Date.now(),
                packageName: pkg.name,
                modules: pkg.modules,
                startDate: startDateStr,
                endDate: endDateStr,
                amount: amount,
                status: 'active'
            });
            localStorage.setItem('trials_' + schoolId, JSON.stringify(trials));

            // 确保学校数据存在
            const schools = getSchools();
            const si = schools.findIndex(s => s.schoolId === schoolId);
            if (si === -1) {
                schools.push({
                    schoolId: schoolId,
                    schoolCode: school.schoolCode,
                    schoolName: school.username,
                    purchasePoints: 0,
                    giftPoints: 0,
                    consumed: 0,
                    balance: 0
                });
                localStorage.setItem('schools', JSON.stringify(schools));
            }

            pmHideModal('pm-modal-trial');
            showToast('试用开通成功');
            renderTable();
        }

        // ============================================================
        // 院校点数明细
        // ============================================================
        let sdmAllRecords = [];
        let sdmFiltered = [];
        let sdmCurPage = 1;
        const sdmPageSize = 10;
        let sdmCurrentSchoolId = null;
        let sdmCurrentSchoolData = null;

        function openSchoolDetail(schoolId) {
            sdmCurrentSchoolId = schoolId;
            const inst = institutions.find(i => i.id === schoolId);
            const schoolData = getSchoolPointsBySchoolId(schoolId);
            sdmCurrentSchoolData = schoolData;

            document.getElementById('sdm-title').textContent = (inst ? inst.username : '') + ' - 点数明细';
            document.getElementById('sdm-subtitle').textContent = '学校编码：' + (inst ? inst.schoolCode : '');
            document.getElementById('sdm-purchase').textContent = schoolData ? schoolData.purchasePoints.toLocaleString() : '0';
            document.getElementById('sdm-consumed').textContent = schoolData ? schoolData.consumed.toLocaleString() : '0';
            document.getElementById('sdm-balance').textContent = schoolData ? schoolData.balance.toLocaleString() : '0';

            const storedRecords = JSON.parse(localStorage.getItem('schoolPointsRecords_' + schoolId) || '[]');
            sdmAllRecords = [];

            const purchases = JSON.parse(localStorage.getItem('purchases_' + schoolId) || '[]');

            storedRecords.forEach(r => {
                if (r.type === 'recharge' || r.type === 'deduct') {
                    let purchaseName = '账户';
                    if (r.purchaseId && r.purchaseId !== 'default') {
                        const pkg = purchases.find(p => p.id === r.purchaseId);
                        if (pkg) purchaseName = pkg.packageName + ' (' + pkg.startDate + ')';
                        else purchaseName = r.purchaseId;
                    }
                    sdmAllRecords.push({
                        id: r.id, schoolId: r.schoolId, type: r.type, purchaseName: purchaseName,
                        points: r.points, amount: r.amount || 0, time: r.time,
                        remark: r.remark || null, operator: r.operator || '运营管理员(admin)', createdAt: r.time
                    });
                }
            });

            sdmAllRecords.push(
                { id: 'rc1', schoolId: schoolId, type: 'recharge', purchaseName: '基础版 (2026.1.1)', points: 5000, amount: 5000, time: '2026-03-01 09:00:00', remark: '套餐充值', operator: '运营李四(lisi)', createdAt: '2026-03-01 09:00:00' },
                { id: 'rc2', schoolId: schoolId, type: 'recharge', purchaseName: '进阶版 (2026.2.15)', points: 3000, amount: 3000, time: '2026-03-15 14:30:00', remark: '补充充值', operator: '运营王五(wangwu)', createdAt: '2026-03-15 14:30:00' }
            );
            sdmAllRecords.push(
                { id: 'dc1', schoolId: schoolId, type: 'deduct', purchaseName: '基础版 (2026.1.1)', points: 100, amount: 0, time: '2026-03-10 09:00:00', remark: '重复充值退款', operator: '运营张三(zhangsan)', createdAt: '2026-03-10 09:00:00' }
            );
            sdmAllRecords.push(
                { id: 'c1', schoolId: schoolId, type: 'consume', purchaseName: '基础版 (2026.1.1)', points: 15, amount: 0, time: '2026-03-03 14:20:00', remark: '生成绘本：丑小鸭的故事', operator: '张三(3000003)', createdAt: '2026-03-03 14:20:00' },
                { id: 'c2', schoolId: schoolId, type: 'consume', purchaseName: '基础版 (2026.1.1)', points: 20, amount: 0, time: '2026-03-04 08:15:00', remark: '生成课件：Unit 3 课件', operator: '李四(3000004)', createdAt: '2026-03-04 08:15:00' },
                { id: 'c3', schoolId: schoolId, type: 'consume', purchaseName: '进阶版 (2026.2.15)', points: 10, amount: 0, time: '2026-03-05 16:40:00', remark: '生成数字人：数学老师数字人', operator: '王五(3000005)', createdAt: '2026-03-05 16:40:00' },
                { id: 'c4', schoolId: schoolId, type: 'consume', purchaseName: '进阶版 (2026.2.15)', points: 30, amount: 0, time: '2026-03-06 11:05:00', remark: '生成活动：消防安全演练', operator: '赵六(3000006)', createdAt: '2026-03-06 11:05:00' },
                { id: 'c5', schoolId: schoolId, type: 'consume', purchaseName: '基础版 (2026.1.1)', points: 25, amount: 0, time: '2026-03-12 15:30:00', remark: '生成绘本：小红帽的故事', operator: '孙七(3000007)', createdAt: '2026-03-12 15:30:00' }
            );

            sdmAllRecords.sort((a, b) => b.createdAt.localeCompare(a.createdAt));
            document.getElementById('sdm-filter-type').value = '';
            document.getElementById('sdm-filter-from').value = '';
            document.getElementById('sdm-filter-to').value = '';
            sdmFiltered = [...sdmAllRecords];
            sdmCurPage = 1;
            sdmRender();
            pmShowModal('modal-school-detail');
            pmInitIcons();
        }

        function sdmApplyFilters() {
            const type = document.getElementById('sdm-filter-type').value;
            const from = document.getElementById('sdm-filter-from').value;
            const to = document.getElementById('sdm-filter-to').value;
            sdmFiltered = sdmAllRecords.filter(r => {
                if (type && r.type !== type) return false;
                if (from && r.createdAt < from) return false;
                if (to && r.createdAt > to + ' 23:59:59') return false;
                return true;
            });
            sdmCurPage = 1;
            sdmRender();
        }

        function sdmRender() {
            const start = (sdmCurPage - 1) * sdmPageSize;
            const pageData = sdmFiltered.slice(start, start + sdmPageSize);
            const totalPages = Math.max(1, Math.ceil(sdmFiltered.length / sdmPageSize));
            const tbody = document.getElementById('sdm-table-body');
            document.getElementById('sdm-count').textContent = sdmFiltered.length;

            if (pageData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="px-4 py-10 text-center text-gray-400">暂无数据</td></tr>';
            } else {
                tbody.innerHTML = pageData.map((r, i) => {
                    const no = start + i + 1;
                    const typeInfo = {
                        recharge: { label: '充值', cls: 'bg-green-100 text-green-700' },
                        consume: { label: '消费', cls: 'bg-blue-100 text-blue-700' },
                        deduct: { label: '扣减', cls: 'bg-orange-100 text-orange-700' }
                    }[r.type] || { label: r.type, cls: 'bg-gray-100 text-gray-700' };

                    const pointsHtml = r.type === 'consume'
                        ? '<span class="text-orange-600 font-medium">-' + r.points + '</span>'
                        : r.type === 'deduct'
                            ? '<span class="text-orange-600 font-medium">-' + r.points + '</span>'
                            : '<span class="text-green-600 font-medium">+' + r.points + '</span>';

                    const operator = r.operator || '-';

                    return '<tr class="hover:bg-gray-50/60">' +
                        '<td class="px-4 py-2.5 text-gray-500 whitespace-nowrap text-xs">' + no + '</td>' +
                        '<td class="px-4 py-2.5 text-center"><span class="px-2 py-0.5 text-xs font-medium rounded ' + typeInfo.cls + '">' + typeInfo.label + '</span></td>' +
                        '<td class="px-4 py-2.5 text-right font-semibold">' + pointsHtml + '</td>' +
                        '<td class="px-4 py-2.5 text-gray-500 whitespace-nowrap text-xs">' + r.time.substring(0, 16) + '</td>' +
                        '<td class="px-4 py-2.5 text-gray-600 text-sm">' + operator + '</td>' +
                        '<td class="px-4 py-2.5 text-gray-600 text-sm">' + (r.remark || '-') + '</td></tr>';
                }).join('');
            }

            document.getElementById('sdm-prev').disabled = sdmCurPage <= 1;
            document.getElementById('sdm-next').disabled = sdmCurPage >= totalPages;
            const pagesEl = document.getElementById('sdm-pages');
            pagesEl.innerHTML = '';
            for (let i = 1; i <= Math.min(totalPages, 5); i++) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = i;
                btn.className = i === sdmCurPage
                    ? 'min-w-[28px] px-1.5 py-0.5 rounded text-xs font-semibold bg-primary-600 text-white'
                    : 'min-w-[28px] px-1.5 py-0.5 rounded text-xs font-medium text-gray-700 hover:bg-gray-100';
                btn.onclick = () => sdmGoPage(i);
                pagesEl.appendChild(btn);
            }
            pmInitIcons();
        }

        function sdmGoPage(page) {
            const totalPages = Math.max(1, Math.ceil(sdmFiltered.length / sdmPageSize));
            if (page < 1 || page > totalPages) return;
            sdmCurPage = page;
            sdmRender();
        }

        // ============================================================
        // 充值
        // ============================================================
        let rcmCurrentSchoolId = null;

        function openRechargeModal() {
            if (!sdmCurrentSchoolId) return;
            rcmCurrentSchoolId = sdmCurrentSchoolId;
            document.getElementById('rcm-points').value = '';
            document.getElementById('rcm-amount').value = '';
            document.getElementById('rcm-remark').value = '';
            ['points', 'amount'].forEach(f => {
                const el = document.getElementById('rcm-err-' + f);
                if (el) el.classList.add('hidden');
            });
            pmShowModal('modal-recharge');
            pmInitIcons();
        }

        function confirmRecharge() {
            const schoolId = rcmCurrentSchoolId;
            const points = parseInt(document.getElementById('rcm-points').value);
            ['points', 'amount'].forEach(f => {
                const el = document.getElementById('rcm-err-' + f);
                if (el) el.classList.add('hidden');
            });
            let valid = true;
            if (!points || points < 1) {
                document.getElementById('rcm-err-points').textContent = '请输入有效的点数';
                document.getElementById('rcm-err-points').classList.remove('hidden');
                valid = false;
            }
            if (!valid) return;

            const newRecord = {
                id: 'rc' + Date.now(), schoolId: schoolId, type: 'recharge',
                points: points,
                amount: parseFloat(document.getElementById('rcm-amount').value) || 0,
                remark: document.getElementById('rcm-remark').value.trim() || null,
                operator: '运营管理员(admin)',
                time: new Date().toISOString().replace('T', ' ').substring(0, 19)
            };

            let storedRecords = JSON.parse(localStorage.getItem('schoolPointsRecords_' + schoolId) || '[]');
            storedRecords.push(newRecord);
            localStorage.setItem('schoolPointsRecords_' + schoolId, JSON.stringify(storedRecords));

            // 更新 schools 数据
            const schools = getSchools();
            const si = schools.findIndex(s => s.schoolId === schoolId);
            if (si !== -1) {
                schools[si].purchasePoints = (schools[si].purchasePoints || 0) + points;
                schools[si].balance = (schools[si].balance || 0) + points;
            } else {
                schools.push({ schoolId: schoolId, schoolCode: '', schoolName: '', purchasePoints: points, giftPoints: 0, consumed: 0, balance: points });
            }
            localStorage.setItem('schools', JSON.stringify(schools));

            pmHideModal('modal-recharge');
            pmToast('充值成功');
            if (sdmCurrentSchoolId === schoolId) openSchoolDetail(schoolId);
            renderTable();
        }

        // ============================================================
        // 扣减
        // ============================================================
        let dcmCurrentSchoolId = null;

        function openDeductModal() {
            if (!sdmCurrentSchoolId) return;
            dcmCurrentSchoolId = sdmCurrentSchoolId;
            document.getElementById('dcm-points').value = '';
            document.getElementById('dcm-remark').value = '';
            ['points', 'remark'].forEach(f => {
                const el = document.getElementById('dcm-err-' + f);
                if (el) el.classList.add('hidden');
            });
            pmShowModal('modal-deduct');
            pmInitIcons();
        }

        function confirmDeduct() {
            const schoolId = dcmCurrentSchoolId;
            const points = parseInt(document.getElementById('dcm-points').value);
            const remark = (document.getElementById('dcm-remark').value || '').trim();
            ['points', 'remark'].forEach(f => {
                const el = document.getElementById('dcm-err-' + f);
                if (el) el.classList.add('hidden');
            });
            let valid = true;
            if (!points || points < 1) {
                document.getElementById('dcm-err-points').textContent = '请输入有效的点数';
                document.getElementById('dcm-err-points').classList.remove('hidden');
                valid = false;
            }
            if (!remark) {
                document.getElementById('dcm-err-remark').textContent = '请输入扣减原因';
                document.getElementById('dcm-err-remark').classList.remove('hidden');
                valid = false;
            }
            if (!valid) return;

            const newRecord = {
                id: 'dc' + Date.now(), schoolId: schoolId, type: 'deduct',
                points: points,
                amount: 0, remark: remark,
                operator: '运营管理员(admin)',
                time: new Date().toISOString().replace('T', ' ').substring(0, 19)
            };

            let storedRecords = JSON.parse(localStorage.getItem('schoolPointsRecords_' + schoolId) || '[]');
            storedRecords.push(newRecord);
            localStorage.setItem('schoolPointsRecords_' + schoolId, JSON.stringify(storedRecords));

            const schools = getSchools();
            const si = schools.findIndex(s => s.schoolId === schoolId);
            if (si !== -1) {
                schools[si].consumed = (schools[si].consumed || 0) + points;
                schools[si].balance = Math.max(0, (schools[si].balance || 0) - points);
            }
            localStorage.setItem('schools', JSON.stringify(schools));

            pmHideModal('modal-deduct');
            pmToast('扣减成功');
            if (sdmCurrentSchoolId === schoolId) openSchoolDetail(schoolId);
            renderTable();
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function () {
            filteredInstitutions = [...institutions];
            applyFilters();
            pmInitIcons();
        });
    </script>
        <script src="../components/prd-drawer.js" data-doc="../docs/your-doc.md"></script>

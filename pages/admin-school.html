<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学校管理 - 运营平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://registry.npmmirror.com/lucide/latest/files/dist/umd/lucide.js"></script>
    <script src="sidebar.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0f3ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
                            400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
                            800: '#3730a3', 900: '#312e81',
                        },
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        html, body { height: 100%; overflow: hidden; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; }
        .toast {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            color: white; padding: 12px 24px; border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); z-index: 10000;
            display: flex; align-items: center; gap: 12px;
            opacity: 0; transition: all 0.3s ease; pointer-events: none;
        }
        .toast.show { opacity: 1; pointer-events: all; transform: translateX(-50%) translateY(0); }
        .toast.hide { opacity: 0; transform: translateX(-50%) translateY(-8px); }
        .toast.toast-success { background: #10b981; }
        .toast.toast-info { background: #3b82f6; }
        .toast.toast-error { background: #ef4444; }
        thead { position: sticky; top: 0; z-index: 10; }
        .admin-nav-subitem { transition: all 0.15s ease; }
        .admin-nav-subitem:hover { background-color: #eef2ff; color: #4f46e5; }
        .admin-nav-subitem.active { background-color: #e0e7ff; color: #4f46e5; }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div class="px-6 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gradient-to-br from-primary-500 to-purple-600 rounded-xl flex items-center justify-center text-white font-bold shadow-lg">
                    <i data-lucide="sparkles" class="w-4 h-4"></i>
                </div>
                <span class="text-base font-semibold text-gray-800">运营平台</span>
            </div>
            <div class="flex items-center gap-3">
                <div class="w-7 h-7 bg-gradient-to-br from-primary-500 to-purple-600 rounded-full flex items-center justify-center text-white text-xs font-semibold">A</div>
                <span class="text-sm text-gray-700 font-medium">管理员</span>
            </div>
        </div>
    </header>

    <div class="flex h-[calc(100vh-57px)]">

        <!-- 左侧菜单 -->
        <div id="sidebar-container"></div>

        <main class="flex-1 overflow-hidden flex flex-col">

            <!-- ==================== 面板: 学校管理 ==================== -->
            <div class="h-full px-6 pt-6 overflow-y-auto">
                <div class="mb-6">
                    <h1 class="text-2xl font-semibold text-gray-900">学校管理</h1>
                </div>

                <div class="mb-6 bg-white rounded-lg border border-gray-200 p-4 shadow-sm">
                    <div class="flex flex-wrap items-end gap-x-5 gap-y-3">
                        <div class="flex items-center gap-2">
                            <label class="text-xs font-medium text-gray-600 whitespace-nowrap">学校名称</label>
                            <input type="text" id="filterUsername" placeholder="请输入学校名称" class="px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 w-40">
                        </div>
                        <div class="flex items-center gap-2">
                            <label class="text-xs font-medium text-gray-600 whitespace-nowrap">账号</label>
                            <input type="text" id="filterAccount" placeholder="请输入账号" class="px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 w-36">
                        </div>
                        <div class="flex items-center gap-2">
                            <label class="text-xs font-medium text-gray-600 whitespace-nowrap">学校编码</label>
                            <input type="text" id="filterSchoolCode" placeholder="请输入学校编码" class="px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 w-36">
                        </div>
                        <div class="flex items-center gap-2">
                            <label class="text-xs font-medium text-gray-600 whitespace-nowrap">联系人</label>
                            <input type="text" id="filterContact" placeholder="请输入联系人" class="px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 w-36">
                        </div>
                        <div class="flex items-center gap-2">
                            <label class="text-xs font-medium text-gray-600 whitespace-nowrap">状态</label>
                            <select id="filterDisabled" class="px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 bg-white w-28">
                                <option value="">全部</option>
                                <option value="false" selected>可用</option>
                                <option value="true">禁用</option>
                            </select>
                        </div>
                        <button type="button" onclick="applyFilters()" class="px-4 py-2 bg-primary-600 hover:bg-primary-700 text-white rounded-md text-sm font-medium transition-all flex items-center gap-2 shadow-sm shrink-0">
                            <i data-lucide="search" class="w-4 h-4"></i>查询
                        </button>
                        <button type="button" onclick="createMainAdmin()" class="px-4 py-2 bg-orange-500 hover:bg-orange-600 text-white rounded-md text-sm font-medium transition-all flex items-center gap-2 shadow-sm shrink-0">
                            <i data-lucide="plus" class="w-4 h-4"></i>新建学校
                        </button>
                    </div>
                </div>

                <div class="bg-white rounded-lg border border-gray-200 shadow-sm flex flex-col" style="height: calc(100vh - 320px); min-height: 320px;">
                    <div class="overflow-x-auto overflow-y-auto flex-1">
                        <table class="w-full min-w-[900px]">
                            <thead class="bg-gray-50 border-b border-gray-200">
                                <tr>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">序号</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">学校名称</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">学校编码</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">账号</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">联系人</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">状态</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider whitespace-nowrap">操作</th>
                                </tr>
                            </thead>
                            <tbody id="instTableBody" class="bg-white divide-y divide-gray-100"></tbody>
                        </table>
                    </div>
                    <div class="px-6 py-4 border-t border-gray-200 flex flex-wrap items-center justify-between gap-4 bg-white flex-shrink-0">
                        <div class="flex items-center gap-2 text-sm text-gray-600">
                            <select id="pageSizeSelect" onchange="onPageSizeChange()" class="px-2 py-1.5 border border-gray-300 rounded-md text-sm focus:outline-none focus:border-primary-500 bg-white">
                                <option value="10" selected>10条/页</option>
                                <option value="20">20条/页</option>
                                <option value="50">50条/页</option>
                            </select>
                        </div>
                        <div class="flex items-center gap-2">
                            <button type="button" id="prevBtn" onclick="goToPreviousPage()" class="p-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-all" aria-label="上一页">
                                <i data-lucide="chevron-left" class="w-4 h-4"></i>
                            </button>
                            <div class="flex items-center gap-1" id="pageNumbers"></div>
                            <button type="button" id="nextBtn" onclick="goToNextPage()" class="p-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-all" aria-label="下一页">
                                <i data-lucide="chevron-right" class="w-4 h-4"></i>
                            </button>
                            <span class="text-sm text-gray-600 ml-2">共 <span id="totalCount">0</span> 条</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- ==================== 弹窗: 新建/编辑学校 ==================== -->
    <div id="school-modal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/45" onclick="hideSchoolModal()"></div>
        <div class="relative bg-white rounded-2xl shadow-2xl overflow-hidden" style="transform: scale(0.95); width: 100%; max-width: 520px; margin: 80px auto 0;">
            <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between shrink-0">
                <h3 class="font-semibold text-gray-800" id="sm-title">新建学校</h3>
                <button type="button" onclick="hideSchoolModal()" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="px-6 py-5 flex flex-col gap-4">
                <div class="flex flex-col gap-1.5">
                    <label class="text-sm font-medium text-gray-700">学校名称 <span class="text-red-500">*</span></label>
                    <input type="text" id="sm-schoolname" placeholder="请输入学校名称" class="px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
                    <p id="sm-err-schoolname" class="text-sm text-red-500 hidden"></p>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-sm font-medium text-gray-700">学校编码 <span class="text-red-500">*</span></label>
                    <input type="text" id="sm-schoolcode" placeholder="如 SYXX" maxlength="6" oninput="onSchoolCodeInput(this.value)"
                        class="px-3 py-2.5 border border-gray-300 rounded-lg text-sm font-mono tracking-wider focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 uppercase">
                    <p class="text-xs text-gray-400">建议使用学校首字母缩写，2~6位字母，如深实小 → SYXX，深外小 → SWXX</p>
                    <p id="sm-err-schoolcode" class="text-sm text-red-500 hidden"></p>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-sm font-medium text-gray-700">账号 <span class="text-red-500">*</span></label>
                    <div class="flex items-center gap-0">
                        <span id="sm-account-prefix" class="inline-flex items-center px-3 py-2.5 border border-r-0 border-gray-300 rounded-l-lg bg-gray-50 text-sm font-mono text-gray-500 min-w-[72px] justify-center select-none">-</span>
                        <input type="text" id="sm-accountnum" placeholder="0001" maxlength="4"
                            class="flex-1 px-3 py-2.5 border border-gray-300 rounded-r-lg text-sm font-mono tracking-wider focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
                    </div>
                    <p class="text-xs text-gray-400 mt-0.5">格式：学校编码 + 4位数字，如 SYXX0001</p>
                    <p id="sm-err-accountnum" class="text-sm text-red-500 hidden"></p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1.5">
                        <label class="text-sm font-medium text-gray-700">联系人</label>
                        <input type="text" id="sm-contact" placeholder="姓名或职位" class="px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label class="text-sm font-medium text-gray-700">手机号</label>
                        <input type="text" id="sm-phone" placeholder="选填" maxlength="11" class="px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500">
                    </div>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-sm font-medium text-gray-700">状态</label>
                    <select id="sm-disabled" class="px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 bg-white">
                        <option value="false">可用</option>
                        <option value="true">禁用</option>
                    </select>
                </div>
            </div>
            <div class="px-6 py-4 border-t border-gray-100 flex justify-end gap-3 shrink-0">
                <button type="button" onclick="hideSchoolModal()" class="px-5 py-2.5 border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-50 transition-colors">取消</button>
                <button type="button" onclick="saveSchool()" class="px-5 py-2.5 bg-primary-600 hover:bg-primary-700 text-white rounded-lg text-sm font-medium transition-colors shadow-sm">确认</button>
            </div>
        </div>
    </div>

    <script src="points-manage.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            renderSidebar('admin-school.html');
        });
    </script>
    <script>
        // ============================================================
        // 学校管理
        // ============================================================
        const seedInstitutions = [
            { id: '697079ee686b4dcb495085ea', schoolCode: 'SYXX', account: 'SYXX0001', username: '深圳实验学校小学部', contact: '陈校长', phone: '13800138001', disabled: false },
            { id: '697079ee686b4dcb495085eb', schoolCode: 'SWXX', account: 'SWXX0001', username: '深圳外国语小学', contact: '林主任', phone: '13900139002', disabled: false },
            { id: '697079ee686b4dcb495085ec', schoolCode: 'BLXX', account: 'BLXX0001', username: '深圳外国语学校附属碧海小学', contact: '王老师', phone: '-', disabled: false },
            { id: '697079ee686b4dcb495085ed', schoolCode: 'HLXX', account: 'HLXX0001', username: '海滨小学', contact: '张校长', phone: '13700137003', disabled: false },
            { id: '697079ee686b4dcb495085ee', schoolCode: 'NHXX', account: 'NHXX0001', username: '南海小学', contact: '李主任', phone: '13600136004', disabled: false },
            { id: '697079ee686b4dcb495085ef', schoolCode: 'YXXX', account: 'YXXX0001', username: '育才一小', contact: '刘校长', phone: '13500135005', disabled: false },
            { id: '697079ee686b4dcb495085f0', schoolCode: 'XSXX', account: 'XSXX0001', username: '学府一小', contact: '周老师', phone: '-', disabled: false },
            { id: '697079ee686b4dcb495085f1', schoolCode: 'BLYXX', account: 'BLYXX001', username: '百丽小学', contact: '孙主任', phone: '13400134006', disabled: false },
            { id: '697079ee686b4dcb495085f2', schoolCode: 'DFXX', account: 'DFXX0001', username: '大芬小学', contact: '郑校长', phone: '13300133007', disabled: false },
            { id: '697079ee686b4dcb495085f3', schoolCode: 'LGXX', account: 'LGXX0001', username: '龙岗实验小学', contact: '钱老师', phone: '13200132008', disabled: false },
            { id: '697079ee686b4dcb495085f4', schoolCode: 'GJXX', account: 'GJXX0001', username: '光祖小学', contact: '吴主任', phone: '13100131009', disabled: false },
            { id: '697079ee686b4dcb495085f5', schoolCode: 'LMXX', account: 'LMXX0001', username: '莲南小学', contact: '黄校长', phone: '-', disabled: false },
            { id: '697079ee686b4dcb495085f6', schoolCode: 'HYXX', account: 'HYXX0001', username: '海韵小学', contact: '马老师', phone: '13000130010', disabled: false },
            { id: '697079ee686b4dcb495085f7', schoolCode: 'YTXX', account: 'YTXX0001', username: '园岭小学', contact: '徐主任', phone: '15900159011', disabled: false },
            { id: '697079ee686b4dcb495085f8', schoolCode: 'SLXX', account: 'SLXX0001', username: '石岩小学', contact: '朱校长', phone: '15800158012', disabled: false },
            { id: '697079ee686b4dcb495085f9', schoolCode: 'GXXX', account: 'GXXX0001', username: '观星小学', contact: '冯老师', phone: '15700157013', disabled: false },
            { id: '697079ee686b4dcb495085fa', schoolCode: 'LHXX', account: 'LHXX0001', username: '龙华第一小学', contact: '宋主任', phone: '-', disabled: false },
            { id: '697079ee686b4dcb495085fb', schoolCode: 'BSXX', account: 'BSXX0001', username: '白石洲小学', contact: '唐校长', phone: '15600156014', disabled: false },
            { id: '697079ee686b4dcb495085fc', schoolCode: 'MYXX', account: 'MYXX0001', username: '梅园小学', contact: '许老师', phone: '15500155015', disabled: false },
            { id: '697079ee686b4dcb495085fd', schoolCode: 'XYXX', account: 'XYXX0001', username: '香域 ZOO 小学', contact: '梁主任', phone: '15400154016', disabled: false },
        ];

        let institutions = JSON.parse(localStorage.getItem('institutions'));
        if (!institutions || !Array.isArray(institutions) || institutions.length === 0) {
            institutions = [...seedInstitutions];
            localStorage.setItem('institutions', JSON.stringify(institutions));
        } else {
            // 检查数据是否完整，不完整则补充或重新初始化
            const isIncomplete = institutions.some(row => !row.account || !row.schoolCode || !row.username);
            if (isIncomplete) {
                institutions = [...seedInstitutions];
                localStorage.setItem('institutions', JSON.stringify(institutions));
            }
        }
        let filteredInstitutions = [...institutions];
        let currentPage = 1;
        let pageSize = 10;

        function applyFilters() {
            const account = (document.getElementById('filterAccount').value || '').trim().toLowerCase();
            const username = (document.getElementById('filterUsername').value || '').trim().toLowerCase();
            const schoolCode = (document.getElementById('filterSchoolCode').value || '').trim().toLowerCase();
            const contact = (document.getElementById('filterContact').value || '').trim().toLowerCase();
            const disabledVal = document.getElementById('filterDisabled').value;
            filteredInstitutions = institutions.filter((row) => {
                if (account && !row.account.toLowerCase().includes(account)) return false;
                if (username && !row.username.toLowerCase().includes(username)) return false;
                if (schoolCode && !row.schoolCode.toLowerCase().includes(schoolCode)) return false;
                if (contact && !(row.contact || '').toLowerCase().includes(contact)) return false;
                if (disabledVal === 'true' && !row.disabled) return false;
                if (disabledVal === 'false' && row.disabled) return false;
                return true;
            });
            currentPage = 1;
            renderTable();
            updatePagination();
        }

        function onPageSizeChange() {
            pageSize = parseInt(document.getElementById('pageSizeSelect').value, 10) || 10;
            currentPage = 1;
            renderTable();
            updatePagination();
        }

        function getTotalPages() { return Math.max(1, Math.ceil(filteredInstitutions.length / pageSize)); }
        function getCurrentPageData() { return filteredInstitutions.slice((currentPage - 1) * pageSize, (currentPage - 1) * pageSize + pageSize); }

        function renderTable() {
            const tbody = document.getElementById('instTableBody');
            const pageData = getCurrentPageData();
            const startIndex = (currentPage - 1) * pageSize;
            tbody.innerHTML = pageData.map((row, index) => {
                const no = startIndex + index + 1;
                const statusHtml = row.disabled
                    ? '<span class="px-2 py-0.5 text-xs font-medium rounded bg-red-100 text-red-700">禁用</span>'
                    : '<span class="px-2 py-0.5 text-xs font-medium rounded bg-green-100 text-green-700">正常</span>';
                const contactDisplay = row.contact && row.contact !== '-' ? row.contact : '-';
                const accountDisplay = row.account || '-';
                return '<tr class="hover:bg-gray-50/80 even:bg-gray-50/40" data-id="' + row.id + '">' +
                    '<td class="px-4 py-3 whitespace-nowrap text-sm text-gray-600">' + no + '</td>' +
                    '<td class="px-4 py-3 whitespace-nowrap text-sm font-medium text-gray-900">' + (row.username || '-') + '</td>' +
                    '<td class="px-4 py-3 whitespace-nowrap text-sm text-gray-900">' + (row.schoolCode || '-') + '</td>' +
                    '<td class="px-4 py-3 whitespace-nowrap text-sm text-gray-900">' + accountDisplay + '</td>' +
                    '<td class="px-4 py-3 whitespace-nowrap text-sm text-gray-600">' + contactDisplay + '</td>' +
                    '<td class="px-4 py-3 whitespace-nowrap">' + statusHtml + '</td>' +
                    '<td class="px-4 py-3 whitespace-nowrap text-sm"><button type="button" onclick="editRow(\'' + row.id + '\')" class="text-primary-600 hover:text-primary-800 font-medium">编辑</button></td></tr>';
            }).join('');
            if (window.lucide && typeof lucide.createIcons === 'function') lucide.createIcons();
        }

        function updatePagination() {
            const totalPages = getTotalPages();
            const totalCount = filteredInstitutions.length;
            document.getElementById('totalCount').textContent = totalCount;
            document.getElementById('prevBtn').disabled = currentPage <= 1;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages;
            const container = document.getElementById('pageNumbers');
            container.innerHTML = '';
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = String(i);
                btn.onclick = () => goToPage(i);
                btn.className = i === currentPage
                    ? 'min-w-[32px] px-2 py-1 rounded-md text-sm font-medium bg-primary-600 text-white transition-all'
                    : 'min-w-[32px] px-2 py-1 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-100 transition-all';
                container.appendChild(btn);
            }
        }

        function goToPage(page) {
            const totalPages = getTotalPages();
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                renderTable();
                updatePagination();
            }
        }
        function goToPreviousPage() { if (currentPage > 1) goToPage(currentPage - 1); }
        function goToNextPage() { const totalPages = getTotalPages(); if (currentPage < totalPages) goToPage(currentPage + 1); }

        function showToast(message, type) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast ' + (type === 'info' ? 'toast-info' : type === 'error' ? 'toast-error' : 'toast-success');
            toast.innerHTML = '<i data-lucide="' + (type === 'info' ? 'info' : 'check-circle') + '"></i><span>' + message + '</span>';
            document.body.appendChild(toast);
            if (typeof lucide !== 'undefined') lucide.createIcons();
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        // ============================================================
        // 新建/编辑学校弹窗
        // ============================================================
        let schoolModalMode = 'create';
        let schoolModalId = null;

        function schoolInitFormDefaults() {
            document.getElementById('sm-schoolname').value = '';
            document.getElementById('sm-schoolcode').value = '';
            document.getElementById('sm-accountnum').value = '';
            document.getElementById('sm-contact').value = '';
            document.getElementById('sm-phone').value = '';
            document.getElementById('sm-disabled').value = 'false';
            ['schoolname','schoolcode','accountnum'].forEach(k => {
                const el = document.getElementById('sm-err-' + k);
                if (el) el.textContent = '';
            });
            const codeInput = document.getElementById('sm-schoolcode');
            const numInput = document.getElementById('sm-accountnum');
            codeInput.readOnly = false;
            numInput.readOnly = false;
            codeInput.classList.remove('!bg-gray-100', '!cursor-not-allowed', '!text-gray-500');
            numInput.parentElement.classList.remove('!bg-gray-100', '!cursor-not-allowed');
            numInput.classList.remove('!bg-gray-100', '!cursor-not-allowed', '!text-gray-500');
            document.getElementById('sm-account-prefix').classList.remove('!bg-gray-200', '!text-gray-400');
        }

        function createMainAdmin() {
            schoolModalMode = 'create';
            schoolModalId = null;
            schoolInitFormDefaults();
            document.getElementById('sm-title').textContent = '新建学校';
            document.getElementById('sm-account-prefix').textContent = '-';
            document.getElementById('sm-accountnum').readOnly = false;
            document.getElementById('sm-schoolcode').readOnly = false;
            showSchoolModal();
        }

        function editRow(id) {
            const row = institutions.find(i => i.id === id);
            if (!row) return;
            schoolModalMode = 'edit';
            schoolModalId = id;
            schoolInitFormDefaults();
            document.getElementById('sm-title').textContent = '编辑学校';
            document.getElementById('sm-schoolname').value = row.username || '';
            document.getElementById('sm-schoolcode').value = row.schoolCode || '';
            document.getElementById('sm-account-prefix').textContent = row.schoolCode || '-';
            const numPart = (row.account || '').replace(row.schoolCode || '', '');
            document.getElementById('sm-accountnum').value = numPart;
            const codeInput = document.getElementById('sm-schoolcode');
            const numInput = document.getElementById('sm-accountnum');
            codeInput.readOnly = true;
            numInput.readOnly = true;
            codeInput.classList.add('!bg-gray-100', '!cursor-not-allowed', '!text-gray-500');
            numInput.parentElement.classList.add('!bg-gray-100', '!cursor-not-allowed');
            numInput.classList.add('!bg-gray-100', '!cursor-not-allowed', '!text-gray-500');
            document.getElementById('sm-account-prefix').classList.add('!bg-gray-200', '!text-gray-400');
            document.getElementById('sm-contact').value = row.contact || '';
            document.getElementById('sm-phone').value = row.phone || '';
            document.getElementById('sm-disabled').value = row.disabled ? 'true' : 'false';
            showSchoolModal();
        }

        function showSchoolModal() {
            document.getElementById('school-modal').classList.remove('hidden');
            document.getElementById('sm-schoolname').focus();
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        function hideSchoolModal() {
            document.getElementById('school-modal').classList.add('hidden');
        }

        function onSchoolCodeInput(val) {
            document.getElementById('sm-account-prefix').textContent = val.toUpperCase() || '-';
        }

        function schoolValidate() {
            const fieldErrors = {};
            const name = document.getElementById('sm-schoolname').value.trim();
            const code = document.getElementById('sm-schoolcode').value.trim().toUpperCase();
            const num = document.getElementById('sm-accountnum').value.trim();
            if (!name) fieldErrors.schoolname = '学校名称不能为空';
            if (!code) fieldErrors.schoolcode = '学校编码不能为空';
            else if (!/^[A-Z]+$/.test(code)) fieldErrors.schoolcode = '学校编码仅支持字母';
            if (!num) fieldErrors.accountnum = '账号不能为空';
            else if (!/^\d{4}$/.test(num)) fieldErrors.accountnum = '账号数字部分必须为4位数字';
            if (code && num) {
                const fullAccount = code + num;
                const duplicate = institutions.find(i => i.account.toUpperCase() === fullAccount && i.id !== schoolModalId);
                if (duplicate) fieldErrors.accountnum = '该账号已存在，请使用其他编号';
            }
            return fieldErrors;
        }

        function saveSchool() {
            const fieldErrors = schoolValidate();
            ['schoolname','schoolcode','accountnum'].forEach(k => {
                const el = document.getElementById('sm-err-' + k);
                if (el) el.textContent = '';
            });
            const keys = Object.keys(fieldErrors);
            if (keys.length > 0) {
                keys.forEach(k => {
                    const el = document.getElementById('sm-err-' + k);
                    if (el) { el.textContent = fieldErrors[k]; el.classList.remove('hidden'); }
                });
                return;
            }
            const data = {
                schoolCode: document.getElementById('sm-schoolcode').value.trim().toUpperCase(),
                username: document.getElementById('sm-schoolname').value.trim(),
                account: document.getElementById('sm-schoolcode').value.trim().toUpperCase() + document.getElementById('sm-accountnum').value.trim(),
                contact: document.getElementById('sm-contact').value.trim() || '-',
                phone: document.getElementById('sm-phone').value.trim() || '-',
                disabled: document.getElementById('sm-disabled').value === 'true',
            };
            if (schoolModalMode === 'create') {
                data.id = Date.now().toString(16) + Math.random().toString(16).slice(2);
                institutions.push(data);
                const schools = JSON.parse(localStorage.getItem('schools')) || getSchools();
                schools.push({
                    schoolId: data.id,
                    schoolCode: data.schoolCode,
                    schoolName: data.username,
                    purchasePoints: 0,
                    giftPoints: 0,
                    consumed: 0,
                    balance: 0
                });
                localStorage.setItem('schools', JSON.stringify(schools));
            } else {
                const idx = institutions.findIndex(i => i.id === schoolModalId);
                if (idx !== -1) institutions[idx] = { ...institutions[idx], ...data };
                const schools = JSON.parse(localStorage.getItem('schools')) || [];
                const si = schools.findIndex(s => s.schoolId === schoolModalId);
                if (si !== -1) {
                    schools[si] = { ...schools[si], schoolName: data.username };
                    localStorage.setItem('schools', JSON.stringify(schools));
                }
            }
            localStorage.setItem('institutions', JSON.stringify(institutions));
            filteredInstitutions = [...institutions];
            currentPage = 1;
            renderTable();
            updatePagination();
            hideSchoolModal();
            showToast(schoolModalMode === 'create' ? '学校新建成功' : '学校信息已更新');
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function () {
            filteredInstitutions = [...institutions];
            applyFilters();
            if (window.lucide && typeof lucide.createIcons === 'function') lucide.createIcons();
        });
    </script>
</body>
</html>

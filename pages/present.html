<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课件演示 - 奕兆科技</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    /* 隐藏滚动条 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* 课件全屏显示（高度扣除底部工具栏，始终完整显示在工具栏上方） */
    .slide-container {
      width: 100vw;
      height: calc(100vh - 60px);
      background-color: #000;
      position: relative;
      overflow: hidden;
    }

    .slide-img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* 保持比例完整显示 */
    }

    /* 淡入淡出动画 */
    .fade-enter { opacity: 0; }
    .fade-enter-active { opacity: 1; transition: opacity 0.3s ease; }

    /* 底部工具栏：图标 + 文字，整块可点 */
    .toolbar-tile svg,
    .toolbar-tile [data-lucide] { pointer-events: none; }
  </style>
</head>
<body class="bg-black text-white overflow-hidden" onload="showToast()">
  <!-- 自定义提示弹窗 -->
  <div id="custom-alert" class="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center">
    <div class="bg-white text-gray-800 rounded-2xl shadow-2xl w-80 p-6 transform transition-all scale-100 text-center">
      <p class="text-lg font-medium mb-6">活动已准备就绪</p>
      <button onclick="closeCustomAlert()" class="px-8 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium">确定</button>
    </div>
  </div>

  <!-- 无遮罩：首次点击页面任意处会自动进入全屏（浏览器要求必须有一次用户操作） -->
  <div id="fullscreen-overlay" class="hidden"></div>

  <!-- 1. 课件主显示区 -->
  <div id="slide-container" class="slide-container">
    <img id="current-slide" onclick="nextSlide()" class="slide-img cursor-pointer" src="img/0.png" alt="Slide">
  </div>

  <!-- 底部：翻页（工具栏上方，固定定位） -->
  <div class="fixed bottom-[62px] right-60 z-40 -ml-[100px] flex items-center gap-1 px-4 h-10 rounded-full bg-neutral-500/40 backdrop-blur-sm border border-neutral-400/20 shadow-lg min-w-[6rem] justify-center">
    <button onclick="prevSlide()" class="p-1 text-neutral-200 hover:text-white hover:bg-white/15 rounded-full transition-colors" title="上一页">
      <i data-lucide="chevron-left" class="w-5 h-5 pointer-events-none"></i>
    </button>
    <span class="text-neutral-200 text-sm font-medium whitespace-nowrap min-w-[2.5rem] text-center"><span id="current-page-num">1</span>/<span id="total-page-num">4</span></span>
    <button onclick="nextSlide()" class="p-1 text-neutral-200 hover:text-white hover:bg-white/15 rounded-full transition-colors" title="下一页">
      <i data-lucide="chevron-right" class="w-5 h-5 pointer-events-none"></i>
    </button>
  </div>

  <!-- 底部工具栏：上图标下文字，固定在页面最底部 -->
  <div class="fixed inset-x-0 bottom-0 z-30 border-t border-white/10 bg-zinc-950 shadow-[0_-8px_32px_rgba(0,0,0,0.45)]">
    <div class="mx-auto flex max-w-6xl flex-wrap items-stretch justify-center gap-x-0 gap-y-1 px-2 py-1 sm:flex-nowrap">
      <!-- 课堂互动 -->
        <div class="flex items-stretch rounded-lg border border-white/[0.07] bg-black/25 px-0.5">
          <!-- 听写 -->
          <div class="relative">
              <button type="button" onclick="togglePanel('dictation')" id="btn-dictation" class="toolbar-tile flex min-w-[3.25rem] flex-col items-center justify-center gap-0.5 rounded-md px-2.5 py-1 text-white transition-colors hover:bg-white/10 focus:outline-none focus-visible:ring-2 focus-visible:ring-white/30 cursor-pointer" title="听写">
                <i data-lucide="pen-tool" class="h-5 w-5 shrink-0 text-white/95"></i>
                <span class="text-[11px] font-medium leading-tight text-neutral-400">听写</span>
              </button>
            <!-- 听写面板 -->
            <div id="panel-dictation" class="absolute bottom-full left-1/2 z-[45] mb-2 w-72 -translate-x-1/2 bg-neutral-900/95 backdrop-blur-2xl border border-neutral-700 rounded-xl shadow-2xl overflow-hidden hidden" style="max-height: min(380px, 55vh);">
              <div class="px-4 py-3 border-b border-neutral-700 flex items-center justify-between">
                <div class="flex items-center gap-2">
                  <i data-lucide="pen-tool" class="w-4 h-4 text-emerald-400"></i>
                  <span class="text-sm font-medium text-white">听写</span>
                </div>
                <button onclick="togglePanel('dictation')" class="text-neutral-400 hover:text-white">
                  <i data-lucide="x" class="w-4 h-4"></i>
                </button>
              </div>
              <div class="p-3 space-y-2 overflow-y-auto" style="max-height: 300px;">
                <div onclick="openDictationPreview()" class="flex items-center gap-3 p-3 bg-neutral-800/60 border border-neutral-700 rounded-lg cursor-pointer hover:bg-neutral-700/60 transition-colors">
                  <div class="w-10 h-10 bg-emerald-100 rounded-lg flex items-center justify-center shrink-0">
                    <i data-lucide="pen-tool" class="w-5 h-5 text-emerald-600"></i>
                  </div>
                  <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-neutral-100 truncate">第一单元词语听写</p>
                    <span class="inline-block mt-1 px-2 py-0.5 text-xs font-medium bg-emerald-500/20 text-emerald-300 rounded">听写</span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- 随堂测 -->
          <div class="relative">
              <button type="button" onclick="togglePanel('quiz')" id="btn-quiz" class="toolbar-tile flex min-w-[3.25rem] flex-col items-center justify-center gap-0.5 rounded-md px-2.5 py-1 text-white transition-colors hover:bg-white/10 focus:outline-none focus-visible:ring-2 focus-visible:ring-white/30 cursor-pointer" title="随堂测">
                <i data-lucide="clipboard-check" class="h-5 w-5 shrink-0 text-white/95"></i>
                <span class="text-[11px] font-medium leading-tight text-neutral-400">随堂测</span>
              </button>
            <!-- 随堂测面板 -->
            <div id="panel-quiz" class="absolute bottom-full left-1/2 z-[45] mb-2 w-72 -translate-x-1/2 bg-neutral-900/95 backdrop-blur-2xl border border-neutral-700 rounded-xl shadow-2xl overflow-hidden hidden" style="max-height: min(380px, 55vh);">
              <div class="px-4 py-3 border-b border-neutral-700 flex items-center justify-between">
                <div class="flex items-center gap-2">
                  <i data-lucide="clipboard-check" class="w-4 h-4 text-purple-400"></i>
                  <span class="text-sm font-medium text-white">随堂测</span>
                </div>
                <button onclick="togglePanel('quiz')" class="text-neutral-400 hover:text-white">
                  <i data-lucide="x" class="w-4 h-4"></i>
                </button>
              </div>
              <div class="p-3 space-y-2 overflow-y-auto" style="max-height: 300px;">
                <div onclick="openQuizPreview()" class="flex items-center gap-3 p-3 bg-neutral-800/60 border border-neutral-700 rounded-lg cursor-pointer hover:bg-neutral-700/60 transition-colors">
                  <div class="w-10 h-10 bg-purple-100 rounded-lg flex items-center justify-center shrink-0">
                    <i data-lucide="clipboard-check" class="w-5 h-5 text-purple-600"></i>
                  </div>
                  <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-neutral-100 truncate">《春》随堂测验</p>
                    <span class="inline-block mt-1 px-2 py-0.5 text-xs font-medium bg-purple-500/20 text-purple-300 rounded">随堂测</span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- 活动 -->
          <div class="relative">
              <button type="button" onclick="togglePanel('activity')" id="btn-activity" class="toolbar-tile flex min-w-[3.25rem] flex-col items-center justify-center gap-0.5 rounded-md px-2.5 py-1 text-white transition-colors hover:bg-white/10 focus:outline-none focus-visible:ring-2 focus-visible:ring-white/30 cursor-pointer" title="活动">
                <i data-lucide="puzzle" class="h-5 w-5 shrink-0 text-white/95"></i>
                <span class="text-[11px] font-medium leading-tight text-neutral-400">活动</span>
              </button>
            <!-- 活动面板 -->
            <div id="panel-activity" class="absolute bottom-full left-1/2 z-[45] mb-2 w-72 -translate-x-1/2 bg-neutral-900/95 backdrop-blur-2xl border border-neutral-700 rounded-xl shadow-2xl overflow-hidden hidden" style="max-height: min(380px, 55vh);">
              <div class="px-4 py-3 border-b border-neutral-700 flex items-center justify-between">
                <div class="flex items-center gap-2">
                  <i data-lucide="puzzle" class="w-4 h-4 text-orange-400"></i>
                  <span class="text-sm font-medium text-white">活动</span>
                </div>
                <button onclick="togglePanel('activity')" class="text-neutral-400 hover:text-white">
                  <i data-lucide="x" class="w-4 h-4"></i>
                </button>
              </div>
              <div class="p-3 space-y-2 overflow-y-auto" style="max-height: 300px;">
                <div onclick="openActivityPreview()" class="flex items-center gap-3 p-3 bg-neutral-800/60 border border-neutral-700 rounded-lg cursor-pointer hover:bg-neutral-700/60 transition-colors">
                  <div class="w-10 h-10 bg-orange-100 rounded-lg flex items-center justify-center shrink-0">
                    <i data-lucide="users" class="w-5 h-5 text-orange-600"></i>
                  </div>
                  <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-neutral-100 truncate">选词填空游戏</p>
                    <span class="inline-block mt-1 px-2 py-0.5 text-xs font-medium bg-orange-500/20 text-orange-300 rounded">活动</span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- 抽奖 -->
          <div class="relative">
              <button type="button" onclick="togglePanel('lottery')" id="btn-lottery" class="toolbar-tile flex min-w-[3.25rem] flex-col items-center justify-center gap-0.5 rounded-md px-2.5 py-1 text-white transition-colors hover:bg-white/10 focus:outline-none focus-visible:ring-2 focus-visible:ring-white/30 cursor-pointer" title="抽奖">
                <i data-lucide="gift" class="h-5 w-5 shrink-0 text-white/95"></i>
                <span class="text-[11px] font-medium leading-tight text-neutral-400">抽奖</span>
              </button>
            <!-- 抽奖面板 -->
            <div id="panel-lottery" class="absolute bottom-full left-1/2 z-[45] mb-2 w-72 -translate-x-1/2 bg-neutral-900/95 backdrop-blur-2xl border border-neutral-700 rounded-xl shadow-2xl overflow-hidden hidden" style="max-height: min(380px, 55vh);">
              <div class="px-4 py-3 border-b border-neutral-700 flex items-center justify-between">
                <div class="flex items-center gap-2">
                  <i data-lucide="gift" class="w-4 h-4 text-amber-400"></i>
                  <span class="text-sm font-medium text-white">抽奖</span>
                </div>
                <button onclick="togglePanel('lottery')" class="text-neutral-400 hover:text-white">
                  <i data-lucide="x" class="w-4 h-4"></i>
                </button>
              </div>
              <div class="p-3 space-y-2 overflow-y-auto" style="max-height: 300px;">
                <div onclick="openLotteryPreview()" class="flex items-center gap-3 p-3 bg-neutral-800/60 border border-neutral-700 rounded-lg cursor-pointer hover:bg-neutral-700/60 transition-colors">
                  <div class="w-10 h-10 bg-amber-100 rounded-lg flex items-center justify-center shrink-0">
                    <i data-lucide="gift" class="w-5 h-5 text-amber-600"></i>
                  </div>
                  <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-neutral-100 truncate">课堂随机抽奖</p>
                    <span class="inline-block mt-1 px-2 py-0.5 text-xs font-medium bg-amber-500/20 text-amber-300 rounded">抽奖</span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- 口语（聚合入口） -->
          <div class="relative">
              <button type="button" onclick="togglePanel('speaking')" id="btn-speaking" class="toolbar-tile flex min-w-[3.25rem] flex-col items-center justify-center gap-0.5 rounded-md px-2.5 py-1 text-white transition-colors hover:bg-white/10 focus:outline-none focus-visible:ring-2 focus-visible:ring-white/30 cursor-pointer" title="口语">
                <i data-lucide="mic" class="h-5 w-5 shrink-0 text-white/95"></i>
                <span class="text-[11px] font-medium leading-tight text-neutral-400">口语</span>
              </button>
            <!-- 口语面板（聚合） -->
            <div id="panel-speaking" class="absolute bottom-full left-1/2 z-[45] mb-2 w-72 -translate-x-1/2 bg-neutral-900/95 backdrop-blur-2xl border border-neutral-700 rounded-xl shadow-2xl overflow-hidden hidden" style="max-height: min(420px, 55vh);">
              <div class="px-4 py-3 border-b border-neutral-700 flex items-center justify-between">
                <div class="flex items-center gap-2">
                  <i data-lucide="mic" class="w-4 h-4 text-cyan-400"></i>
                  <span class="text-sm font-medium text-white">口语</span>
                </div>
                <button onclick="togglePanel('speaking')" class="text-neutral-400 hover:text-white">
                  <i data-lucide="x" class="w-4 h-4"></i>
                </button>
              </div>
              <div class="p-3 space-y-2 overflow-y-auto" style="max-height: 380px;">
                <!-- 单词评测 -->
                <div onclick="openWordEvaluationPreview()" class="flex items-center gap-3 p-3 bg-neutral-800/60 border border-neutral-700 rounded-lg cursor-pointer hover:bg-neutral-700/60 transition-colors">
                  <div class="w-10 h-10 bg-indigo-100 rounded-lg flex items-center justify-center shrink-0">
                    <i data-lucide="spell-check" class="w-5 h-5 text-indigo-600"></i>
                  </div>
                  <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-neutral-100 truncate">Unit 1 单词评测</p>
                    <span class="inline-block mt-1 px-2 py-0.5 text-xs font-medium bg-indigo-500/20 text-indigo-300 rounded">单词评测</span>
                  </div>
                </div>
                <!-- 对话评测 -->
                <div onclick="openDialoguePreview()" class="flex items-center gap-3 p-3 bg-neutral-800/60 border border-neutral-700 rounded-lg cursor-pointer hover:bg-neutral-700/60 transition-colors">
                  <div class="w-10 h-10 bg-teal-100 rounded-lg flex items-center justify-center shrink-0">
                    <i data-lucide="message-circle" class="w-5 h-5 text-teal-600"></i>
                  </div>
                  <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-neutral-100 truncate">Unit 2 对话评测</p>
                    <span class="inline-block mt-1 px-2 py-0.5 text-xs font-medium bg-teal-500/20 text-teal-300 rounded">对话评测</span>
                  </div>
                </div>
                <!-- 场景对话 -->
                <div onclick="openSceneDialoguePreview()" class="flex items-center gap-3 p-3 bg-neutral-800/60 border border-neutral-700 rounded-lg cursor-pointer hover:bg-neutral-700/60 transition-colors">
                  <div class="w-10 h-10 bg-rose-100 rounded-lg flex items-center justify-center shrink-0">
                    <i data-lucide="theater" class="w-5 h-5 text-rose-600"></i>
                  </div>
                  <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-neutral-100 truncate">餐厅场景对话</p>
                    <span class="inline-block mt-1 px-2 py-0.5 text-xs font-medium bg-rose-500/20 text-rose-300 rounded">场景对话</span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- 智能体 -->
          <div class="relative">
              <button type="button" onclick="togglePanel('agent')" id="btn-agent" class="toolbar-tile flex min-w-[3.25rem] flex-col items-center justify-center gap-0.5 rounded-md px-2.5 py-1 text-white transition-colors hover:bg-white/10 focus:outline-none focus-visible:ring-2 focus-visible:ring-white/30 cursor-pointer" title="智能体">
                <i data-lucide="bot" class="h-5 w-5 shrink-0 text-white/95"></i>
                <span class="text-[11px] font-medium leading-tight text-neutral-400">智能体</span>
              </button>
            <!-- 智能体面板 -->
            <div id="panel-agent" class="absolute bottom-full left-1/2 z-[45] mb-2 w-72 -translate-x-1/2 bg-neutral-900/95 backdrop-blur-2xl border border-neutral-700 rounded-xl shadow-2xl overflow-hidden hidden" style="max-height: min(380px, 55vh);">
              <div class="px-4 py-3 border-b border-neutral-700 flex items-center justify-between">
                <div class="flex items-center gap-2">
                  <i data-lucide="bot" class="w-4 h-4 text-violet-400"></i>
                  <span class="text-sm font-medium text-white">智能体</span>
                </div>
                <button onclick="togglePanel('agent')" class="text-neutral-400 hover:text-white">
                  <i data-lucide="x" class="w-4 h-4"></i>
                </button>
              </div>
              <div class="p-3 space-y-2 overflow-y-auto" style="max-height: 300px;">
                <div onclick="openAgentPreview()" class="flex items-center gap-3 p-3 bg-neutral-800/60 border border-neutral-700 rounded-lg cursor-pointer hover:bg-neutral-700/60 transition-colors">
                  <div class="w-10 h-10 bg-purple-100 rounded-lg flex items-center justify-center shrink-0">
                    <i data-lucide="bot" class="w-5 h-5 text-purple-600"></i>
                  </div>
                  <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-neutral-100 truncate">苏轼</p>
                    <span class="inline-block mt-1 px-2 py-0.5 text-xs font-medium bg-violet-500/20 text-violet-300 rounded">智能体</span>
                  </div>
                </div>
              </div>
            </div>
          </div>

      </div>

      <div class="hidden h-9 w-px shrink-0 bg-white/10 self-center sm:block mx-0.5" aria-hidden="true"></div>

      <!-- 课堂与演示 -->
        <div class="flex items-stretch rounded-lg border border-white/[0.07] bg-black/25 px-0.5">
            <button type="button" onclick="openReviewPreview()" class="toolbar-tile flex min-w-[3.25rem] flex-col items-center justify-center gap-0.5 rounded-md px-2.5 py-1 text-white transition-colors hover:bg-white/10 focus:outline-none focus-visible:ring-2 focus-visible:ring-white/30 cursor-pointer" title="点评">
              <i data-lucide="trophy" class="h-5 w-5 shrink-0 text-white/95"></i>
              <span class="text-[11px] font-medium leading-tight text-neutral-400">点评</span>
            </button>
            <button type="button" onclick="openRollcallPreview()" class="toolbar-tile flex min-w-[3.25rem] flex-col items-center justify-center gap-0.5 rounded-md px-2.5 py-1 text-white transition-colors hover:bg-white/10 focus:outline-none focus-visible:ring-2 focus-visible:ring-white/30 cursor-pointer" title="点名">
              <i data-lucide="users" class="h-5 w-5 shrink-0 text-white/95"></i>
              <span class="text-[11px] font-medium leading-tight text-neutral-400">点名</span>
            </button>
            <button type="button" onclick="toggleFullScreen()" id="fullscreen-btn" class="toolbar-tile flex min-w-[3.25rem] flex-col items-center justify-center gap-0.5 rounded-md px-2.5 py-1 text-white transition-colors hover:bg-white/10 focus:outline-none focus-visible:ring-2 focus-visible:ring-white/30 cursor-pointer" title="全屏">
              <i data-lucide="maximize" id="fullscreen-icon" class="h-5 w-5 shrink-0 text-white/95"></i>
              <span class="text-[11px] font-medium leading-tight text-neutral-400">全屏</span>
            </button>
      </div>
    </div>
  </div>

  <!-- 左侧边缘：箭头按钮，点击滑出目录（参考样式：深色六边形/标签，箭头） -->
  <button onclick="toggleDirectory()" id="directory-trigger" class="fixed left-0 top-1/2 -translate-y-1/2 z-40 w-[18px] h-14 flex items-center justify-center bg-slate-700/70 hover:bg-slate-600/80 backdrop-blur-sm border border-l-0 border-slate-500/40 rounded-r-lg shadow-lg transition-colors" title="课件目录">
    <i data-lucide="chevron-right" class="w-5 h-5 text-white"></i>
  </button>

  <!-- 6. 左侧滑出目录面板 -->
  <div id="directory-panel" class="fixed inset-y-0 left-0 w-80 bg-gray-900/95 backdrop-blur-md border-r border-gray-700 z-40 transform -translate-x-full transition-transform duration-300 flex flex-col shadow-2xl">
    <div class="p-4 border-b border-gray-700 flex justify-between items-center">
      <h2 class="text-lg font-bold">课件目录</h2>
      <button onclick="toggleDirectory()" class="text-gray-400 hover:text-white">
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>
    </div>
    <div class="flex-1 overflow-y-auto p-4 space-y-3 no-scrollbar" id="directory-list">
      <!-- 动态生成缩略图 -->
    </div>
  </div>

  <script>
    // --- 数据配置 ---
    const slides = [
      'img/0.png',
      'img/1.png',
      'img/2.png',
      'img/3.png',
      'img/4.png'
    ];

    // 活动卡片数据（已拆分到独立面板，不再需要）
    // const activityItems = [...]

    let currentSlideIndex = 0;
    let isDirectoryOpen = false;

    // --- 全屏功能 ---
    function updateFullscreenIcon() {
      const icon = document.getElementById('fullscreen-icon');
      const btn = document.getElementById('fullscreen-btn');
      if (icon && btn) {
        const span = btn.querySelector('span');
        if (document.fullscreenElement) {
          icon.setAttribute('data-lucide', 'minimize');
          btn.title = '退出全屏';
          if (span) span.textContent = '退出全屏';
        } else {
          icon.setAttribute('data-lucide', 'maximize');
          btn.title = '全屏';
          if (span) span.textContent = '全屏';
        }
        lucide.createIcons();
      }
    }

    function toggleFullScreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        if (document.exitFullscreen) document.exitFullscreen();
      }
    }

    // 监听全屏状态变化
    document.addEventListener('fullscreenchange', updateFullscreenIcon);

    // --- 初始化 ---
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      renderDirectory();
      updateSlide();
      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
        if (e.key === 'ArrowLeft') prevSlide();
      });
    });

    // --- 核心功能 ---
    function updateSlide() {
      const img = document.getElementById('current-slide');
      img.style.opacity = '0.5';
      setTimeout(() => {
        img.src = slides[currentSlideIndex];
        img.style.opacity = '1';
      }, 100);

      document.getElementById('current-page-num').innerText = currentSlideIndex + 1;
      document.getElementById('total-page-num').innerText = slides.length;
    }

    function nextSlide() {
      if (currentSlideIndex < slides.length - 1) {
        currentSlideIndex++;
        updateSlide();
      }
    }

    function prevSlide() {
      if (currentSlideIndex > 0) {
        currentSlideIndex--;
        updateSlide();
      }
    }

    // 目录相关
    function toggleDirectory() {
      const panel = document.getElementById('directory-panel');
      const trigger = document.getElementById('directory-trigger');
      isDirectoryOpen = !isDirectoryOpen;

      if (isDirectoryOpen) {
        panel.classList.remove('-translate-x-full');
        trigger.classList.add('-translate-x-full');
      } else {
        panel.classList.add('-translate-x-full');
        trigger.classList.remove('-translate-x-full');
      }
    }

    function renderDirectory() {
      const list = document.getElementById('directory-list');
      list.innerHTML = slides.map((src, idx) => `
        <div onclick="goToSlide(${idx})" class="flex gap-3 p-2 rounded-lg hover:bg-white/10 cursor-pointer transition-colors ${idx === currentSlideIndex ? 'bg-white/20 border border-white/30' : ''}">
          <div class="w-24 h-16 bg-gray-800 rounded overflow-hidden shrink-0 border border-gray-600">
            <img src="${src}" class="w-full h-full object-cover opacity-70 hover:opacity-100">
          </div>
          <div class="flex flex-col justify-center">
            <span class="font-medium text-sm">第 ${idx + 1} 页</span>
            <span class="text-xs text-gray-400">点击跳转</span>
          </div>
        </div>
      `).join('');
    }

    function goToSlide(index) {
      currentSlideIndex = index;
      updateSlide();
      renderDirectory();
      toggleDirectory();
    }

    // --- 面板切换（单入口面板） ---
    let activePanel = null;

    function togglePanel(name) {
      const panel = document.getElementById(`panel-${name}`);
      const btn = document.getElementById(`btn-${name}`);

      // 如果点击的是当前已打开的面板，则关闭
      if (activePanel === name) {
        panel.classList.add('hidden');
        btn.classList.remove('ring-2', 'ring-white/50');
        activePanel = null;
        return;
      }

      // 关闭之前打开的面板
      if (activePanel) {
        const prevPanel = document.getElementById(`panel-${activePanel}`);
        const prevBtn = document.getElementById(`btn-${activePanel}`);
        if (prevPanel) prevPanel.classList.add('hidden');
        if (prevBtn) prevBtn.classList.remove('ring-2', 'ring-white/50');
      }

      // 打开新面板
      panel.classList.remove('hidden');
      btn.classList.add('ring-2', 'ring-white/50');
      activePanel = name;

      // 重新渲染图标
      lucide.createIcons();
    }

    function closeActiveToolbarPanel() {
      if (!activePanel) return;
      const panel = document.getElementById(`panel-${activePanel}`);
      const btn = document.getElementById(`btn-${activePanel}`);
      if (panel) panel.classList.add('hidden');
      if (btn) btn.classList.remove('ring-2', 'ring-white/50');
      activePanel = null;
    }

    // 点击页面其他区域关闭面板
    document.addEventListener('click', (e) => {
      if (activePanel) {
        const panel = document.getElementById(`panel-${activePanel}`);
        const btn = document.getElementById(`btn-${activePanel}`);
        if (!panel.contains(e.target) && !btn.contains(e.target)) {
          panel.classList.add('hidden');
          btn.classList.remove('ring-2', 'ring-white/50');
          activePanel = null;
        }
      }
    });

    // 打开预览（会关闭面板）
    function openDictationPreview() { activePanel = null; document.getElementById('panel-dictation').classList.add('hidden'); document.getElementById('btn-dictation').classList.remove('ring-2', 'ring-white/50'); document.getElementById('dictation-preview-modal').classList.remove('hidden'); lucide.createIcons(); }
    function openQuizPreview() { activePanel = null; document.getElementById('panel-quiz').classList.add('hidden'); document.getElementById('btn-quiz').classList.remove('ring-2', 'ring-white/50'); document.getElementById('quiz-preview-modal').classList.remove('hidden'); lucide.createIcons(); }
    function openActivityPreview() { activePanel = null; document.getElementById('panel-activity').classList.add('hidden'); document.getElementById('btn-activity').classList.remove('ring-2', 'ring-white/50'); document.getElementById('activity-preview-modal').classList.remove('hidden'); lucide.createIcons(); }
    function openLotteryPreview() { activePanel = null; document.getElementById('panel-lottery').classList.add('hidden'); document.getElementById('btn-lottery').classList.remove('ring-2', 'ring-white/50'); document.getElementById('lottery-preview-modal').classList.remove('hidden'); lucide.createIcons(); }
    function openWordEvaluationPreview() { activePanel = null; document.getElementById('panel-speaking').classList.add('hidden'); document.getElementById('btn-speaking').classList.remove('ring-2', 'ring-white/50'); document.getElementById('word-evaluation-preview-modal').classList.remove('hidden'); lucide.createIcons(); }
    function openDialoguePreview() { activePanel = null; document.getElementById('panel-speaking').classList.add('hidden'); document.getElementById('btn-speaking').classList.remove('ring-2', 'ring-white/50'); document.getElementById('dialogue-preview-modal').classList.remove('hidden'); lucide.createIcons(); }
    function openSceneDialoguePreview() { activePanel = null; document.getElementById('panel-speaking').classList.add('hidden'); document.getElementById('btn-speaking').classList.remove('ring-2', 'ring-white/50'); document.getElementById('scene-dialogue-preview-modal').classList.remove('hidden'); lucide.createIcons(); }
    function openAgentPreview() { activePanel = null; document.getElementById('panel-agent').classList.add('hidden'); document.getElementById('btn-agent').classList.remove('ring-2', 'ring-white/50'); document.getElementById('agent-preview-modal').classList.remove('hidden'); lucide.createIcons(); }

    // 保留旧的（兼容）
    function toggleActivityPanel() { togglePanel('activity'); }

    // 关闭预览函数
    function closeQuizPreview() { document.getElementById('quiz-preview-modal').classList.add('hidden'); }
    function closeDictationPreview() { document.getElementById('dictation-preview-modal').classList.add('hidden'); }
    function closeActivityPreview() { document.getElementById('activity-preview-modal').classList.add('hidden'); }
    function closeLotteryPreview() { document.getElementById('lottery-preview-modal').classList.add('hidden'); }
    function closeWordEvaluationPreview() { document.getElementById('word-evaluation-preview-modal').classList.add('hidden'); }
    function closeDialoguePreview() { document.getElementById('dialogue-preview-modal').classList.add('hidden'); }
    function closeSceneDialoguePreview() { document.getElementById('scene-dialogue-preview-modal').classList.add('hidden'); }
    function closeAgentPreview() { document.getElementById('agent-preview-modal').classList.add('hidden'); }

    // 打开课堂点评预览
    function openReviewPreview() {
      document.getElementById('review-preview-modal').classList.remove('hidden');
      lucide.createIcons();
    }

    // 关闭课堂点评预览
    function closeReviewPreview() {
      document.getElementById('review-preview-modal').classList.add('hidden');
    }

    // 打开课堂点名预览
    function openRollcallPreview() {
      document.getElementById('rollcall-preview-modal').classList.remove('hidden');
      lucide.createIcons();
    }

    // 关闭课堂点名预览
    function closeRollcallPreview() {
      document.getElementById('rollcall-preview-modal').classList.add('hidden');
    }

    function openToolPanel(toolName) {
      const alertBox = document.getElementById('custom-alert');
      alertBox.querySelector('p').innerText = `${toolName} 已准备就绪`;
      alertBox.classList.remove('hidden');
    }

    function closeCustomAlert() {
      document.getElementById('custom-alert').classList.add('hidden');
    }
  </script>

  <script>
    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.remove('opacity-0');
      setTimeout(() => {
        toast.classList.add('opacity-0');
      }, 3000);
    }

    // ESC 键关闭所有弹窗
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeActiveToolbarPanel();
        closeQuizPreview();
        closeDictationPreview();
        closeActivityPreview();
        closeLotteryPreview();
        closeWordEvaluationPreview();
        closeDialoguePreview();
        closeSceneDialoguePreview();
        closeAgentPreview();
        closeReviewPreview();
        closeRollcallPreview();
        closeCustomAlert();
      }
    });

    // 点击背景关闭弹窗
    document.getElementById('quiz-preview-modal')?.addEventListener('click', function(e) { if (e.target === this) closeQuizPreview(); });
    document.getElementById('dictation-preview-modal')?.addEventListener('click', function(e) { if (e.target === this) closeDictationPreview(); });
    document.getElementById('activity-preview-modal')?.addEventListener('click', function(e) { if (e.target === this) closeActivityPreview(); });

    document.getElementById('scene-dialogue-preview-modal')?.addEventListener('click', function(e) { if (e.target === this) closeSceneDialoguePreview(); });
    document.getElementById('agent-preview-modal')?.addEventListener('click', function(e) { if (e.target === this) closeAgentPreview(); });
    document.getElementById('review-preview-modal')?.addEventListener('click', function(e) { if (e.target === this) closeReviewPreview(); });
    document.getElementById('rollcall-preview-modal')?.addEventListener('click', function(e) { if (e.target === this) closeRollcallPreview(); });
  </script>

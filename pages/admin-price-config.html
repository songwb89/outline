<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消耗规则 - 运营平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://registry.npmmirror.com/lucide/latest/files/dist/umd/lucide.js"></script>
    <script src="sidebar.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0f3ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
                            400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
                            800: '#3730a3', 900: '#312e81',
                        },
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        html, body { height: 100%; overflow: hidden; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; }
        .toast {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            color: white; padding: 12px 24px; border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); z-index: 10000;
            display: flex; align-items: center; gap: 12px;
            opacity: 0; transition: all 0.3s ease; pointer-events: none;
        }
        .toast.show { opacity: 1; pointer-events: all; transform: translateX(-50%) translateY(0); }
        .toast.hide { opacity: 0; transform: translateX(-50%) translateY(-8px); }
        .toast.toast-success { background: #10b981; }
        .toast.toast-info { background: #3b82f6; }
        .toast.toast-error { background: #ef4444; }
        .admin-nav-subitem { transition: all 0.15s ease; }
        .admin-nav-subitem:hover { background-color: #eef2ff; color: #4f46e5; }
        .admin-nav-subitem.active { background-color: #e0e7ff; color: #4f46e5; }
        .category-item { transition: all 0.2s ease; }
        .category-item:hover { background-color: #f8fafc; }
        .category-arrow { transition: transform 0.2s ease; }
        .category-arrow.expanded { transform: rotate(90deg); }
        .child-item { transition: all 0.15s ease; }
        .child-item:hover { background-color: #f0f9ff; }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">

    <!-- Toast提示 -->
    <div id="toast" class="toast toast-success">
        <i data-lucide="check-circle" class="w-5 h-5"></i>
        <span id="toast-message">保存成功</span>
    </div>

    <!-- 顶部导航 -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div class="px-6 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gradient-to-br from-primary-500 to-purple-600 rounded-xl flex items-center justify-center text-white font-bold shadow-lg">
                    <i data-lucide="sparkles" class="w-4 h-4"></i>
                </div>
                <span class="text-base font-semibold text-gray-800">运营平台</span>
            </div>
            <div class="flex items-center gap-3">
                <div class="w-7 h-7 bg-gradient-to-br from-primary-500 to-purple-600 rounded-full flex items-center justify-center text-white text-xs font-semibold">A</div>
                <span class="text-sm text-gray-700 font-medium">管理员</span>
            </div>
        </div>
    </header>

    <div class="flex h-[calc(100vh-57px)]">
        <div id="sidebar-container"></div>

        <!-- 主内容区 -->
        <main class="flex-1 overflow-hidden flex flex-col">
            <div class="px-6 pt-6 overflow-y-auto flex-1">

                <!-- 页面标题 -->
                <div class="mb-6">
                    <h1 class="text-2xl font-semibold text-gray-900">消耗规则</h1>
                    <p class="text-sm text-gray-500 mt-1">配置各功能每次使用的点数消耗，0点表示无限使用</p>
                </div>

                <!-- 功能列表 -->
                <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
                    <!-- 表头 -->
                    <div class="grid grid-cols-12 gap-4 px-6 py-3 bg-gray-50 border-b border-gray-200 text-xs font-medium text-gray-500 uppercase tracking-wider">
                        <div class="col-span-5">功能名称</div>
                        <div class="col-span-5">消耗点数</div>
                        <div class="col-span-2 text-center">操作</div>
                    </div>

                    <!-- 功能分类列表 -->
                    <div id="price-list" class="divide-y divide-gray-100">
                        <!-- 动态渲染 -->
                    </div>
                </div>

                <!-- 说明 -->
                <div class="mt-6 p-4 bg-blue-50 border border-blue-100 rounded-lg">
                    <div class="flex items-start gap-3">
                        <i data-lucide="info" class="w-5 h-5 text-blue-500 mt-0.5 shrink-0"></i>
                        <div class="text-sm text-blue-700">
                            <p class="font-medium mb-1">配置说明</p>
                            <ul class="list-disc list-inside space-y-1 text-blue-600">
                                <li>点数消耗配置为系统基准定价，所有套餐将引用此配置</li>
                                <li>0点表示该功能无限使用，不消耗任何点数</li>
                                <li>修改后立即生效，已在使用的套餐将使用新的配置</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 功能配置数据
        const modulesData = [
            {
                id: 'jiaan',
                name: '教案',
                children: [
                    { id: 'jiaan_ai', name: 'AI生成教案', unitPrice: 10 },
                    { id: 'jiaan_upload', name: '上传教案', unitPrice: 2 }
                ]
            },
            {
                id: 'kejian',
                name: '课件',
                children: [
                    { id: 'kejian_ai', name: 'AI生成课件', unitPrice: 15 },
                    { id: 'kejian_upload', name: '上传课件', unitPrice: 2 }
                ]
            },
            {
                id: 'xuean',
                name: '学案',
                children: [
                    { id: 'xuean_ai', name: 'AI生成学案', unitPrice: 10 },
                    { id: 'xuean_upload', name: '上传学案', unitPrice: 2 }
                ]
            },
            {
                id: 'huodong',
                name: '活动',
                children: [
                    { id: 'huodong_template', name: '创建模板活动', unitPrice: 5 },
                    { id: 'huodong_ai', name: '创建AI活动', unitPrice: 10 },
                    { id: 'huodong_lottery', name: '创建抽奖', unitPrice: 3 }
                ]
            },
            {
                id: 'huiben',
                name: 'AI绘本',
                children: [
                    { id: 'huiben_generate', name: '生成绘本', unitPrice: 8 }
                ]
            },
            {
                id: 'paidati',
                name: '拍题答疑',
                children: [
                    { id: 'paidati_parse', name: '生成解析', unitPrice: 5 }
                ]
            }
        ];

        // 展开状态
        const expandedCategories = new Set(modulesData.map(m => m.id));
        // 当前编辑状态
        const editingItems = new Set();

        // 渲染功能列表
        function renderPriceList() {
            const container = document.getElementById('price-list');
            let html = '';

            modulesData.forEach(category => {
                const isExpanded = expandedCategories.has(category.id);
                html += `
                    <!-- 分类行（一级） -->
                    <div class="category-item grid grid-cols-12 gap-4 px-6 py-3 bg-gray-50/50 items-center cursor-pointer" onclick="toggleCategory('${category.id}')">
                        <div class="col-span-5 flex items-center gap-2">
                            <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400 category-arrow ${isExpanded ? 'expanded' : ''}" id="arrow-${category.id}"></i>
                            <i data-lucide="folder" class="w-4 h-4 text-amber-500"></i>
                            <span class="text-sm font-medium text-gray-800">${category.name}</span>
                        </div>
                        <div class="col-span-5 text-sm text-gray-400">-</div>
                        <div class="col-span-2 text-center">
                            <button type="button" class="text-gray-400 cursor-default">-</button>
                        </div>
                    </div>
                `;

                // 子功能行
                if (isExpanded) {
                    category.children.forEach(item => {
                        const isUnlimited = item.unitPrice === 0;
                        const isEditing = editingItems.has(item.id);
                        
                        if (isEditing) {
                            // 编辑模式
                            html += `
                                <!-- 功能行（编辑模式） -->
                                <div class="child-item grid grid-cols-12 gap-4 px-6 py-3 items-center border-b border-gray-50 last:border-0 bg-blue-50/30">
                                    <div class="col-span-5 flex items-center gap-2 pl-10">
                                        <i data-lucide="file-text" class="w-4 h-4 text-gray-400"></i>
                                        <span class="text-sm text-gray-700">${item.name}</span>
                                    </div>
                                    <div class="col-span-5 flex items-center gap-2">
                                        <input type="number" 
                                               id="input-${item.id}" 
                                               value="${item.unitPrice}" 
                                               min="0" 
                                               class="w-24 px-3 py-1.5 border border-gray-300 rounded-lg text-sm text-center focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 text-gray-800"
                                               onclick="event.stopPropagation()">
                                        <span class="text-sm text-gray-500">点/次</span>
                                    </div>
                                    <div class="col-span-2 text-center flex items-center justify-center gap-2">
                                        <button type="button" 
                                                onclick="savePrice('${item.id}')" 
                                                class="px-3 py-1.5 bg-primary-600 hover:bg-primary-700 text-white text-xs font-medium rounded-lg transition-colors">
                                            保存
                                        </button>
                                        <button type="button" 
                                                onclick="cancelEdit('${item.id}')" 
                                                class="px-3 py-1.5 bg-white border border-gray-300 hover:bg-gray-50 text-gray-600 text-xs font-medium rounded-lg transition-colors">
                                            取消
                                        </button>
                                    </div>
                                </div>
                            `;
                        } else {
                            // 展示模式
                            html += `
                                <!-- 功能行（展示模式） -->
                                <div class="child-item grid grid-cols-12 gap-4 px-6 py-3 items-center border-b border-gray-50 last:border-0">
                                    <div class="col-span-5 flex items-center gap-2 pl-10">
                                        <i data-lucide="file-text" class="w-4 h-4 text-gray-400"></i>
                                        <span class="text-sm text-gray-700">${item.name}</span>
                                    </div>
                                    <div class="col-span-5 flex items-center gap-2">
                                        <span class="text-sm font-medium ${isUnlimited ? 'text-green-600' : 'text-gray-800'}">${isUnlimited ? '0 点（无限使用）' : item.unitPrice + ' 点/次'}</span>
                                    </div>
                                    <div class="col-span-2 text-center">
                                        <button type="button" 
                                                onclick="startEdit('${item.id}')" 
                                                class="px-3 py-1.5 bg-white border border-gray-200 hover:border-primary-500 hover:bg-primary-50 text-gray-600 hover:text-primary-600 text-xs font-medium rounded-lg transition-colors">
                                            <i data-lucide="pencil" class="w-3 h-3 inline mr-1"></i>编辑
                                        </button>
                                    </div>
                                </div>
                            `;
                        }
                    });
                }
            });

            container.innerHTML = html;
            lucide.createIcons();
        }

        // 展开/收起分类
        function toggleCategory(categoryId) {
            if (expandedCategories.has(categoryId)) {
                expandedCategories.delete(categoryId);
            } else {
                expandedCategories.add(categoryId);
            }
            renderPriceList();
        }

        // 开始编辑
        function startEdit(itemId) {
            if (event) event.stopPropagation();
            editingItems.add(itemId);
            renderPriceList();
            // 聚焦输入框
            setTimeout(() => {
                document.getElementById('input-' + itemId)?.focus();
            }, 0);
        }

        // 取消编辑
        function cancelEdit(itemId) {
            if (event) event.stopPropagation();
            editingItems.delete(itemId);
            renderPriceList();
        }

        // 保存点数配置
        function savePrice(itemId) {
            if (event) event.stopPropagation();
            const input = document.getElementById('input-' + itemId);
            if (!input) {
                alert('保存失败：找不到输入框');
                return;
            }
            const value = parseInt(input.value) || 0;
            
            // 找到对应的功能并更新
            for (const category of modulesData) {
                const item = category.children.find(c => c.id === itemId);
                if (item) {
                    item.unitPrice = value;
                    break;
                }
            }

            editingItems.delete(itemId);
            
            // 保存到 localStorage
            localStorage.setItem('modulesConfig', JSON.stringify(modulesData));
            
            showToast('保存成功');
            renderPriceList();
        }

        // 显示Toast提示
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');
            const icon = toast.querySelector('i');
            
            toast.className = 'toast toast-' + type;
            toastMessage.textContent = message;
            
            // 切换图标
            if (type === 'success') {
                icon.setAttribute('data-lucide', 'check-circle');
            } else if (type === 'error') {
                icon.setAttribute('data-lucide', 'x-circle');
            } else {
                icon.setAttribute('data-lucide', 'info');
            }
            
            lucide.createIcons();
            
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
                toast.classList.add('hide');
            }, 2000);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function () {
            // 从 localStorage 加载配置
            const saved = localStorage.getItem('modulesConfig');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    // 合并保存的配置
                    parsed.forEach(savedCat => {
                        const cat = modulesData.find(m => m.id === savedCat.id);
                        if (cat) {
                            cat.children = savedCat.children;
                        }
                    });
                } catch (e) {}
            }

            // 菜单展开/收起
            document.querySelectorAll('.admin-nav-group-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const children = this.nextElementSibling;
                    if (children && children.classList.contains('nav-children')) {
                        children.classList.toggle('hidden');
                        const arrow = this.querySelector('.group-arrow');
                        if (arrow) {
                            arrow.style.transform = children.classList.contains('hidden') ? '' : 'rotate(90deg)';
                        }
                        lucide.createIcons();
                    }
                });
            });

            renderPriceList();
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderSidebar('admin-price-config.html');
        });
    </script>
</body>
</html>

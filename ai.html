<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能教学 - AI专区</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    .ai-tool-card {
      transition: box-shadow 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }
    .ai-tool-card:hover {
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.08), 0 8px 10px -6px rgba(0, 0, 0, 0.06);
      border-color: rgb(229 231 235);
      transform: translateY(-2px);
    }
    .ai-icon-box {
      flex-shrink: 0;
      width: 3.25rem;
      height: 3.25rem;
      border-radius: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .view-hidden {
      display: none !important;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
  <!-- 顶部导航栏 -->
  <header class="bg-gradient-to-r from-blue-600 to-blue-700 text-white shadow-lg">
    <div class="flex items-center justify-between h-16 px-6">
      <!-- 左侧 Logo -->
      <div class="flex items-center gap-3 shrink-0">
        <img src="img/logo.png" alt="兆涵科技" class="h-9 sm:h-10 w-auto max-h-10 object-contain object-left" />
        <div class="flex flex-col leading-tight">
          <span class="text-base sm:text-lg font-bold text-white">兆涵科技</span>
          <span class="text-xs text-white leading-none">Sigma Education</span>
        </div>
      </div>

      <!-- 中间导航 -->
      <nav class="flex items-center gap-1">
        <a href="home.html" class="px-4 py-2 text-sm text-white/80 rounded-lg transition-all hover:bg-white/20 hover:text-white no-underline">
          首页
        </a>
        <a href="prepare.html" class="px-4 py-2 text-sm text-white/80 rounded-lg transition-all hover:bg-white/20 hover:text-white no-underline">智能备课</a>
        <a href="teach.html" class="px-4 py-2 text-sm text-white/80 rounded-lg transition-all hover:bg-white/20 hover:text-white no-underline">智能授课</a>
        <a href="evaluate.html" class="px-4 py-2 text-sm text-white/80 rounded-lg transition-all hover:bg-white/20 hover:text-white no-underline">智能测评</a>
        <a href="ai.html" class="px-4 py-2 text-sm font-medium rounded-lg bg-white/20 transition-all hover:bg-white/30 no-underline text-white">
          AI专区
        </a>
        <a href="academic.html" class="px-4 py-2 text-sm text-white/80 rounded-lg transition-all hover:bg-white/20 hover:text-white no-underline">教务管理</a>
      </nav>

      <!-- 右侧图标 + 用户 -->
      <div class="flex items-center gap-4">
        <!-- 任务 -->
        <div class="relative cursor-pointer hover:bg-white/20 p-2 rounded-lg transition-all">
          <i data-lucide="list-todo" class="w-5 h-5"></i>
          <span class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white text-xs rounded-full flex items-center justify-center">3</span>
        </div>
        
        <!-- 通知 -->
        <div class="relative cursor-pointer hover:bg-white/20 p-2 rounded-lg transition-all">
          <i data-lucide="bell" class="w-5 h-5"></i>
          <span class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white text-xs rounded-full flex items-center justify-center">5</span>
        </div>
        
        <!-- 用户信息 -->
        <div class="flex items-center gap-3 cursor-pointer hover:bg-white/20 p-2 rounded-lg transition-all">
          <div class="w-8 h-8 bg-white/30 rounded-full flex items-center justify-center">
            <i data-lucide="user" class="w-4 h-4"></i>
          </div>
          <div class="text-sm">
            <div class="font-medium">张老师</div>
          </div>
          <i data-lucide="chevron-down" class="w-4 h-4 text-white/70"></i>
        </div>
      </div>
    </div>
  </header>

  <!-- 内容区域 -->
  <main id="main-content" class="min-h-[calc(100vh-64px)] w-full">
    <!-- ========== 视图：AI 专区首页（居中限宽） ========== -->
    <section id="view-ai-home" class="view-ai-home p-6 max-w-[90rem] mx-auto">
      <!-- 卡片网格：参考三列布局，小屏自动换行 -->
      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 lg:grid-cols-4 gap-5">
        <!-- 分组标题：智能助手 -->
        <div class="col-span-full mb-2">
          <h2 class="text-lg font-bold text-gray-800">智能助手</h2>
          <p class="text-sm text-gray-500 mt-1">各类教学文档与方案智能生成</p>
        </div>

      <!-- 智能助手卡片 -->
      <button type="button" id="btn-open-assistant" class="ai-tool-card bg-white rounded-xl border border-gray-100 shadow-sm p-5 cursor-pointer block w-full text-left font-sans ring-0 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500/40">
        <div class="flex gap-4">
          <div class="ai-icon-box bg-gradient-to-br from-emerald-400 to-teal-600 text-white shadow-inner">
            <i data-lucide="clipboard-list" class="w-7 h-7"></i>
          </div>
          <div class="flex-1 min-w-0">
            <h2 class="text-base font-semibold text-gray-900">教学工作计划</h2>
            <p class="text-sm text-gray-500 mt-2 leading-relaxed">
              快速生成教学计划，智能匹配内容安排，助力教学更高效。
            </p>
          </div>
        </div>
      </button>

      <!-- 校园活动策划 -->
      <button type="button" id="btn-open-assistant2" class="ai-tool-card bg-white rounded-xl border border-gray-100 shadow-sm p-5 cursor-pointer block w-full text-left font-sans ring-0 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500/40">
        <div class="flex gap-4">
          <div class="ai-icon-box bg-gradient-to-br from-violet-500 to-purple-600 text-white shadow-inner">
            <i data-lucide="scroll-text" class="w-7 h-7"></i>
          </div>
          <div class="flex-1 min-w-0">
            <h2 class="text-base font-semibold text-gray-900">校园活动策划</h2>
            <p class="text-sm text-gray-500 mt-2 leading-relaxed">
              聚焦活动目标与流程，输出清晰可执行方案。
            </p>
          </div>
        </div>
      </button>

      <!-- 家长会发言稿 -->
      <button type="button" id="btn-open-assistant3" class="ai-tool-card bg-white rounded-xl border border-gray-100 shadow-sm p-5 cursor-pointer block w-full text-left font-sans ring-0 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500/40">
        <div class="flex gap-4">
          <div class="ai-icon-box bg-gradient-to-br from-sky-400 to-blue-600 text-white shadow-inner">
            <i data-lucide="file-user" class="w-7 h-7"></i>
          </div>
          <div class="flex-1 min-w-0">
            <h2 class="text-base font-semibold text-gray-900">家长会发言稿</h2>
            <p class="text-sm text-gray-500 mt-2 leading-relaxed">
              贴合班级情况，给出高质量发言稿建议。
            </p>
          </div>
        </div>
      </button>

        <!-- 分隔线 -->
        <div class="col-span-full border-t border-gray-200 my-4"></div>

        <!-- 分组标题：AI工具 -->
        <div class="col-span-full mb-2">
          <h2 class="text-lg font-bold text-gray-800">AI工具</h2>
          <p class="text-sm text-gray-500 mt-1">多场景智能应用，赋能教学全流程</p>
        </div>

      <!-- 数字人（进入子界面） -->
      <button type="button" id="btn-open-digital-human" class="ai-tool-card bg-white rounded-xl border border-gray-100 shadow-sm p-5 cursor-pointer block w-full text-left font-sans ring-0 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500/40">
        <div class="flex gap-4">
          <div class="ai-icon-box bg-gradient-to-br from-violet-400 to-purple-600 text-white shadow-inner">
            <i data-lucide="user-round" class="w-7 h-7"></i>
          </div>
          <div class="flex-1 min-w-0">
            <h2 class="text-base font-semibold text-gray-900">数字人</h2>
            <p class="text-sm text-gray-500 mt-2 leading-relaxed">
              虚拟形象互动讲解，适合公开课、微课与沉浸式教学演示。
            </p>
          </div>
        </div>
      </button>

      <!-- AI讲题（进入子界面） -->
      <button type="button" id="btn-open-ai-explain" class="ai-tool-card bg-white rounded-xl border border-gray-100 shadow-sm p-5 cursor-pointer block w-full text-left font-sans ring-0 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500/40">
        <div class="flex gap-4">
          <div class="ai-icon-box bg-gradient-to-br from-emerald-400 to-teal-600 text-white shadow-inner">
            <i data-lucide="lightbulb" class="w-7 h-7"></i>
          </div>
          <div class="flex-1 min-w-0">
            <h2 class="text-base font-semibold text-gray-900">AI讲题</h2>
            <p class="text-sm text-gray-500 mt-2 leading-relaxed">
              针对题目分步解析与思路引导，帮助学生理解考点与解题路径。
            </p>
          </div>
        </div>
      </button>

      <!-- AI讲课（进入子界面） -->
      <button type="button" id="btn-open-ai-lecture" class="ai-tool-card bg-white rounded-xl border border-gray-100 shadow-sm p-5 cursor-pointer block w-full text-left font-sans ring-0 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500/40">
        <div class="flex gap-4">
          <div class="ai-icon-box bg-gradient-to-br from-amber-400 to-orange-500 text-white shadow-inner">
            <i data-lucide="presentation" class="w-7 h-7"></i>
          </div>
          <div class="flex-1 min-w-0">
            <h2 class="text-base font-semibold text-gray-900">AI讲课</h2>
            <p class="text-sm text-gray-500 mt-2 leading-relaxed">
              按知识点生成讲解稿与板书要点，辅助教师组织课堂节奏与表达。
            </p>
          </div>
        </div>
      </button>

      <!-- AI绘本（进入子界面） -->
      <button type="button" id="btn-open-ai-picture-book" class="ai-tool-card bg-white rounded-xl border border-gray-100 shadow-sm p-5 cursor-pointer block w-full text-left font-sans ring-0 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500/40">
        <div class="flex gap-4">
          <div class="ai-icon-box bg-gradient-to-br from-pink-400 to-rose-500 text-white shadow-inner">
            <i data-lucide="book-open" class="w-7 h-7"></i>
          </div>
          <div class="flex-1 min-w-0">
            <h2 class="text-base font-semibold text-gray-900">AI绘本</h2>
            <p class="text-sm text-gray-500 mt-2 leading-relaxed">
              图文故事与阅读素材生成，适配低年级语文与拓展阅读教学。
            </p>
          </div>
        </div>
      </button>

      <!-- 拍题答疑（进入子界面） -->
      <button type="button" id="btn-open-photo-qa" class="ai-tool-card bg-white rounded-xl border border-gray-100 shadow-sm p-5 cursor-pointer block w-full text-left font-sans ring-0 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500/40">
        <div class="flex gap-4">
          <div class="ai-icon-box bg-gradient-to-br from-indigo-400 to-blue-600 text-white shadow-inner">
            <i data-lucide="camera" class="w-7 h-7"></i>
          </div>
          <div class="flex-1 min-w-0">
            <h2 class="text-base font-semibold text-gray-900">拍题答疑</h2>
            <p class="text-sm text-gray-500 mt-2 leading-relaxed">
              拍照上传题目，获取 AI 分步解析与答疑，支持任务与收藏管理。
            </p>
          </div>
        </div>
      </button>
    </div>
    </section>

    <!-- ========== 视图：数字人（截图原型） ========== -->
    <section id="view-digital-human" class="view-digital-human view-hidden w-full max-w-none">
      <div class="border-b border-slate-200/80 py-1.5 flex-shrink-0 px-6">
        <nav class="flex items-center gap-2 text-sm text-gray-500" aria-label="面包屑">
          <button type="button" id="breadcrumb-ai-zone-digital" class="hover:text-blue-600 bg-transparent border-0 p-0 cursor-pointer text-sm text-gray-500">AI专区</button>

          <span class="text-gray-700 font-medium">数字人</span>

      <div class="px-6 pb-6 mt-4">

    <section id="view-ai-explain" class="view-ai-explain view-hidden w-full max-w-none">

        <i data-lucide="history" class="w-4 h-4 shrink-0"></i>

      <div class="border-b border-slate-200/80 py-1.5 flex-shrink-0 px-6">

    <!-- ========== 视图：AI讲题记录（截图原型） ========== -->
    <section id="view-ai-explain-records" class="view-ai-explain-records view-hidden w-full max-w-none">
      <div class="border-b border-slate-200/80 py-1.5 flex-shrink-0 px-6">
        <nav class="flex items-center gap-2 text-sm text-gray-500 flex-wrap" aria-label="面包屑">
          <button type="button" id="breadcrumb-ai-zone-explain-records" class="hover:text-blue-600 bg-transparent border-0 p-0 cursor-pointer text-sm text-gray-500">AI专区</button>
          <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400 shrink-0"></i>
          <button type="button" id="breadcrumb-back-ai-explain" class="hover:text-blue-600 bg-transparent border-0 p-0 cursor-pointer text-sm text-gray-500">AI讲题</button>
          <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400 shrink-0"></i>
          <span class="text-gray-700 font-medium">问答记录</span>
        </nav>
      </div>
      <div class="px-6 pb-6 mt-4">
        <div id="wrap-ai-explain-records-img" role="button" tabindex="0" class="cursor-pointer rounded-lg focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500/50" title="点击进入问题讲解">
          <img src="img/AI讲题记录.png" alt="AI讲题记录" class="w-full h-auto block rounded-lg border border-gray-200/80 shadow-sm pointer-events-none" />
        </div>
      </div>
    </section>

    <!-- ========== 视图：问题讲解（截图原型） ========== -->
    <section id="view-ai-explain-question" class="view-ai-explain-question view-hidden w-full max-w-none">
      <div class="border-b border-slate-200/80 py-1.5 flex-shrink-0 px-6">
        <nav class="flex items-center gap-2 text-sm text-gray-500 flex-wrap" aria-label="面包屑">
          <button type="button" id="breadcrumb-ai-zone-question-explain" class="hover:text-blue-600 bg-transparent border-0 p-0 cursor-pointer text-sm text-gray-500">AI专区</button>
          <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400 shrink-0"></i>
          <button type="button" id="breadcrumb-back-ai-explain-question" class="hover:text-blue-600 bg-transparent border-0 p-0 cursor-pointer text-sm text-gray-500">AI讲题</button>
          <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400 shrink-0"></i>
          <button type="button" id="breadcrumb-back-records-question" class="hover:text-blue-600 bg-transparent border-0 p-0 cursor-pointer text-sm text-gray-500">问答记录</button>

      </div>
      <div class="px-6 pb-6 mt-4">
        <img src="img/问题讲解.png" alt="问题讲解" class="w-full h-auto block rounded-lg border border-gray-200/80 shadow-sm" />

      <div class="border-b border-slate-200/80 py-1.5 flex-shrink-0 px-6">

          <button type="button" id="breadcrumb-ai-zone-picture-book" class="hover:text-blue-600 bg-transparent border-0 p-0 cursor-pointer text-sm text-gray-500">AI专区</button>
          <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400"></i>

      <div class="px-6 pb-6 mt-4">

    <!-- ========== 视图：我的绘本（截图原型） ========== -->
    <section id="view-my-picture-books" class="view-my-picture-books view-hidden w-full max-w-none">

          <button type="button" id="breadcrumb-ai-zone-lecture" class="hover:text-blue-600 bg-transparent border-0 p-0 cursor-pointer text-sm text-gray-500">AI专区</button>

    <!-- ========== 视图：拍题答疑（面包屑通栏，白色面板左右撑满） ========== -->
    <section id="view-photo-qa" class="view-photo-qa view-hidden w-full max-w-none bg-gray-50 min-h-[calc(100vh-64px)]">
      <div class="px-6 pt-4">
        <nav class="flex items-center gap-2 text-sm text-gray-500 mb-3" aria-label="面包屑">
          <button type="button" id="breadcrumb-ai-zone-photo-qa" class="hover:text-blue-600 bg-transparent border-0 p-0 cursor-pointer text-sm text-gray-500">AI专区</button>
          <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400"></i>
          <span class="text-gray-700 font-medium">拍题答疑</span>
        </nav>
      </div>
      <div class="px-6 pb-8">

        tabTask.classList.add('bg-blue-600', 'text-white', 'shadow-sm');

        tabTask.setAttribute('aria-selected', 'true');
        tabFav.classList.remove('bg-blue-600', 'text-white', 'shadow-sm');

        tabFav.classList.remove('text-gray-500', 'hover:text-gray-700');
        tabFav.setAttribute('aria-selected', 'true');

        tabTask.classList.add('text-gray-500', 'bg-transparent', 'hover:text-gray-700');
        tabTask.setAttribute('aria-selected', 'false');
        panelFav.classList.remove('view-hidden');
        panelTask.classList.add('view-hidden');
        if (uploadRow) uploadRow.classList.add('view-hidden');
      }
      if (history.replaceState) {
        history.replaceState(null, '', photoQaActiveTab === 'favorite' ? 'ai.html#photo-qa-favorites' : 'ai.html#photo-qa');

        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          showQuestionExplain();
        }
      });
    })();
    (function () {
      function bindImgWrap(id, source) {
        var wrap = document.getElementById(id);
        if (!wrap) return;
        wrap.addEventListener('click', function () { showPhotoQaAiAnalysis(source); });
        wrap.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            showPhotoQaAiAnalysis(source);
          }
        });
      }
      bindImgWrap('wrap-photo-qa-task-img', 'task');
      bindImgWrap('wrap-photo-qa-favorite-img', 'favorite');
    })();

    function applyHashRoute() {
      var hash = window.location.hash || '';
      if (hash.indexOf('#photo-qa-ai/') === 0) {
        var src = hash.slice('#photo-qa-ai/'.length);
        if (src === 'task' || src === 'favorite') {
          showPhotoQaAiAnalysis(src);
          return;
        }
      }
      if (hash === '#photo-qa-favorites') {
        showPhotoQa('favorite');
        return;
      }
      if (hash === '#photo-qa') {
        showPhotoQa('task');
        return;
      }
      if (hash.indexOf('#assistant/') === 0) {
        var name = decodeURIComponent(hash.slice('#assistant/'.length));
        if (name) {
          showAssistantScene(name);
          return;
        }
      }
      if (hash === '#digital-human') {
        showDigitalHuman();
        return;
      }
      if (hash === '#ai-lecture') {
        showAiLecture();
        return;
      }
      if (hash === '#ai-explain-question') {
        showQuestionExplain();
        return;
      }
      if (hash === '#my-picture-books') {
        showMyPictureBooks();
        return;
      }
      if (hash === '#ai-picture-book') {
        showAiPictureBook();
        return;
      }
      if (hash === '#ai-explain-records') {
        showAiExplainRecords();
        return;
      }
      if (hash === '#ai-explain') {
        showAiExplain();
      }
    }

    applyHashRoute();
    window.addEventListener('hashchange', applyHashRoute);

    // 初始化 Lucide 图标
    lucide.createIcons();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>兆涵科技 - 智能教学管理系统</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://registry.npmmirror.com/lucide/latest/files/dist/umd/lucide.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    
    .gradient-bg {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .card-hover {
      transition: all 0.3s ease;
    }
    
    .card-hover:hover {
      transform: translateY(-8px);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }
    
    .icon-float {
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    .pulse-ring {
      animation: pulse-ring 2s ease-out infinite;
    }
    
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.5); opacity: 0; }
    }
  </style>
</head>
<body class="min-h-screen bg-gray-50">
  <!-- 顶部 Logo -->
  <header class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-4">
      <div class="flex items-center gap-3">
        <div class="flex flex-col leading-tight">
          <span class="text-lg font-bold text-gray-800">兆涵科技</span>
          <span class="text-xs text-gray-500">Sigma Education</span>
        </div>
      </div>
    </div>
  </header>

  <!-- 主内容区 -->
  <main class="max-w-5xl mx-auto px-6 py-16">
    <!-- 入口卡片 -->
    <div class="grid md:grid-cols-2 gap-8 max-w-4xl mx-auto">
      <!-- 教师端入口 -->
      <a href="pages/home.html" target="_blank" class="card-hover block bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-100">
        <div class="gradient-bg p-8 text-center text-white">
          <div class="relative inline-block mb-4">
            <div class="w-20 h-20 bg-white/20 rounded-2xl flex items-center justify-center mx-auto">
              <i data-lucide="graduation-cap" class="w-10 h-10"></i>
            </div>
            <div class="absolute inset-0 bg-white/20 rounded-2xl pulse-ring"></div>
          </div>
          <h2 class="text-2xl font-bold mb-2">教师端</h2>
          <p class="text-white/80 text-sm">智能备课 · 智能授课 · 智能测评</p>
        </div>
        <div class="p-6">
          <div class="flex items-center justify-end gap-2 text-blue-600 font-medium">
            <span>进入系统</span>
            <i data-lucide="arrow-right" class="w-4 h-4"></i>
          </div>
        </div>
      </a>

      <!-- 运营端入口 -->
      <a href="/pages/admin-school.html" target="_blank" class="card-hover block bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-100">
        <div class="bg-gradient-to-br from-emerald-500 to-teal-600 p-8 text-center text-white">
          <div class="relative inline-block mb-4">
            <div class="w-20 h-20 bg-white/20 rounded-2xl flex items-center justify-center mx-auto">
              <i data-lucide="settings" class="w-10 h-10"></i>
            </div>
            <div class="absolute inset-0 bg-white/20 rounded-2xl pulse-ring" style="animation-delay: 0.5s;"></div>
          </div>
          <h2 class="text-2xl font-bold mb-2">运营端</h2>
          <p class="text-white/80 text-sm">教务管理 · 数据分析 · 系统配置</p>
        </div>
        <div class="p-6">
          <div class="flex items-center justify-end gap-2 text-emerald-600 font-medium">
            <span>进入系统</span>
            <i data-lucide="arrow-right" class="w-4 h-4"></i>
          </div>
        </div>
      </a>
    </div>

    <!-- 底部信息 -->
    <div class="text-center mt-16 text-gray-400 text-sm">
      <p>兆涵科技 © 2026 Sigma Education</p>
    </div>
  </main>

  <script>
    lucide.createIcons();
  </script>
</body>
</html>
